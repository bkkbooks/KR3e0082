body:
  text: 傷寒論條辨卷八明方有執撰辨不可發汗病脉證幷治第十五夫以爲疾病至急倉卒尋按要㫖難得故重集諸可與不可方治比之三隂三陽篇中此易見也又時有不止是三隂三陽出在諸可與不可中也此叔和自掲其編述以下諸篇之由脉濡而弱弱反在關濡反在巔微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微發汗躁不得眠此疑太陽下篇首條末節之互意叔和以不可汗類此倫序鉏鋙難曉似此者皆當闕疑可也動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水五藏皆有動氣詳見難經左右以肺言也不可發汗内證也衄渴煩吐皆見太陽上篇蓋肺太隂之脉起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循腰内行少隂心主之前而其藏通竅於鼻所以有諸證之變見如此動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤在左肝之内證也肝屬少陽其脉絡膽上貫膈布脇肋循喉嚨之後上入頏顙連囙系上出額與督脉㑹于巔其主風故頭眩也汗不止者肝納血血之液為汗迫汗則肝不納血血不歸經故液有出而無歛也筋惕肉瞤者筋賴血以榮血虚則榮衰汗多則亡陽而亡津液所以然也動氣在上不可發汗發汗則氣上衝正在心端在上心之内證也氣上衝正在心端者心屬火而主血腎屬水而生氣逼汗則心虚水能剋火故腎乘心之虚欲上淩之也而心之脉起於心中出屬心系下膈絡小腹腎足少隂之别名曰大鍾當踝後遶跟别走太陽其别者竝經上走於心包然則上衝之氣亦當正在心端也動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐穀不得前在下腎之内證也無汗者腎水藏在時為冬隂沉在下其主閉藏其經少血也大煩者强發其汗則水乾火無制也骨節苦疼目運者腎主骨骨之精為瞳子水乾則骨枯而瞳子無榮養也惡寒者腎合太陽也食則反吐穀不得前者王氷曰病嘔而吐食久反出是無水也此之謂也難經動氣有五此言四藏而無脾豈以脾不與四藏同禁邪抑欲人與四藏同推也咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得踡臥不能自溫咽門乃胃之系而脾之脉絡胃上膈挾咽連舌本然則咽中閉塞者脾胃之邪上客於咽而作逆阻也吐血者脾統血而胃為之合脾傷不能統血故妄行上溢而從胃道出也氣欲絶者亡陽也手足為四肢乃諸陽之本陽欲外絶則隂亦不能内守隂陽不相順接而厥冷故畏寒而欲得踡臥也夫如此溫之且未得豈能自得其溫乎諸脉得動數微弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相象根本異源此條三節脉經只作通長一條不分截今按文意此疑是末節其形至末乃總全條之結句蓋謂寒慄不能自還後節苦滿腹中堅與此大便難腹中乾三者之變雖相似其本源則不同之意也不如此則上下皆不相蒙脉微而弱弱反在關濡反在巔弦反在上微反在下弦爲陽運微爲隂寒上實下虚意欲得溫微弦為虚不可發汗發汗則寒慄不能自還此疑是上節陽以風言運動也故曰上實謂邪氣實也隂以裏言寒虚也故曰下虚謂裏氣虚也微弦為虚承上起下之詞寒慄不能自還陽亡而隂獨治也欬者則劇數吐涎沫咽中必乾小便不利心中饑煩晬時而發其形似瘧有寒無熱虚而寒慄欬而發汗踡而苦滿腹中復堅此當是中節首句是承上而言欬為病加劇之詞也數吐已下言劇之狀也有寒無熱二句申似瘧也欬而發汗亦承上起下之詞踡謂不伸欬屬肺肺金寒病則脹滿所以反堅也欬而小便利若失小便者不可發汗汗出則四肢厥逆冷小便利失小便肺腎二經俱病也不可發汗二經少血也四肢厥冷金水傷而土亦同敗也厥脉𦂳不可發汗發汗則聲亂咽嘶舌萎聲不得前厥欲温𦂳則寒勝不可發汗隂陽不相順接也聲亂咽嘶舌萎病至少隂厥隂則厥少隂之脉循喉嚨俠舌本而厥隂之脉循喉嚨之外也聲不得前者聲出於肺而生於氣氣生於腎然則少隂腎者聲之本太隂肺者聲之標標本俱病此又土敗而金水亦衰合上條反覆示教之意諸逆發汗病微者難差劇者言亂目眩者死命將難全逆亦厥也言亂少隂衰而志喪也目眩厥隂衰而風亂也蓋厥逆無非少隂厥隂之證故也一汗家重發汗必恍惚心亂小便已隂疼與禹餘糧丸服之心主血而藏神汗多則血虚而舎空亂舎空則神紛散也隂宗筋也疼液竭而失其所榮養也二亡血家不可發汗發汗則寒慄而振伏皮為血出則為汗隂也隂不自出出之者陽也亡血隂虚矣寒慄而振反汗復亡其陽也三衄家不可發汗汗出必額上䧟脉急緊直視不能眴不得眠衄鼻血也額上通乎鼻也不能眴謂目上瞪不能開闔而動搖也所以不得瞑而眠也四淋家不可發汗發汗必便血胱膀蓄熱而血妄則淋復發汗以迫其血則血愈不循經而愈妄便出者其道順故也五瘡家雖身疼痛不可發汗發汗則痓痓通作痙虚病瘡身疼痛血熱表虚非實也發汗則表益而易得重感痙病出於重感故禁六咽喉乾燥者不可發汗咽喉乾燥者胃中無津液腎水亦耗衰少隂之脉循喉嚨也發汗則津液愈亡而腎水益衰故致戒如此末後無發汗之變疑有漏落移已上六條舊本太陽中篇今傷寒頭痛翕翕發熱􅄱象中風常微汗出自嘔者下之益煩心中懊憹如饑發汗則致痓身强難以屈伸熏之則發黃不得小便灸則發欬唾此互第九篇第四條曲致其不可誤治之詳以重致丁寧戒謹之意辨可發汗病脉證幷治第十六大法春夏宜發汗此叔和推法外意舉大㮣以掲言之春夏宜發汗者順陽事也然傷寒冬病也可以此拘乎不可以此拘仲景肯言哉凡似此者後學皆當别識誠如此則進道方爲有益凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虚不得重發汗也此丁寧發汗之節度凡服湯發汗中病便止不必盡劑此丁寧進湯之節度凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗此示人用湯丸經權應變之宜已上五條疑皆叔和語夫病脉浮大問病者言但便鞕爾設利者為大逆鞕為實汗出而解何以故脉浮當以汗解此言便雖鞕若脉見浮猶當從汗解蓋互下不宜早而曲致丁寧之意下利後身疼痛清便自調者急當救表宜桂枝湯發汗此互太陽中篇第二十三條末節而曲致丁寧之意辨發汗後病脉證幷治第十七發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈此互誤汗亡陽而曲致其輕者之救法此一卷第十七篇凡三十一證前有詳説辨不可吐病脉證幷治第十八合四證已具太陽篇中已上二條乃叔和類具篇目指經中條冊之不能分出者而言勉人當精詳經㫖務為通貫其義以期盡道之意讀者自㑹則書之全求可言矣辨可吐病脉證幷治第十九大法春宜吐春氣上行萬物伏藏者皆冐土而上出故病之發於春者大率宜宣而吐以出之法天道也凡用吐湯中病即止不必盡劑也此與第十六篇第三條汗吐不同而意同并上條亦皆叔和語然中之為言注的也知注的之為中則知中病之節度矣宿食在上脘者當吐之上脘謂胃府之口也病人手足厥冷脉乍結以客氣在胷中心下滿而煩欲食不能食者病在胷中當吐之第九篇第六條言脉乍𦂳邪氣在胷中此言乍結客氣在胷中𦂳者結之漸結者𦂳之劇客氣即邪氣彼此互相發而兩比見輕重之意病胷上諸實胷中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脉反遲寸口脉微滑此可吐之吐之則利止諸實總上文宿食邪氣客氣而㮣言之辨不可下病脉證幷治第二十脉濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞鞕澀與濇同又此下六條即前十五篇第二條已下之六條以不可下再出痞鞕即結胷痞氣動氣在右不可下下之則津液内竭咽燥鼻乾頭眩心悸也頭眩者肺屬金金衰不能制木木甚則風生也然木甚火必熾而肺太隂之脉行手少隂心主之前心為火藏所以悸也動氣在左不可下下之則腹内拘急食不下動氣更劇雖有身熱臥則欲踡腹内拘急食不下者厥隂肝脉俠胃絡肝也身熱胃合於脾脾主肌肉而統四肢然則欲踡者裏則寒也動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌掌握熱煩者手少隂心之脉抵掌后兑骨之端入掌内后廉手心主之脉入掌中也身上浮冷者火敗而土無氣也熱汗已下者汗生於血而主於心心屬火敗則液不歛劇則自求救也動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也卒清勿切上腹脹滿腎痺也頭眩者腎少隂之脉其直者從腎貫肝膈肝主風也食則下清穀者水橫溢也心下痞者腎生氣其脉之支者從肺出絡心注胷中也咽中閉塞不可下下之則上輕下重水漿不下臥則欲踡身急痛下利日數十行上輕以咽言下重以胃言水漿不下已下詳下重之狀也卧則欲踡身急痛者胃主肌肉而統四肢也下利土敗而水無制也蓋咽門小腸太倉胃府之傳送也故應病如此夫汗下者法之對比也兩比以示教前哲之心亦甚深切矣後學當仰體諸外實者不可下下之則發微熱亡脉厥者當臍握熱諸外實指凡一切邪在表而言也發微熱邪入裏也亡脉陽内䧟也握持也謂當臍有熱持而不散蓋以熱入深者言也諸虚者不可下下之則大渇求水者欲愈惡水者劇惡去聲色諸虚指凡一切汗吐下後若亡血與精氣奪肉脱敗脉不應者言也大渇津液竭也求水陽回也惡水無陽也然虚乃上文實之對亦兩比之意脉濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為隂寒上實下虚意欲得溫微弦為虚虚者不可下也此舉第十五篇第五條後二節而復以不可下重出下文乃言下之之變也微則爲逆欬則吐涎下之則欬止而利因不休利不休則胷中如蟲齧粥入則出小便不利兩脇拘急喘息爲難頸背相引擘則不仁極寒反汗出身冷若氷眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前齧音孽句首二句乃總前第十五篇第五條後兩節之兩首而通互其意下之已下言變證也寒以虚言故曰反汗出身冷若氷也不得前猶言不能出也舌主於心較之聲屬肺之前條則此為重矣亦兩比也脉濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虚數為無血浮為虚數為熱浮為虚自汗出而惡寒數為痛振寒而慄微弱在關胷下為急喘汗而不得呼吸呼吸之中痛在於脇振寒相摶形如瘧狀醫反下之故令脉數發熱狂走見鬼心下為痞小便淋瀝小腹甚鞕小便則尿血也首三句與上條同上條弦反在上弦則為隂隂者寒也故曰㣲反在下此條浮反在上浮則為陽陽者風也故曰數反在下蓋兩舉中風傷寒之本虚者繹其變以曲致丁寧之意脉數者久數不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得脉數者不可下下之則必煩利不止皮毛相得已上明脉之所以浮數也煩利亦協熱也脉浮大應發汗醫反下之此爲大逆此重出第十四篇第十七條之大畧以申致丁寧之意嘔多雖有陽明證不可攻之此即陽明篇第三十一條重出太陽病外證未解不可下下之爲逆此太陽上之第十六條蓋以凡在太陽皆然故重出以申致丁寧之意夫病陽多者熱下之則鞕陽以風言多猶言勝也熱以自汗言鞕亡津液也無陽隂强大便鞕者下之則必清穀腹滿隂以寒言强猶言多也清穀隂不能化也腹滿隂凝滯而内脹也亦兩比對言以互發之意脉浮而大浮為氣實大為血虚血虚為無隂孤陽獨下隂部者小便當赤而難胞中當虚今反小便利而大汗出法應衛家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此爲重虚客陽去有期必下汚埿而死埿與泥同傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背强加溫鍼則衄傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足温者必下重便膿血頭痛目黃者若下則兩目閉貪水者脉必厥其聲嚶咽喉塞若發汗則戰慄隂陽俱虚惡水者若下之則裏冷不嗜食大便完穀出若發汗則口中傷舌上白胎煩燥脉數實不大便六七日後必便血若發汗則小便自利也脉濡而𦂳濡則胃氣微緊則榮中寒陽微衛中風發熱而惡寒榮𦂳胃氣冷微嘔心内煩醫為有大熱解肌而發汗亡陽虚煩躁心下若痞堅表裏俱虚竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷𦂳寒在關元技巧無所施汲水灌其身客熱應時罷慄慄而振寒重被而覆之汗出而冐巔體愓而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顚倒不得安手足為微逆身冷而内煩遲欲從後救安可復追還傷寒脉隂陽俱緊惡寒發熱則脉欲厥厥者脉初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脉多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若熨之則咽燥若小便利者可救之小便難者為危殆下利脉大者虚也以其强下之故也設脉浮革因爾腸鳴者屬當歸四逆湯主之已上六條皆不見有不可下之言倫類不清疑非叔和之舊亦後人之紛亂耳不敢强為之説闕疑以待博識辨可下病脉證幷治第二十一大法秋宜下傷寒冬病也若謂可以春宜吐夏宜汗秋宜下為大法則三法者其如寒之傷於冬何而仲景傷寒之治大法實不外乎三者然則三言之意豈不與仲景之㫖相矛盾乎嗟乎仲景之言經也權在其中三言者不知為誰經不經權不權僭掲三篇條目之首與傷寒例妄僭六經前之逆同傷寒例以當簡篇前也故削之削之則叛經之迹泯而三言者以皆掲條冊首不能削只得存之存之亦亂經之罪著著與泯皆所以為狂妄戒也後之覽者宜鑑於斯凡服下藥用湯勝丸中病即止不必盡劑也此亦叔和語下利三部脉皆平按之心下鞕者急下之宜大承氣湯三部脉皆平血氣和可知矣心下鞕實也所以急也下利不欲食者以有宿食故也當宜下之與大承氣湯不欲猶惡也宿陳久也猶世俗所謂積也問曰人病有宿食何以别之師曰寸口脉浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯此承上文復設問答言脉以申明之之意下利脉反滑當有所去下之乃愈宜大承氣湯下利脉遲而滑者内實也利未欲止當下之宜大承氣湯二條亦承上文又以脉之變者言以詳明之之意病腹中滿痛者此為實也當下之宜大承氣湯實者邪氣甚之謂也下利差後至其年月日復發者以病不盡故也當下之宜大承氣湯其期也謂周其一年之月日期也傷寒後脉沉沉者内實也下解之宜大承氣湯沉以候隂再言沉者謂深沉在裏隂之意也脉雙弦而遲者必心下鞕脉大而𦂳者陽中有隂也可以下之宜大承氣湯雙弦謂左右皆然也弦則為隂遲則為寒心下鞕者謂客寒結滯於膈也大為陽虚𦂳為隂勝陽以府言隂以寒言謂隂寒之邪内實於胃府也辨發汗吐下後脉證幷治第二十二此第十卷第二十二篇凡四十八證前三隂三陽篇中悉具載之此與第十七十八語意同右記十一篇叔和分經及述經外之餘言附已意以撰次之合經亦十一篇共目二十二以為全成仲景氏未韋之遺書者也而第十七十八二十二三篇則又皆抱空名而擁虚位無冊條之可檢實則一十九篇之條册耳皆叔和所紀之舊額如此世固有少此以爲非仲景之全書而起其説者嗚呼是書也仲景之作於建安漢年號也出自叔和之撰述晉太醫令也相去雖不甚逺蓋已兩朝相隔矣是仲景之全書非仲景之全書誠不可曉也然縱非全是不是全非斷可言也是是非非全責在我反我自責則是不是非不非全不全自有可見者在也見一焉則仲景之所以爲仲景者可寤寐皆得全見之矣其神其妙又何待言凡我同袍尚期同勉傷寒論條辨卷八
