body:
  text: 傷寒論條辨卷五明方有執撰辨太隂病脉證並治第六凡九條方二隂經皆屬藏藏病不易治雖然治之得其道則反易愈由其不似陽經之數於變也三隂惟太隂之條目少者孤藏也然以大㮣言之首尾只病三陽而病者極多蓋太陽主表先太陽而病者常也天人之自然也各經之自中鑿説也無此事理也且三陽當病之時得治則愈又况一入陽明則不復轉所以病隂證而病者絶少臨病切要仔細端詳不可苟且忽畧謠俗專以交合隂陽偶爾中傷執爲隂證下醫又快售乃習迷而同醉遂致普通大謬數音速之夫以病在三陽而謂之陽證病在三隂而謂隂證非甚高逺難知也而狥俗者乃膠固執迷而不醒道之不明有以夫一太隂之爲病腹滿而吐食不下自利益甚時腹自痛若下之必胷下結鞕太隂脾經也其脉起於大指之端上循膝股内廉入腹屬脾絡胃上膈挾咽連舌本靈樞曰是動則舌本强食則嘔胃脘痛腹脹身體皆重是主脾所生病者舌本痛體不能動搖食不下蓋脾爲胃之合自利益甚者脾苦濕病而不能爲胃以行其津液水穀不分也時腹自痛者靈樞曰足太隂之别名曰公孫去本節之後一寸别走陽明其别入絡腸胃實則腸中切痛是也胷下結鞕者足太隂之脉其支者復從胃别上膈注心中故誤下則邪反聚其别也二太隂中風四肢煩疼陽微隂澀而長者爲欲愈四肢四末也脾主四末素問曰風淫末疾是也陽微陽經無邪也隂澀太隂綂血血凝氣滯也長陽氣勝也陽主發生故邪自退而病欲愈也三太隂病脉浮者可發汗宜桂枝湯浮為在表太隂之脉尺寸俱沈細今見浮則邪見還表可知然浮為風宜桂枝湯者以太隂之中風言也陽方見太上篇四自利不渴者屬太隂以其藏有寒故也當溫之宜服四逆輩自利不渴濕勝也太隂濕土故曰有寒四逆之輩皆能燠土以燥濕故曰溫之也五傷寒脉浮而緩手足自溫者繫在太隂太隂當發身黄若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也此條二節自不能發黄已上與陽明篇第四十一條上節同下節相反蓋同感異變而各成一家之證也然彼以至七八日反大便鞕為轉陽明此以至七八日暴下利穢腐當去爲脾家實何也蓋脾主為胃以行其津液暴下利則脾得以為胃行其津液矣所以脾爲實而證爲猶繫太隂也彼大便鞕者由脾不能爲胃行其津液而反爲約所以爲轉陽明也然則一脾胃也而反覆之變不同有如此者醫之爲道豈可以易易言哉六本太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之桂枝加芍藥湯方於桂枝湯方内更加芍藥三兩隨前共六兩餘依桂枝湯法腹滿時痛者脾受誤傷而失其職司故曰屬太隂也以本太陽病而反下也故仍用桂枝以解之以太隂之被傷而致痛也故倍芍藥以和之七大實痛者桂枝加大黄湯主之桂枝加大黄湯方桂枝三兩去皮大黄一兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水七升煑取三升去滓溫服一升日三服此承上條而又以胃家本來實者言本來實者舊有宿食也所以實易作而痛速故不曰陽明而曰大實例之變也桂枝加大黄者因變以制宜也然曰桂枝加則補方者當一例如上文云云不當載成方且以本方加也而用芍藥六兩水七升不合數皆後人之苟用者當斟酌焉八太隂為病脉弱其人續自便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也此承上條申致戒謹之意九太隂病欲解時從亥至丑上亥子丑太隂所王之三時也欲解者正王則邪不能勝也辨少隂病脉證並治第七凡四十六條方十五三隂先太隂者太隂正位中宫統倉稟也少隂居下而先於厥隂者隂道逆自下而上也一少隂之為病脉微細但欲寐也少去聲下皆同小少隂腎經也脉微細者少隂居於極下其脉起於趾之下也靈樞曰是主所生病者嗜卧但欲寐嗜卧也蓋人肖天地天地之氣行於陽則闢而曉行於隂則闔而夜故人之氣行於陽則動而寤行於隂則靜而寐然則病人但欲寐者邪客於隂故也二少隂病始得之反發熱脉沈者麻黄附子細辛湯主之麻黄附子細辛湯方麻黄二兩去節細辛二兩附子一枚炮去皮破八片右三味以水一斗先煑麻黄減二升去上沫内藥煮取三升去滓溫服一升日三服發熱邪在表也脉沈少隂位北而居裏也以其居裏邪在表而發熱故曰反也以邪在表不在裏故用麻黄以發之以其本隂而標寒故用附子以溫之細辛辛溫通於少隂用之以佐主治者以其專經而向導也三少隂病得之一二日口中和其背惡寒者當灸之附子湯主之附子湯方附子二枚去皮破八片茯苓三兩人參二兩白术四兩芍藥三兩右五味以水八升煮取三升去滓溫服一升日三服口中和謂不燥不渴裏無熱也少隂之脉貫脊脊背吕也背字从北从肉北天地之隂方也背肉為背人身偕隂之處也陽脉在背根隂之義也經傳謂背為陽者其猶謂桂枝發汗與夫厯家謂月行速之意歟腎居北方其行屬水生於天一故曰少隂然則隂寒湊於少隂宜乎背惡寒而他處不惡也灸之以火者火能助陽而隂自消也主之以附子者附子溫經而寒自散也人參甘溫補其氣以扶陽於生芍藥酸平收其隂而為陽之附茯苓甘淡以利竅逐水以消隂甘以入心順火以従陽术味苦甘苦以燥濕制水而燠土甘以益脾和中而固本也四少隂病欲吐不吐心煩但欲寐五六日自利而渴者屬少隂也虛故引水自救若小便色白者少隂病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩者少隂之脉循喉嚨其支者従肺出絡心注胷中故也自利者腎氣實水無制也虛故引水自救釋上文之渴也白寒色也病形悉具以其本病之口燥舌乾言也小便白者至末反覆申明上文所以曉人勿認煩渴為熱以致誤之意五病人脉隂陽俱緊反汗出者亡陽也此屬少隂法當咽痛而復吐利隂陽俱緊傷寒也傷寒不當有汗故謂汗為反出亡與無同古字通用無陽者汗乃血之液隂主血寒為隂而傷血隂邪湊於少隂隂盛矣故謂無陽以為之衞䕶而汗所以反得自出也咽痛者少隂之脉循喉嚨也其藏屬水所以不惟咽痛而復吐利水無制也六少隂病脉細沈數病爲在裏不可發汗細沈而數裏熱也故曰病為在裏不可發汗惡虚其表也七少隂病脉微不可發汗亡陽故也陽已虛尺脉弱澀者復不可下之微者氣不充故曰無陽無陽則化不行故汗不可發也尺以候隂弱澀者隂血不足也故謂復不可下蓋少隂藏寒其宫作强有出無入有虛無實有補無瀉所以汗下皆不可行而反覆丁寧以示禁止如此八少隂病欬而下利譫語者被火氣劫故也小便必難以強責少隂汗也少隂之脉従足走腹循喉嚨其支别出肺自下而上者也受火之劫火性炎上循經而蒸爍於肺肺傷則氣逆所以欬也下利者少隂屬水其藏虛寒劫迫則滑脱也滑脱而虛故生熱亂而譫語也強責謂過求也小便與汗皆血液也少隂少血劫汗奪血則小便為之涸竭故難也九少隂病下利若利自止惡寒而踡卧手足溫者可治下利隂寒盛也自止寒邪退也惡寒而踡卧其藏本虛寒也手足屬脾溫者脾土和也土和則萬物生故曰可治也十少隂病惡寒而踡時自煩欲去衣被者可治惡寒而踡承上條而言也時或自煩欲去衣被陽熱復也猶之手足溫故亦曰可治也十一少隂病脉緊至七八日自下利脉暴微手足反溫脉緊反去者爲欲解也雖煩下利必自愈緊寒邪也自下利脉暴微者隂寒内泄也故謂手足為反溫言陽囘也陽囘則隂退故謂緊反去為欲解也夫寒邪在隂而脉緊得自利脉暴微手足溫緊去為欲解者猶之邪在陽脉數而熱得汗出脉和身凉數去為欲愈之意同隂陽勝復之理也十二少隂中風陽微隂浮者為欲愈隂陽詳見二難三難陽微者風邪散而表氣和也隂浮者裏氣勝而邪外出也十三少隂病欲解時従子至寅上子丑寅陽生之時也各經皆解於其所王之時而少隂獨如此而解者陽進則隂退陽長則隂消且天一生水於子子者少隂生王之地故少隂之欲解必於此時歟十四少隂病八九日一身手足盡熱者以熱在膀胱必便血也膀胱屬太陽太陽者六經之長也為諸陽主氣與少隂腎為合隂従陽化裏熱達表故一身手足盡熱也熱在膀胱太陽多血腎司開闔隂主下降故熱亂則血出於二便也十五少隂病但厥無汗而強發之必動其血未知従何道出或從口鼻或従目出是名下厥上竭為難治必動其血者汗為血之液不得汗則得血也或従口鼻或従目出者迫則錯經而妄逆也下厥以少隂居下而熱深言也上竭以妄逆言也十六少隂病吐利手足不逆冷反發熱者不死脉不至者灸少隂七壯隂寒吐利法當厥逆者以無陽也手足不逆冷則陽自若而脾胃和故以熱為反發者婉詞也然陽自若則隂為有制脾胃和則五藏六府皆得以受其氣而生也灸之者以其有可生之道所以通其經以遂其生也十七少隂病惡寒身踡而利手足逆冷者不治隂盛無陽故曰不治十八少隂病吐利燥煩四逆者死隂寒吐利而至於燥煩津液内亡而成枯竭也加之四肢厥逆脾土敗絶也十九少隂病下利止而頭眩時時自冒者死頭眩俗謂昏暈是也諸陽在頭然則下利止而頭眩者津液内亡而隂已虛竭陽無依附浮越於外而神氣散亂故時時自冒也二十少隂病四逆惡寒而身踡脉不至不煩而燥者死四肢溫和為順故以厥冷為逆不順也踡不伸也隂主屈故也諸證具見而脉又不至則陽已先絶可知矣不煩而燥孤隂亦欲自盡也二十一少隂病六七日息高者死息呼吸氣也歎聲曰息言歎息之聲髙而散漫無接續生息之意蓋陽氣欲絶故其聲息如此二二少隂病脉微沈細但欲卧汗出不煩自欲吐至五六日自利復煩燥不得卧寐者死脉微沈細但欲卧少經之本病也汗出而不作煩熱無陽也欲吐經中之邪不退也自利藏病進也更復煩燥不得卧寐陽欲絶而擾亂不寧也二三少隂病得之二三日麻黄附子甘草湯微發汗以二三日無裏證故微發汗也麻黄附子甘草湯方麻黄二兩甘草二兩炙附子一枚炮去皮右三味以水七升先煮麻黄一兩沸去上沫内諸藥煮取三升去滓溫服一升日三服無裏證謂不吐利燥煩嘔渇也以無裏證而表又不見故用附子以佐麻黄雖曰微發汗而用甘草以易細辛蓋亦和解之之意也二四少隂病得之二三日以上心中煩不得卧黄連阿膠湯主之黄連四兩黄芩一兩芍藥二兩雞子黄二枚阿膠三兩右五味以水五升先煮三物取二升去滓内膠烊盡小冷内雞子黄攪令相得溫服七合日三服少隂本欲寐反心中煩不得卧者風邪客於裏熱甚而裏不和也黄連黄芩清膈以除風擁之裏熱雞黄阿膠和血以益不足之真隂然阿膠者黑驢皮之膏液也故能逐隂經之邪風雞黄者巽木禽之誕卵也故能定風邪於少隂芍藥下氣以和隂所以為少隂風熱之佐使也二五少隂病身體痛手足寒骨節痛脉沈者附子湯主之少隂腎也腎主骨寒淫則痛然則身體痛手足寒骨節痛者傷寒也沈為在裏是故附子湯者溫裏以散寒之要附子湯方見前藥也二六少隂病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升右三味以水七升煮米令熟去滓溫服七合内赤石脂末方寸匕日三服若一服愈餘勿服腹痛寒傷胃也小便不利下利不止者胃傷而土不能制水也便膿血者下焦滑脱也石脂之澀固腸虛之滑脱乾薑之辛散胃虛之裏寒粳米甘平和中而益胃故三物者所以為少隂下利便膿血之主治也二七少隂病下痢便膿血者桃花湯主之古利無疒疒後人所加治此比上條差輕以便膿血同故亦同二八少隂病下痢便膿血者可刺此承上二條而申著其輔治之意刺所以通其壅瘀也壅瘀通便膿血自愈可者僅可之詞二九少隂病吐利手足厥冷煩躁欲死者呉茱萸湯主之吐則耗陽利則損隂厥冷者隂損而逆也煩躁者陽耗而亂也茱萸辛溫散寒暖胃而止嘔人參甘溫益陽固本而補中大棗助胃益脾生薑嘔家聖藥故四物者為少陽扶危之所須也方見陽明篇三十少隂病下痢咽痛胷滿心煩者豬膚湯主之豬膚一斤右一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服下利寒甚而水無制也咽痛胷滿心煩藏病與心病具見也豬膚本草不載義不可考説者不一用者不同然既曰膚則當以燖豬時所起皮外毛根之薄膚為是但豬屬亥宜入少隂膚乃外薄宜能解外其性則凉固能退熱邪散而熱退煩滿可除也白蜜潤燥以利咽咽利而不燥痛可愈也白粉益土以勝水土王水制利可止也豬膚湯義意者其在於兹乎三十一少隂病二三日咽痛者可與甘草湯不差者與桔梗湯甘草湯方甘草二兩右一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩右二味以水三升煮取一升半去滓分溫再服咽痛邪熱客於少隂之咽喉也甘草甘平而和隂陽故能主除寒熱桔梗苦甘而任舟楫故能主治咽傷所以微則與甘草甚則加桔梗也三二少隂病咽中痛半夏散及湯主之半夏散及湯方半夏洗桂枝去皮甘草炙以上各等分已上三味各别搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煮七沸内散一兩方寸匕更煎三沸下火令小冷少少嚥之咽痛與上同而治不同者此以風邪熱甚痰上壅而痺痛者言也是故主之以桂枝祛風也佐之以半夏消痰也和之以甘草除熱也三物者是又為咽痛之一治也三三少隂病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯方半夏洗破棗核大十四枚雞子一枚去黄内上苦酒著雞子殻中右二味内半夏著苦酒中以雞子殻置刀鐶中安火上令三沸去滓少少嚥下不差更作三劑服之咽傷而生瘡則比痛為差重可知也不能語言者少隂之脉復入肺絡心心通竅於舌心熱則舌不掉也聲不出者肺主聲而屬金金清則鳴熱則昏而塞也半夏主咽而開痰結苦酒消腫而歛咽瘡雞子甘寒而除伏熱已上三條證同而治殊蓋各適其因之宜然爾三四少隂病下利白通湯主之白通湯方蔥白四莖乾薑一兩附子一枚生去皮破八片右三味以水三升煑取一升去滓分溫再服少隂病而加下利者不獨在經而亦在藏寒甚而隂勝也治之以乾薑附子者勝其隂則寒自散也用蔥白而曰白通者通其陽則隂自消也三五少隂病下利脉微者與白通湯利不止厥逆無脉乾嘔煩者白通加豬膽汁湯主之服湯脉暴出者死微續者生白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生去皮破八片人尿五合豬膽汁一合已上三味以水三升煑取一升去滓内膽汁人尿和令相得分溫再服若無膽汁亦可用尿與溺同奴弔切乾此承上條復以其甚者言脉微陽虛也厥逆無脉嘔煩者熱藥治寒寒甚者格拒而不入湯不為用反爭而逆亂也人尿性寒膽汁微寒以之為向導者經曰逆者従之此之謂也暴出燭欲燼而焱烈也微續真陽囘而漸復也然屬加減耳成方疑後人所増三六少隂病二三日不已至四五日腹痛小便不利四肢沈重疼痛自下利者此為有水氣其人或欬或小便利或下利或嘔者眞武湯主之真武湯方茯苓三兩芍藥三兩生薑三兩切白术二兩附子一枚炮去皮破八片右五味以水八升煑取三升去滓溫服七合日三服腹痛小便不利隂寒内甚濕勝而水不行也四肢沈重疼痛寒濕内滲又復外薄也自下利者濕既甚而水不行則與穀不分清故曰此為有水氣也或為諸證大約水性泛濫無所不之之故也真武者北方隂精之宿職專司水之神以之名湯義取主水然隂寒甚而水泛濫由陽困弱而土不能制伏也是故术與茯苓燥土勝濕芍藥附子利氣助陽生薑健脾以燠土則水有制而隂寒退藥與病宜理至必愈後加減法或為諸證之治若欬者加五味子半升細辛乾薑各一兩水寒相摶則欬細辛乾薑之辛散水寒也既散矣肺主欬而欲收五味子者酸以收之也若小便利者去茯苓茯苓淡滲而利竅小便既利不須滲也若下利者去芍藥加乾薑二兩芍藥收隂而停液非下利者所宜故去之乾薑散寒而燠土土燠則水有制故加之若嘔者去附子加生薑足成半斤嘔氣逆也去附子以其固氣也加生薑以其散氣也三七少隂病下利清穀裏寒外熱手足厥逆脉微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脉不出者通脉四逆湯主之通脉四逆湯方甘草二兩炙乾薑三兩强人可四兩附子大者一枚生去皮破八片右三味以水三升煑取一升二合去滓分溫再服其脉即出者愈下利清穀手足厥冷脉微欲絶而裏寒者隂甚於内也身反不惡寒面色赤而外熱者格陽於外也隂陽不相通所以逆亂而有或為諸多證利雖止邪欲罷也脉仍不出陽氣未復也夫脉者血氣之道路血隂也非陽不行薑附辛熱助陽也甘草甘平益氣也湯本四逆而分兩殊通脉則加蔥之謂後加減法同前面色赤者加蔥九莖面色赤陽格甚也加蔥通陽氣也腹中痛者去蔥加芍藥二兩腹中痛真隂不足也去蔥惡其順陽也加芍藥收隂也嘔者加生薑二兩見前咽痛者去芍藥加桔梗一兩咽痛氣結也去芍藥聚氣也加桔梗利咽也利止脉不出者去桔梗加人參二兩利止脉不出見上去桔梗者嫌其載而少暢通也加人參者生其陽而和其隂也三八少隂負趺陽者爲順也此承上文自利而言以示人通診吉凶利害之大意蓋謂少隂屬水其自利者以隂寒甚土弱而水無制也趺陽主胃而屬土負謂趺陽有脉土尚强土强則水有制而少隂反為輸負矣順言不以受制為拘也蓋水惟其有制則卒遵道不得終於泛濫而成大害且萬物資生於土而百骸藉於胃水土平成物類乂安非天下之至順乎古今謂趺陽有脉者不死有以哉三九少隂病四逆其人或欬或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆散方甘草炙枳實破水漬炙乾柴胡芍藥右四味各十分搗篩白飲和服方寸匕日三服分去聲下同而人之四肢溫和為順故以不溫和為逆但不溫和未至於厥冷則熱猶為未入深也故用柴胡解之也枳實泄之也然熱邪也邪欲解本隂也隂欲收芍藥收之也甘草和之也分今之二錢五分也後加減法同前欬者加五味子乾薑各五分並主下痢欬見前並主下利亦散水寒收泄氣之意悸者加桂枝五分心主悸桂枝通心氣也小便不利者加茯苓五分見前腹中痛者加附子一枚炮令折腹中痛寒甚也附子溫之也泄利下重者先以水五升煑薤白三升煮取三升去滓以散三方寸匕内湯中煮取一升半分溫再服下重氣滯也薤白䟽泄也四十少隂病下利六七日欬而嘔渴心煩不得眠者豬苓湯主之下利固乃隂寒甚而水無制六七日欬而嘔渴心煩不得眠者水寒相摶蓄積不行内悶而不寧也豬苓湯者滲利以分清其水穀之二道也二道清則利無有不止者利止則嘔渴心煩不待治而自愈矣方見陽明篇四一少隂病得之二三日口燥咽乾者急下之宜大承氣湯口燥咽乾者少隂之脉循喉嚨挾舌本邪熱客於經而腎水為之枯竭也然水乾則土燥土燥則水愈乾所以急於下也同方見陽明篇下四二少隂病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯水腎邪青肝色腎邪傳肝也心下必痛者少隂之脉其支别者従肺出絡心注胷中也口乾燥見上故治同四三少隂病六七日腹脹不大便者急下之宜大承氣湯腹脹不大便胃實可知急下者少隂屬水惡土實也四四少隂病脉沈者急溫之宜四逆湯脉沈寒邪深入於裏也溫之不容以不急也方見太陽中篇下同四五少隂病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脉弦遲者此胷中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯飲食入口則吐少隂主喉嚨而寒邪客之也少隂之脉絡心注胷中實謂痰壅而上塞也寒以虚言溫有補意四六少隂病下利脉微澀嘔而汗出必數更衣反少者當溫其上灸之數音朔更平聲反少之少上聲能微陽虚也澀血少也汗出陽虚不能外固隂弱不内守也更衣見陽明篇反少者陽虚則氣下墜血少所以勤努責而多空坐也上謂頂百㑹是也灸升舉其陽以調養夫隂也辨厥隂病脉證並治第八凡五十四條方六厥隂之為病消渴氣上撞心心中疼熱饑而不欲食食則吐蚘下之利不止撞陟降切蚘音囘中厥隂肝經也其脉起於大指聚毛之上循股入隂環隂器扺小腹消渴者飲水多而小便少也蓋厥隂屬木邪由少隂傳來少隂屬水木為水之子子能令母虚厥隂之邪熱甚則腎水為之消腎消則引水以自救故消而且渇渴不為水止也氣上撞心心中疼熱者心屬火木火通氣肝氣通於心也饑不能食者胃司食而屬土木邪甚土受制也吐蚘者蚘在胃中無食則靜聞食嗅則出也下之利不止者邪屬厥隂下則反虚陽明陽明屬土土虛則木益賊其所勝也二厥隂中風脉微浮為欲愈不浮為未愈風脉當浮以厥隂本微緩不浮故微浮則邪見還表而為欲愈可診不浮反不然三厥隂病欲解時従丑至卯上厥隂屬木王於丑寅夘之三時正氣得其王時邪退而病解在六經皆然夫以六經各解於三時而三陽解自寅至亥三隂解自亥至夘厥隂之解至寅夘而終少陽之解自寅卯而始何也曰寅為陽初動隂尚强卯為天地闢隂陽分所以二經同王其病之解由此而終始也然則三陽之王時九各不相襲三隂之王時五太隂與少隂同子丑少隂與厥隂同丑寅何也曰陽行健其道長故不相及隂行鈍其道促故皆相躡也四厥隂病渴欲飲水者少少與之愈厥隂屬木木生扵水水求生也少少與潤之也愈木得潤則生也五諸四逆厥者不可下之虛家亦然四逆見少隂篇厥見下蓋厥為四逆之極隂陽既不相順接下則必至扵脱絶故禁勿用也六傷寒脉遲六七日而反與黄芩湯徹其熱脉遲為寒今與黄芩湯復除其熱腹中應冷當不能食今反能食此名除中必死反音板應平聲也反猶左也言不順於道也黄芩湯寒藥也徹亦除應亦當也反能食者胃欲絶引食以自救也中以胃言死謂萬物無土不生也七傷寒始發熱六日厥反九日而利反厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脉之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脉之而脉數其熱不罷者此為熱氣有餘必發癰膿也食以之食與飼同索當作素數音朔以食以飼之也素常也謂以素常所食之餅餌飼之􅄨其情也一説無肉曰素謂不令犯食禁也不發熱言所食之餅化消而無患故曰知胃氣尚在也暴熱謂厥而猛然得熱見陽囘之意也故曰其熱續在期之旦日夜半愈也旦日明日平旦朝而陽長之時也夜半隂盡陽生之時也所以然者已下至夜半愈乃反覆申明上文之意數以候熱癰膿者厥隂主血血熱持久則壅瘀則腐化故可必也八傷寒先厥後發熱而利者必自止見厥復利先厥起於隂也後發熱陽勝也見厥謂復厥也九傷寒先厥後發熱下利必自止而反汗出咽中病者其喉為痺發熱無汗而利必自止若不止必便膿血便膿血者其喉不痺此承上條而言汗出咽中痛陽勝而熱上行也濕則痺咽中痛而曰痺者痰亦濕也厥以得熱為陽囘故發熱雖無汗而利亦必自止便膿血亦恊熱也十傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤應平聲而厥者必發熱寒極而熱復也前熱者後必厥陽極内陷也厥深熱亦深厥微熱亦微以大槩言也厥應下之謂邪在裏也口傷爛赤厥隂之脉上與督脉㑹於巔其支者従目系下頰裏環唇内所以誤汗則熱散亂而唇口傷也十一傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈厥五日熱亦五日隂陽勝復無偏也當復厥不厥陽氣勝也陽主生故自愈可知也十二凡厥者隂陽氣不相順接便為厥厥者手足逆冷是也此掲厥而明其義以申其状案脉經流注手之三隂従腹走至手手之陽従手走至頭足之三陽従頭下走至足足之三隂従足上走入腹然則手之三隂與手之三陽相接於手足之三隂與足之三陽相接於足隂主寒陽主熱故陽氣内陷不與隂氣相順接則手足厥冷也然手足為四肢主之者脾也脾為隂陽不與隂相順接而手足逆冷又可知也十三傷寒脉微而厥至七八日膚冷其人躁無暫安時者此為藏厥非爲蚘厥也蚘厥者其人當吐蚘今病者静而復時煩此為藏寒蚘上入膈故煩須臾復止又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅圓主之又主久痢方烏梅圓方烏梅三百箇細辛六兩乾薑十兩黄連一斤當歸四兩附子六枚蜀椒四兩去汗桂枝六兩人參六兩黄蘖六兩右十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成埿和藥令相得内臼中與蜜杵二千下圓如梧桐子大先食飲服十圓日三稍加至二十圓禁生冷滑物臭食等脉微而厥統言之也膚冷言不獨手足以見陽氣内陷與上文互意也躁無暫安時言熱深且極也藏厥言非在經皆互詞也寒言尚未變熱也桂枝薑附細辛蜀椒勝寒而退隂也人參固氣當歸和血除煩而止嘔也烏梅之酸連蘖之苦安蚘使之静也蓋蚘之為物類有情識聞酸則伏得苦則安利本濕熱所以滯下得苦則泄惟酸能收故雖曰治蚘而下利膿血可通主也十四傷寒熱少厥微指頭寒黙黙不欲食煩躁數日小便利色白者此熱除也欲得食其為愈若厥而嘔胷脇煩滿者其後必便血熱少厥微邪淺也所以手足不冷而但指頭寒黙黙謂無言也不欲食厥隂之脉挾胃也煩躁則内熱故以小便利白色為熱除也欲食邪退而胃囘也厥而嘔胷脇煩滿者厥隂脉挾胃貫膈布脇肋也便血肝不納也十五傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血邪在表則熱入裏則厥厥少則邪散熱多則正復故病為當愈也熱不除至末與上條末三句互相發明十六傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也此反上條而言進謂加重也十七傷寒六七日脉微手足厥冷煩躁灸厥隂厥不還者死灸所以通陽也陽不囘故於法主死也十八傷寒發熱下利厥逆躁不得卧者死腎主躁不得卧藏氣絶也十九傷寒發熱下利至甚厥不止者死此與上條大意同二十發熱而厥七日下利者爲難治厥七日而下利陽不復而裏虚也二十一傷寒六七日不利便發熱而利其人汗出不止者死有隂無陽故也發熱而利裏虚邪入也故曰有隂汗出不止表陽外絶也故曰無陽二二病者手足厥冷言我不結胷小腹滿按之痛者此冷結在膀胱關元也關元在臍下三寸為小腸募故小腹滿按之痛不上結扵胷陽虚也下結扵膀胱關元者隂寒勝故曰冷結也二三傷寒五六日不結胷腹濡脉虛復厥者不可下此為亡血下之死濡音輭亡與無通也腹濡邪在經而裏隂虛也脉者血之府故知無血血亦隂下之死者重亡其隂也二四傷寒脉促手足厥逆者可灸之促謂短促陽氣内陷而脉不至故厥逆也灸通陽也二五傷寒脉滑而厥者裏有熱也白虎湯主之滑以候熱然而厥者熱本寒因故曰裏有熱也與太陽下篇第十三條文相反而意則同互相發明者也故治同而方見彼二六手足厥寒脉細欲絶者當歸四逆湯主之當歸四逆湯方當歸三兩桂枝三兩去皮芍藥三兩細辛二兩通草二兩甘草二兩炙大棗二十五枚擘右七味以水八升煮取三升去滓溫服一升日三服寒與逆同本陽氣内陷也細則為虚隂血不足也當歸芍藥養血而收隂通草細辛行脉而通閉桂枝辛甘助陽而固表甘草大棗健脾以和胃夫心主血當歸補其心而芍藥以收之肝納血甘草緩其肝而細辛以潤之脾統血大棗益其脾而甘草以和之然血隨氣行桂枝衞陽氣固則血和也若其人内有久寒者宜當歸四逆加吳茱萸生薑湯主之當歸四逆加吳茱萸生薑湯方於前湯方内加吳茱萸半升生薑三兩右九味以水六升清酒六升和煑取五升去滓分溫五服一本水酒各四升久寒謂宿昔素常藏府有沈寒也呉茱萸溫藏以散寒也生薑者佐棗以和隂陽也二七大汗出熱不去内拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出陽虚而表不固也熱不去言邪不除也内拘急四肢疼者亡津液而骨屬不利也不利厥逆而惡寒者亡陽而隂寒内甚也四逆湯溫經以散寒囘陽而歛液者也方見太陽下篇二八大汗若大下利而厥冷者四逆湯主之此與上同而較輕故治同二九傷寒厥而心下悸者宜先治水當服茯苓甘草湯却治其厥不爾水漬入胃必作利也漬資四切則金匱曰水停心下甚者則悸然則悸為水甚而厥寒甚也寒無象而水有質水去則寒消入胃者水能滲土也方見太陽中篇三十傷寒六七日大下後寸脉沈而遲手足厥逆下部脉不至咽喉不利唾膿血泄利不止者為難治麻黄升麻湯主之麻黄升麻湯方麻黄二兩半去節升麻一兩一分當歸一兩一分知母十八銖黄芩十八銖萎蕤十八銖石膏六銖碎綿裹白术六銖乾薑六銖芍藥六銖天門冬六銖去心桂枝六銖茯苓六銖甘草六銖右十四味以水一斗先煑麻黄一兩沸去上沫内諸藥煑取三升去滓分溫相去如炊三斗米頃令盡汗出愈唾吐卧切咽下部脉不至者邪乘下後裏虚深入而陽内陷也喉不利者厥隂之脉貫膈上注肺循喉嚨之後也唾膿血者肺金燥而痿也難治者表裏雜亂而不清隂陽暌而不相順接也夫邪深入而陽内陷寸脉沈而遲也故用麻黄升麻升舉以發之手足厥逆而下部脉不至也故用當歸薑桂溫潤以達之然芍藥歛津液而甘草以和之咽喉可利也萎蕤門冬以潤肺而黄芩知母以除熱膿血可止也术能燥土茯苓滲濕泄利可愈也石膏有徹熱之功所以為幹旋諸佐使而妙其用焉三一傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也腹中痛厥隂之脉扺小腹挾胃也轉氣下趣者裏虚不能守而寒邪下迫也三二下利清榖裏寒外熱汗出而厥者通脉四逆湯主之下利故曰裏寒隂不守也外熱故汗出陽不固也通脉四逆救表裏通血氣而復隂陽者也三三下利清榖不可攻表汗出必脹滿此申上條而致戒此條汗出與上條汗出不同上條以自出言此以攻之則出言上言已然者此言未然者脹滿可必者汗出則無陽而隂獨治也三四下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏四逆湯攻表桂枝湯此承上而申致用治之次序腹脹滿裏虚也故溫之身體疼痛表實也故攻之惟虚也故必先之惟其實故可後焉桂四逆湯方見太陽下篇上皆同枝湯方見太陽上篇三五下利譫語者有燥屎也宜小承氣湯既下利而曰有燥屎何也胃熱則屎燥若服湯不能和胃則徒利湯液其燥屎固自若所以譫語也宜小承氣者厥隂易於下也方見陽明篇三六下利後更煩按之心下濡者為虚煩也宜梔子豉湯更煩言本有煩不為利除而轉甚也虚煩並方見太陽中篇三七傷寒下利日十餘行脉反實者死實言邪勝也三八下利有微熱而渴脉弱者令自愈微熱陽漸囘也渴内燥未復也弱邪退也令自愈言不須治也三九下利脉數而渴者令自愈設不差必清膿血以有熱故也清與圊同清脉數與上文微熱互相發明猶言便膿血也四十下利脉數有微熱汗出令自愈設復緊為未解此與上二條互相發明汗出亦陽囘氣徹也緊寒未除也四一下利脉沈而遲其人面少赤身有微熱下利清榖者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虚故也諸陽聚於面少赤亦陽囘也故曰戴陽鬱胃作汗也微厥邪正争也下虚指利而言也四二下利手足厥冷無脉者灸之不溫若脉不還反微喘者死喘言息短而聲不續陽氣衰絶也四三下利後脉絶手足厥冷晬時脉還手足溫者生脉不還者死晬音碎條晬時周時也此與上互相發明四四下利寸脉反浮數尺中自澀者必清膿血清與圊同自寸反浮數者熱轉上逆也尺中澀者熱壅而血瘀也四五下利脉沈弦者下重也脉大者為未止脉微弱數者為欲自止雖發熱不死下重謂滯下也大則病進微弱者邪氣衰也四六熱利下重者白頭翁湯主之白頭翁湯方白頭翁三兩黄連三兩去須黄蘗三兩去皮秦皮三兩右四味以水七升煑取二升去滓溫服一升不愈更服一升此申上條而出其治白頭翁逐血以療癖秦皮洗肝而散熱黄連調胃而厚腸黄蘗者除熱而止泄也四七下利欲飲水者以有熱故也白頭翁湯主之有熱謂亡津液而内燥所以欲飲水也方同上四八乾嘔吐涎沫者吳茱萸湯主之厥隂之脉挾胃屬肝上貫膈布脇肋循喉嚨之後上入頏顙連目系上出與督脉㑹於巔其支者復従肝别貫膈上注肺故靈樞曰是肝所生病者胷滿嘔逆然則厥隂之邪循經而上逆故其證見如此方見陽明篇四九嘔而發熱者小柴胡湯主之小柴胡或為有嘔故通其治五十嘔而脉弱小便復利身有微熱見厥者難治四逆湯主之脉弱雖似邪衰而小便復利則是裏屬虚寒也故曰見厥者難治以身有微熱也故雖厥可以四逆湯得救其陽之復五一嘔家有癰膿者不可治嘔膿盡自愈肝脉其支者上注肺肝主血善嘔血熱瘀與肺痿者皆為癰而嘔膿不可治者謂膿當嘔與邪逆而嘔者不同也五二傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之乾薑黄連黄芩人參湯方乾薑三兩去皮黄連三兩去須黄芩三兩人參三兩右四味以水六升煑取二升去滓分溫再服寒格謂藥寒致成格拒也乾薑人參正治以遏其吐黄連黄芩反佐以通其格五三傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也上條以藥吐下言此以水發汗言亦互明之意五四傷寒噦而腹滿視其前後知何部不利利之則愈噦承上條而言腹滿即寒生䐜脹也前後謂二便也三條疑太陽中篇錯簡傷寒論條辨卷五
