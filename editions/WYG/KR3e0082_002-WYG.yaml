body:
  text: 傷寒論條辨卷二眀方有執撰辨太陽病脈證幷治中篇第二凡五十七條方三十二太陽統攝之榮衛乃風寒始入之兩途寒則傷榮故以榮傷於寒而病者為中篇夫寒冬令也秋末春初以間乎冬寒則有之他時雖或暴變清冷大率不外本序之令氣耳終不得入隆冬嚴寒之例以病言之必也證候顯見如經始可謂為傷寒不可少有分毫違錯蓋經之所以條例各病對比而辨論者正為與傷寒分别爭差也讀者極力反復精䆒其㫖久久成熟一旦貫通則認病自然親切而於凡異説之紛紜者皆不為其所惑矣慎哉一太陽病或已發熱或未發熱必惡寒體痛嘔逆脈隂陽俱緊者名曰傷寒或未定之詞寒為隂隂不熱以其著人而客於人之陽經鬱而與陽爭爭則蒸而為熱已發熱者時之所至鬱爭而蒸也未發熱者始初之時鬱而未爭也必定然之詞惡寒見上篇然此以寒邪鬱榮故榮病而分見惡寒曰必者言發熱早晚不一而惡寒則必定即見也體痛者寒主堅凝而傷榮則榮實而强衛虚而弱矣榮强則血澀衛弱則氣滯故痛也嘔吐也逆俗謂惡心是也胃口畏寒而寒湧也隂謂闗後陽謂闗前俱𦂳三闗通度而急疾寒性强勁而然也難經曰傷寒之脉隂陽俱盛而𦂳澀是也傷猶中也彼此兩相更互發眀言太陽之為病中風固如彼矣若或有如此者則又是觸犯於寒而中之也然隂寒之襲人従榮而入榮血道也寒之所以従榮入者榮亦隂亦従類也猶龍虎之於風雲水火之於燥濕各以其類而相従之自然也此掲太陽分病之紀二乃此篇之小總下條乃申此而互言之詳其義以出其治餘皆此條之差分耳首尾脉絡綱領條目大端悉類上篇乃上篇之對待太陽之大二辨上篇一此其二已下凡首稱傷寒者則又皆指有此云云之謂也二太陽病頭痛發熱身疼腰痛骨莭疼痛惡風無汗而喘者麻黄湯主之麻黄湯方麻黄三兩去莭桂枝二兩去皮甘草一兩炙杏仁七十箇湯浸去皮尖右四味以水九升先煮麻黄減二升去上沫内諸藥煮取二升半去滓温服八合覆取微似汗不須吸粥餘如桂枝法將息此申上條而更互言之所以致其詳而出其治也頭痛已見太陽病而此猶出者以其專太陽而主始病也上條先言或已發熱或未發熱而此先言頭痛次言發熱者則是以其已發熱者言也身疼腰痛骨莭疼痛即上條之體痛而詳言之也上條言必惡寒而此言惡風者乃更互言之與上篇嗇嗇惡寒淅淅惡風雙闗互文之意同無汗乃對上篇之有汗而言以見彼此兩相反所以為風寒之辨别不然無是證者則不言也然所以無汗者汗乃血之液血為榮榮强則腠理閉宻雖熱汗不出也喘氣逆也衛主氣衛弱則氣乏逆呼吸不利而聲息所以不遂也然上條言嘔而此言喘嘔與喘皆氣逆亦互言以眀互見之意麻黄味苦而性温力能發汗以散寒然桂枝湯中忌麻黄而麻黄湯中用桂枝何也曰麻黄者突陣擒敵之大將也桂枝者運籌帷幄之叅軍也故委之以麻黄必勝之算也監之以桂枝莭制之妙也甘草和中而除熱杏仁下氣而定喘惟麻黄有專功之能故不須啜粥之􅂇三傷寒一日太陽受之脉若靜者為不傳頗欲吐若燥煩脉數急者為傳也傷寒者以上二條互言者而言也下倣此一日太陽受之太陽主表而屬外故外者先當也靜謂恬退而和平也𦂳退恬靜和平其為不傳而欲愈可診矣頗欲吐屬上言不甚待吐而不吐盖嘔逆未全止也燥乾也數五六至已上也其主熱急躁疾也欲傳而加進可知也四傷寒二三日陽眀少陽證不見者為不傳也見音現上條舉太陽而以脉言此復舉陽眀少陽而以證言次第反復互相發眀也然不傳有二一則不傳而遂自愈一則不傳而猶或不解若陽眀少陽雖不見太陽亦不解則始終太陽者有之餘經同推要皆以脉證所見為凖若只矇矓拘拘數日以論經則去道逺矣五脉浮者病在表可發汗宜麻黄湯表太陽也傷寒脉本𦂳不𦂳而浮則邪見還表而欲散可知矣發拓而出之也麻黄湯者乗其欲㪚而拓出之之謂也方見前六脉浮而數者可發汗宜麻黄湯浮與上同而此多數數者傷寒之欲傳也可發汗而宜麻黄湯者言乗寒邪有向表之浮當散其數而不令其至於傳也七脉浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脉微此裏虛須表裏實津液自和便自汗出愈此承上條復以其治不如法因而致變者言曉人當知謹也身重下後隂虚而倦怠也悸屬心心主血隂虚則血虚所以心不寧也盖不當下而反下之故證變如此不可汗者禁勿重亡津液以復損其隂也當自汗出乃解者言下雖反而病未甚變須待其津液回當得自汗而解也所以然者已下乃申釋上文之詞裏虚以亡津液言須表裏實以待津液回邪還表言也八傷寒發汗解半日許復煩脉浮數者可更發汗宜桂枝湯主之更平聲重傷寒發汗者服麻黄湯以發之之謂也解散也復復也既解而已過半日之久矣何事而復哉言發汗不如法汗後不謹重新又有所復中也盖汗出過多則腠理反開䕶養不謹邪風又得易入所以新又煩熱而脉轉浮數故曰可更發汗更改也言當改前法故曰宜桂枝湯桂枝湯者中風解肌之法微哉㫖也庸俗不省病加小愈之義不遵約制自肆粗下不喻汗法微似之㫖騁以大汗為務病致變矣反謂為邪不盡汗而又汗輾轉増劇卒致莫救不知悔寤噫讀書不喻㫖趙括鑒矣學醫費人命伊誰鑒邪傷哉九發汗已脉浮數煩渇者五苓散主之己言發汗畢非謂病罷也浮數煩與上同而此多渇者亡津液而内燥裏證也以證有裏而人燥渇故用四苓以滋之以表在而脉浮數故憑一桂以和之謂五苓㪚能兩解表裏者此也方見上篇十傷寒汗出而渇者五苓散主之不渇者茯苓甘草湯主之茯苓甘草湯方茯苓二兩桂枝二兩去皮生薑三兩切甘草一兩右四味以水四升煮取二升去滓分温三服傷寒不汗出汗出者以發之而出者言也然則此條二莭上莭乃承上條而以其不煩者再言下莭乃承上莭而以其更不渇者又出也不煩則熱較輕可知故治亦不殊不渇則内燥更減可識故但用四苓之一以潤之然裏證既輕則表為猶多可必故須桂枝之三以解之然則此湯之四物其桂枝五苓二方之變制與十一傷寒汗出解之後胃中不和心下痞鞕乾噫食臭脇下有水氣腹中雷鳴下利者生薑瀉心湯主之生薑瀉心湯方生薑四兩切甘草三兩炙人参三兩乾薑一兩黄芩三兩半夏半升洗黄連一兩大棗十二枚擘右八味以水一斗煑取六升去滓再煎取三升温服一升日三服噫影成切後解謂大邪退散也胃為中土温潤則和不和者汗無津液邪乍退散正未全復而尚弱也痞鞕伏飲摶膈也噫飽食息也食臭􅖁氣也平人過飽傷食則噫食臭病人初瘥脾胃尚弱化輸未强雖無過飽猶之過飽而然也水氣亦謂飲也雷鳴者脾為隂胃為陽隂陽不和薄動之聲也下利者惟隂陽之不和則水榖不分清所以雜迸而走注也生薑大棗益胃而健脾黄芩黄連清上而堅下半夏乾薑蠲飲以散痞人参甘草益氣而和中然則瀉心者健其脾而脾輸益其胃而胃化斯所以為㵼去其心下痞鞕之謂也十二發汗病不解反惡寒者虚故也芍藥甘草附子湯主之芍藥甘草附子湯方芍藥三兩甘草三兩炙附子一枚炮去皮破八片已上三味以水五升煑取一升五合去滓分温服未汗而惡寒邪盛而表實仇讎之惡也已汗而惡寒邪退而表虚怯懦之惡也盖汗出之後大邪退㪚榮氣衰微衛氣踈慢病雖未盡解不他變而但惡寒故曰虚言表氣漸虚而非病變也然榮者隂也隂氣衰微故用芍藥之酸以收之衛者陽也陽氣踈慢故用附子之辛以固之甘草甘平合榮衛而和諧之乃國老之所長也十三發汗後惡寒者虚故也不惡寒但熱者實也當和胃氣與調胃承氣湯上莭乃畧上條而復言所以起下文而以其反者出也不惡寒其人表氣强也但熱亡津液而胃中乾故曰實也當和胃氣以乾在胃而實也故曰與調胃承氣湯然湯以㵼實而甘草則和中益氣何也盖實成於虚也所謂量而正枘其斯之謂與方見太陽下十四發汗後身疼痛脉沉遲者桂枝加芍藥生薑各一兩人参三兩新加湯主之桂枝新加湯方桂枝三兩去皮芍藥四兩甘草二兩灸人参三兩生薑四兩切大棗十二枚擘右六味以水一斗一升㣲火煑取三升去滓分温服如桂枝法發汗後身疼痛脉沉遲者邪氣驟去血氣暴虚也用桂枝者和其榮衛不令暴虚易得重傷也加人参芍藥者救復其隂陽以益其虚也加生薑者健其乍囘之胃以安其榖也曰新加者得非足一百一十三而成之之謂耶㣲火皆當倣效首方此盖後人之贅耳十五發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黄杏仁甘草石膏湯主之麻黄杏仁甘草石膏湯方麻黄四兩去莭杏仁五十箇去皮尖甘草二兩灸石膏半觔碎綿裏右四味以水七升先煮麻黄減二升去上沫内諸藥煮取二升去滓温服一升更行猶言再用不可再用桂枝湯則是已經用過所以禁止也盖傷寒當發汗不當用桂枝桂枝固衛寒不得泄而氣轉上逆所以喘益甚也無大熱者鬱伏而不顯見也以傷寒之表猶在故用麻黄以發之杏仁下氣定喘甘草退熱和中本麻黄正治之佐使也石膏有徹熱之功尤能助下喘之用故易桂枝以石膏為麻黄湯之變制而太陽傷寒誤汗轉喘之主治所以必四物者而後可行也十六發汗後飲水多者必喘以水灌之亦喘喘屬肺肺屬金金性寒故曰形寒飲冷則傷肺汗後肺氣新虚易得重傷飲水飲冷也水灌則形寒肺傷矣其主氣所以皆喘也十七發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之桂枝甘草湯方桂枝四兩去皮甘草二兩灸右二味以水三升煮取一升去滓頓服汗多則血傷血傷則心虚心虚則動惕而悸故叉手自冒覆而欲得人按也桂枝走隂歛液宅心能固踈慢之表甘草緩脾和中益氣能調不足之陽然則二物之為方收隂補陽之為用也十八發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩去皮甘草二兩灸大棗十五枚擘右四味以甘瀾水一斗先煑茯苓減二升内諸藥煑取三升去滓温服一升日三服作甘瀾水法取水二斗置大盆内以杓揚之水上有珠子五六千顆相逐取用之臍下悸者腎乘心汗後液虚欲上陵心而尅之故動惕於臍下也欲作將作未作之謂奔豚見上篇然水停心下則悸茯苓淡渗勝水能發腎藏之淫邪桂枝走隂降腎能禦奔豚於未至甘草益氣能補汗後之陽虚大棗和土能制為邪之腎水甘瀾水者操之而使其性抵於純不令其得以助黨而長禍也十九發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人参湯方厚朴半斤去皮灸生薑半斤切半夏半升洗人参一兩甘草二兩灸右五味以水一斗煮取三升去滓温服一升日三服汗後腹脹滿者胃中乾陽虚氣滯而伏飲停蓄也人参甘草之甘益胃而滋乾生薑半夏之辛蠲飲而㪚滿然脹非苦不泄所以厚朴者君四物而主治也二十傷寒中風醫反下之其人下利日數十行榖不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虚客氣上逆故使鞕也甘草㵼心湯主之甘草㵼心湯方甘草四兩灸黄芩三兩黄連一兩乾薑三兩半夏半升洗大棗十二枚擘右六味以水一斗煮取六升去滓再煎取三升温服一升日三傷寒中風言傷寒與中風皆有此變證大意與上篇第六十條同醫反下之至心下痞鞕而滿大畧與上篇第三十五條同此多既誤而復誤不得安以上前誤成痞也醫見至益甚言復誤而痞加重也此非結熱至末乃原致痞之因以出其治也甘草大棗之甘益反下之虚乾薑半夏之辛散上逆之滿黄芩黄連之苦解邪熱之煩然證大畧與上篇第三十五條同而方物有同有異者不用桂枝以無表也同用甘草乾薑同為益虚而散鞕也不用参朮惡益氣也用大棗取滋乾也以既誤復誤而痞益甚故用芩連以為乾薑之反佐協同半夏以主散此其所以有異同之分焉二十一傷寒服湯藥下利不止心下痞鞕服㵼心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎已上二味以水六升煮取二升去滓分三服服㵼心湯已巳上承上條而再言之也復以他藥下之利不止言再治之不對醫以理中與之利益甚言愈誤也理中者已下乃眀其誤而出其治難經曰中焦者在胃中脘主腐熟水榖下焦者當膀胱上口主分别清濁主出而不内以傳道也靈樞曰水榖者常并居於胃中成糟粕而俱下於大小腸而成下焦渗而俱下濟泌别汁循下焦而渗入膀胱焉然則利在下焦者膀胱不渗而大腸滑脱也禹餘糧甘平消痞鞕而鎮定其藏府赤石脂甘温固陽虚而枚其滑脱然收滑脱矣而利仍不止者膀胱不渗而水榖不分也利小便者導其水而分清之使府司各行其所有事也府司各行其所有事則利無餘治而愈可必矣二二傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黄黄連㵼心湯表非病初之表下復發汗言踈緩其表之表也解猶救也如解渇解急之類是也解表與發表不同傷寒病初之表當發故用麻黄湯此以汗後之表當解故曰宜桂枝湯言與中風之表同當解肌而固衞也桂枝湯方見上篇攻痞方説見下篇二三傷寒醫下之續得下利清榖不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯清榖不止身疼痛者下後胃傷裏虚寒甚飲食不腐化而水榖不分亡津液而骨屬不利也救䕶也利甚身疼痛而急當救䕶其裏者下後裏虚為重也清便自調言小便清而大便調也小便清大便調裏氣和矣裏氣和而身疼痛者衛不外固而不與榮和也急當救䕶其表者不令重虚之表又易得重傷也救裏宜四逆湯者復陽而收隂也救表宜桂枝湯者固衞以和榮也此救表救裏之所以各有其急也四逆湯方見下篇桂枝湯方同上二四傷寒發汗若吐若下解後心下痞鞕噫氣不除者旋復代赭石湯主之旋復代赭石湯方旋復花三兩人参二兩生薑五兩切代赭石一兩半夏半升洗甘草三兩灸大棗十二枚擘右七味以水一斗煮取六升去滓再煎取三升温服一升日三服解謂大邪已㪚也心下痞鞕噫氣不除者正氣未復胃氣尚弱而伏飲為逆也旋復半夏蠲飲以消痞鞕人参甘草養正以益新虚代赭以鎮墜其噫氣薑棗以調和其脾胃然則七物者養正㪚餘邪之要用也二五傷寒八九日下之胷滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半牡蠣一兩半煆人参一兩半茯苓一兩半鉛丹一兩半桂枝一兩半去皮生薑一兩半切大黄二兩大棗六枚擘右十一味以水八升煑取四升内大黄切如碁子更煮一二沸去滓温服一升胷滿者下後裏虚外熱入裏挟飲而上摶於膈所以煩也驚屬心心藏神而居膈正虚邪勝所以不寧也一身盡重不可轉側者傷寒本一身疼痛亡津液而血澀不利故變沉滯而重甚也夫以心虚則驚也故用人参茯苓之甘淡入心以益其虚龍骨牡蠣鉛丹之重澀歛心以鎮其驚半夏新温以散胷膈之滿柴胡苦寒以除鬱熱之煩亡津液而小便不利参苓足以潤之胃中燥而讝語薑棗有以調也滿在膈中半夏開之非大黄不能滌重在一身人参滋之非桂枝不能和然是證也雖無三陽之眀文而於是湯也總三陽以和之之治可徵也二六下後不可更行桂枝湯若汗出而喘無大熱者可與麻黄杏仁甘草石膏湯主之前第十五條發汗後不可更行桂枝湯云云與此止差下字餘皆同夫以汗下不同而治同者汗與下雖殊其為反誤而致變喘則一惟其喘一所以同歸於一治也然以上篇第四十條誤下變喘用桂枝厚朴杏子湯而觀之則此汗下後不可更用桂枝湯可知矣通考則義全二七傷寒下後心煩腹滿卧起不安者梔子厚朴湯主之梔子厚朴湯方梔子十四枝擘厚朴四兩薑灸枳實四兩湯浸去穰炒已上三味以水三升半煮取一升半去滓分三服温進一服得吐止後服凡下而致變者皆誤也心煩者外邪入裏摶膈而鬱悶也腹滿者虚邪壅胃彭亨而不散也卧屬隂腹滿者隂滯也起屬陽心煩者陽鬱也所以皆不安寧也梔子苦寒快湧心胷之煩厚朴枳實主泄胃腹之滿所以三物者能安誤下後之不能安也二八傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之梔子乾薑湯方梔子十四枚擘乾薑二兩右二味以水三升半煮取一升半去滓分二服温進一服得吐者止後服丸藥誤用不惟病變而且毒遺誤於大下不獨亡隂而陽亦損所以身熱不去而微煩也梔子酸苦湧内熱而除煩乾薑辛熱散遺毒而益氣吐能散滯辛能復陽此之謂也二九傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之梔子豉湯方梔子十四枚擘香豉四合綿裏右二味以水四升先煮梔子得二升半内豉煮取一升半去滓分為二服温進一服得吐者止後服此條結痛比上條微煩則較重一證而爭差分也前以差輕故散之以乾薑此以差重故解之以香豉盖香豉能主傷寒寒熱惡毒煩燥滿悶然則二條者大同小異之分也三十發汗若下之而煩熱胷中窒者梔子豉湯主之此條亦與上同窒者邪熱壅滯而窒塞未至於痛而比痛較輕也心居胸膈所以同為一治三一發汗吐下後虚煩不得眠若劇者必反覆顚倒心中懊憹梔子豉湯主之虚煩不得眠者大邪乍退正氣暴虚餘熱悶亂胃中乾而不和也劇極也反覆顛倒心中懊憹者胷膈壅滯不得舒快也所以用梔子豉髙者因而越之之法也若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之梔子甘草豉湯方於梔子豉湯方内加入甘草二兩餘依前法得吐止後服梔子生薑豉湯方於梔子豉湯方内加生薑五兩餘依前法得吐止後服少氣者氣傷也故加甘草以益之嘔者氣逆也故加生薑以散之凡用梔子湯病人舊微溏者不可與服之梔子酸苦大寒而湧泄病人舊微溏者裏氣本虚而藏府寒也裏氣虚則易湧藏府寒則易泄故掲示禁止如此三三下之後復發汗必振寒脉微細所以然者以内外俱虚故也内謂反下則亡隂而裏虚所以脉微細也外謂復汗則亡陽而表虚所以振寒也三四下之後復發汗晝日煩燥不得眠夜而安靜不嘔不渇無表證脉沉微身無大熱者乾薑附子湯主之乾薑附子湯方乾薑一兩附子一枚去皮生用破八片右二味以水三升煮取一升去滓頓服反下亡隂隂既虚矣又復發汗以亡其陽則陽之虚比之隂為尤甚然陽用事於晝熱之煩陽之亢也躁雖隂陽之擾也不得眠者陽不能勝隂而爭奪於隂也隂用事於夜安靜者無陽事也不嘔不渇無表證脉沉微身無大熱則陽大虚不足以勝隂為諦矣故用乾薑附子偏於辛熱以為湯者恢復重虚之陽而求以協和於偏勝之隂也三五傷寒若吐若下後心下逆滿氣上衝胷起則頭眩脉沉𦂳發汗則動經身為振振揺者茯苓桂枝白术甘草湯主之茯苓桂枝白术甘草湯方茯苓四兩桂枝二兩去皮白术二兩甘草二兩灸右四味以水六升煮取三升去滓分温三服心下逆滿伏飲上溢摶實於膈也氣上衝胷寒邪上湧挟飲為逆也動經傷動經脉振振奮動也盖人之經脉頼津液以滋養飲之為飲津液類也靜則為養動則為病病宜制勝之不宜發汗既吐下後脉又沉𦂳而復發汗則重亡津液血氣衰耗故變如此术與茯苓勝濕導飲桂枝甘草固表和中故發汗動經所需者四物也三六傷寒吐下後發汗虚煩脉甚微八九日心下痞鞕脇下痛氣上衝咽喉眩冒經脉動惕者久而成痿此申上條而復言失於不治則致廢之意上條脉沉𦂳以未發汗言也此條脉甚微以已發汗言也經脉動即動經之變文惕即振振揺也大抵兩相更互發眀之詞久言既經八九日若猶不得解而更失於不治則津液内亡濕淫外漬必致痺而成痿痿者兩足痿輭而不相及也三七太陽傷寒者加温鍼必驚也温鍼者鍼用必先燒温以去其寒性也驚者心有所動而惶懼也盖心乃神之舍故謂心藏神榮氣通於心故榮與心皆主血寒邪傷於榮鬱而蒸熱矣温鍼以攻寒火之性大熱血得熱則耗耗則虚血虚則心虚心虚則舍空舍空則神無所依而氣浮越於外故失守而驚惶也三八傷寒二三日心中悸而煩者小建中湯主之小建中湯方桂枝三兩去皮芍藥六兩甘草二兩灸生薑三兩切膠飴一升大棗十二枚擘右六味以水七升煮取三升去滓内膠飴更上微火消解温服一升日三服嘔家不可用建中湯以甜故也二三日當傳之時不傳不變但心中悸而煩者邪雖衰微正亦虚弱不足以退散之所以持也小建中者桂枝湯倍芍藥而加膠飴也桂枝湯扶陽而固衞衞固則榮和倍芍藥者酸以收隂隂收則陽歸附也加膠飴者甘以潤土土潤則萬物生也建定法也定法惟中不偏不黨王道蕩蕩其斯之謂乎三九傷寒脉結代心動悸灸甘草湯主之炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩去皮麥門冬半升麻子仁半升大棗十二枚擘人参二兩生地黄一斤阿膠二兩右九味以清酒七升水八升先煮八味取三升去滓内膠烊消盡温服一升日三服一名復脉湯脉結代而心動悸者虚多實少譬如冦欲退散主弱不能遣發而反自徬徨也人参甘草麥冬益虚以復結代之脉地黄阿膠麻仁生血以寧動悸之心桂枝和榮衛以救實薑棗健脾胃以調中清酒為長血氣之助復脉以核實義之名然則是湯也必欲使虚者加進而馴至於實則實者自退散而還復於元之意也代本條代下文無代而有隂中間疑漏代一莭脉按之来緩而時一止復来者名曰結又脉来動而中止更来小數中有還者反動名曰結隂也脉来動而中止不能自還因而復動名曰代隂也得此脉者必難治結隂也下當有代脉一股此承結代而推言結隂代隂以各皆詳辨其狀與辨脉下第四章意同四十傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脉浮虚而澀者與桂枝附子湯主之桂枝附子湯方桂枝四兩去皮附子三枚炮去皮破八片生薑三兩切甘草二兩炙大棗十二枚擘右五味以水六升煮取二升去滓分温三服風濕相摶見上篇此以得之寒因故身體疼煩不嘔不渴也不能自轉側者濕主重著也浮風也虚則汗後之不足澀濕也與上篇小異而大同桂枝附子湯者即上篇之甘草附子湯以薑棗易术之變制也去术者以寒本無汗不似風之自汗而濕多也用薑棗者以寒屬隂不如風陽之能食也然去彼取此雖少殊而其所以為散風除濕則均耳若其人大便鞕小便自利者去桂枝加白术湯主之脉經末句湯名無白字桂枝附子去桂枝加白术湯方於桂枝附子湯方内去桂枝加术三兩餘依前法大便鞕裏實矣故去桂枝惡其主表而不知裏也小便自利濕勝也故加术以其益土而能燥濕也此加減舊闕今補四一太陽病項背强几几無汗惡風者葛根湯主之葛根湯方葛根四兩麻黄三兩去莭桂枝二兩去皮芍藥二兩甘草二兩灸生薑三兩切大棗十二枚擘右七味㕮咀以水一斗先煮麻黄葛根減二升去沫内諸藥煮取三升去滓温服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌太陽病項背强几几與上篇同者風寒過太陽之榮衞初交陽眀之經絡經絡下所以風寒皆然也無汗者以起自傷寒故汗不出乃上篇有汗之反對風寒之辨别也惡風乃惡寒之互文風寒皆通惡而不偏有無也夫以太陽中風項背强几几汗出惡風用桂枝加葛根而論之則此太陽傷寒項背强几几無汗惡風當用麻黄加葛根而用葛根湯者何哉盖几几乃加陽眀之時喘已不作故去杏仁不用麻黄湯之全方不可以麻黄加為名而用麻黄桂枝甘草葛根以為湯者實則是麻黄加之規制也用薑棗芍藥者以陽眀屬胃胃為中官薑棗皆和中之物芍藥有緩中之義也不須啜粥麻黄類例也四二太陽與陽眀合病喘而胷滿者不可下麻黄湯主之合病見上篇肺主氣氣逆則喘喘甚則肺脹胷滿者肺脹也胷乃陽眀之部分喘乃太陽傷寒之本病以喘不除甚而至於胷滿故曰合病然肺不屬太陽陽眀而太陽陽眀合病之傷寒病全在肺何也曰肺為五藏之華盖内受諸經百脉之朝㑹其藏金其性寒寒邪湊於榮肺以寒召寒類應故也不可下者喘来自太陽之初滿惟在胷不在胃也夫麻黄湯者主治太陽傷寒之初病有陽眀何以獨從太陽之主治也曰麻黄固善於散寒其功尤能㵼肺家之實滿杏仁惟其利於下氣故其效則更長於定喘桂枝雖佐其實有綱維之妙甘草雖使其才有和緩之髙是故但於太陽表之治行則陽眀胷之功自奏矣四三太陽與陽眀合病者必自下利葛根湯主之必定然之詞自謂自然而然也盖太陽者膀胱也膀胱主水陽眀者胃經也胃主榖寒為隂隂氣主下降故傷寒無他故自然而然下利者太陽陽眀合病經中之邪熱甚胃氣弱不化榖不分清雜迸而走注所以謂之必也以必定自然而然下利故但用葛根湯散經中之寒邪而以不治治利以不治治利者麻黄散太陽之表葛根解陽眀之肌桂枝主榮衞之和薑棗健脾胃之弱甘草者和中之國老芍藥者緩中而佐使夫如是而經中之邪散則胃中之正囘不分清者自分清不顯治者而治在其中矣噫王者不治四境而四境治聖人無為而無不為所謂仁之盡義之之至吾於是乎重有感焉彼以煦煦為仁孑孑為義竊聖人之王道以亂名實者謂不自欺以欺人乎悲哉四四二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽眀續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之薫之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脉澀故知也轉與傳同見第五問之併病見上篇太陽初得病時至不惡寒是原致併因若太陽證不罷至解之熏之是言治之之次第若發汗不徹至末是反復申上文之詳徹除也去也不徹言汗發不如法病不除去也越散也言怫鬱不散也澀為血虚血虚者汗出過多也所以轉陽眀也四五傷寒六七日結胷熱實脉沉𦂳心下痛按之石鞕者大䧟胷湯主之沉為裏𦂳為寒結胷故心下痛熱實故石鞕方見上篇葢證同也四六小結胷病正在心下按之則痛脉浮滑者小䧟胷湯主之小䧟胷湯方黄連一兩半夏半升洗栝蔞實一枚大者右三味以水六升先煮栝蔞取三升去滓内諸藥煮取二升去滓分温三服正在心下言不似大結胷之髙而在上也按之則痛言比不按亦痛則較輕也浮則淺於沉滑則緩於𦂳此結胷之所以有大小之分也黄連苦寒以泄熱也半夏辛温以散結也栝蔞實苦而潤苦以益苦則致熱於易泄為可知潤以濟辛則散結於無難開可必所謂有兼人之勇而居上功者惟此物為然也四七傷寒十餘日熱結在裏復往来寒熱者與大柴胡湯但結胷無大熱者此為水結在胷脇也但頭微汗出者大䧟胷湯主之水即飲也以不實鞕故曰水結胷脇亦裏也以熱結不髙故曰在裏此條兩節上莭以往来寒熱故用大柴胡湯下莭以水結無大熱故用大䧟胷湯然熱結與水結胷脇與裏皆互詞大同小異皆下法也二方俱見上篇四八太陽與少陽合病自下利者與黄芩湯若嘔者黄芩加半夏生薑湯主之黄芩湯方黄芩三兩甘草二兩灸芍藥二兩大棗十二枚擘右四味以水一斗煑取三升去滓温服一升日再夜一服黄芩加半夏生薑湯方於黄芩湯方内加半夏半升生薑三兩餘依黄芩湯法陽眀間太少而中居太少病陽眀獨能逃其中乎是故芍藥利太陽膀胱而去水緩中黄芩除少陽寒熱而主腸胃不利大棗益胃甘草和中是則四物之為湯非合三家而和調一氣乎然氣一也下奪則利上逆則嘔半夏逐水散逆生薑嘔家聖藥加所當加無如二物四九傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之柴胡加桂枝湯方柴胡四兩桂枝一兩半去皮人参一兩半甘草一兩灸半夏二合半洗黄芩一兩半芍藥一兩半生薑一兩半切大棗六枚擘右九味以水七升煮取三升去滓分温服支節四肢百莭也支結言支飲摶聚而結也發熱至微嘔太陽之表也故曰外證未去以微而未去也故加桂枝以解之支結屬少陽以結則難開也故用柴胡為主治然則是證也雖無太少之眀文而於太少之治以究之則亦因藥可以知病矣五十傷寒四五日身熱惡風頸項强脇下滿手足温而渴者小柴胡湯主之身熱惡風太陽表也頸項强有陽眀也脇下滿少陽也然則三陽俱見病矣手足温而渴者邪湊半表半裏而裏證見也夫以三陽俱見病而獨從少陽之小柴胡以為治者太陽陽眀之邪微少陽近裏而裏證見故從少陽一於和而三善則皆得也五一傷寒陽脉澀隂脉弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之陽主氣澀主痛隂主血弦主急投以小建中者求之於益隂而和陽也不差則不對可知矣小柴胡者少陽之主治也盖少陽屬木其脉弦木盛則土受制故澀而急痛也然則是治也者伐木以救土之謂也五二傷寒五六日已發汗而復下之胷脇滿微結小便不利渴而不嘔但頭汗出往来寒熱心煩者此為未解也柴胡桂枝乾薑湯主之柴胡桂枝乾薑湯方柴胡半斤桂枝三兩去皮乾薑三兩栝蔞根四兩黄芩三兩牡蠣三兩熬甘草二兩炙右七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服初服微煩後服汗出便愈胷太陽陽眀也脇少陽也小便不利太陽之膀胱不清也渴而不嘔陽眀之胃熱而氣不逆也頭汗出者三陽之邪熱甚於上而氣不下行也往来寒熱心煩者少陽半表半裏之邪出入不常也柴胡黄芩主除往来之寒熱桂枝甘草和解未罷之表邪牡蠣乾薑鹹以耎其結辛以散其滿枯蔞根者苦以滋其渴凉以徹其熱是湯也亦三陽平解之一法也五三太陽病十日以去脉浮細而嗜卧者外解已也設胷滿脇痛者與小柴胡湯脉但浮者與麻黄湯脉浮細而嗜卧者大邪已退血氣乍虚而肢體倦怠也胷滿脇痛則少陽未除故與小柴胡以和之脉但浮則邪還表故與麻黄湯以發之五四傷寒十三日胷脇滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之柴胡加芒硝湯方於小柴胡湯方内加芒硝六兩餘依小柴胡湯法十三日過經也不解壊利也非其治也已上乃原其壊由於醫之誤已下至末救誤之治也然㣲利矣加芒硝以更下之者丸之為丸大率辛熱物雖快攻下下者藥也熱以益熱熱結反實而不出故須鹹以耎之也五五傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解若心下滿而鞕痛者此為結胷也大䧟胷湯主之但滿而不痛者此為痞柴胡不中與之宜半夏㵼心湯半夏㵼心湯方半夏半升洗黄芩三兩乾薑三兩人参三兩黄連一兩甘草三兩炙大棗十二枚擘右七味以水一斗煑取六升去滓再煎取三升温服一升日三服此條上節與上篇第六十三條互相發眀盖風寒至少陽證治無差殊故更互為文而互言之以見彼此皆然也若心下滿已下二節乃復言其變以出其治結胷乃其變之重者以其重而結於胷故從大䧟胷湯痞則其變之輕者以其輕而痞於心故用半夏㵼心湯半夏乾薑辛以散虚滿之痞黄芩黄連苦以泄心膈之熱人参甘草甘以益下後之虚大棗甘温潤以滋脾胃於健曰㵼心者言滿在心膈而不在胃也五六本以下之故心下痞與㵼心湯痞不解其人渴而口燥煩小便不利者五苓散主之㵼心湯者本所以治虚熱之氣痞也治痞而痞不解則非氣聚之痞可知矣渴而口燥煩小便不利者津液澀而不行伏飲停而凝聚内熱甚而水結也五苓散者潤津液而滋燥渴導水飲而蕩結熱所以又行為消痞滿之一治也五七婦人傷寒發熱經水適来晝日眀了暮則讝語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈無與毋通此與上篇末三條文少異而證同上篇言脉與如結胷狀此言畫日眀了暮則讝語上篇言刺期門及與小柴胡湯此言無犯胃氣及上二焦皆互言以眀互見之意晝屬陽眀了者隂邪退也暮屬隂讝語者血證得隂而劇也毋者禁止之詞犯胃氣以禁下言也上二焦謂上焦中焦以禁汗吐言也盖衛氣出上焦津液蓄於中焦汗則損衛氣而亡津液是汗則犯二焦也又上焦主受納中焦主受盛吐則納與盛俱為逆是吐則上中二焦亦俱犯也然下固損胄下焦犯矣是三法皆不可用也三法皆不可用者邪本在血室亦非三者攻之所可能及也必自愈者言伺其經行血下則邪熱得以隨血而俱出猶之紅汗而然故决言必定自解而愈以警人勿妄攻取致謬誤以生變亂之意夫以三法既皆不可用則與其欲治寧刺期門及與小柴胡湯而法在焉即此條之必自愈而觀之則上篇之期門雖不刺小柴胡湯雖不行亦皆得終當自愈從可知矣且上篇出三條而此篇一條下篇雖無出要皆欲人同推也讀者通考而叅詳之則男子婦人風寒為病證治之異同大端可見矣傷寒論條辨卷二
