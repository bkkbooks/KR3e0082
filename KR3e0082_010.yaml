body:
  text: 傷寒論條辨卷十明方有執撰或問問經何十二曰應十二辰數也曰六而本之三隂三陽者道生於三一隂一陽之推也是故言六則十二在其中言十二則五藏六府四體百骸週身内外所有無一物不在其中矣經在人身中一定而不移無時而不然病發於人身舍經何言哉昧者不察但醉生夢死於傷寒傳六經之一語六經豈獨傷寒之一病為然哉病病皆然也又若小智則亦知一不知二舍手而言足愎彼而迷此殊不知人身之隂陽天地之隂陽也隂陽之在天地而於其升降往来進退消長之所以然者可容以一毫智故言哉手經之隂陽居人身之半足經之隂陽亦居人身之半若謂傳一半不傳一半則是一身之中當有病一半不病一半之人也天下之病傷寒者不為不多也曾謂有人如此乎有則是矣如曰無之則是自眯其目而謂人不見見不明不亦大謬乎孔子曰道之不明也我知之矣智者過之愚者不及也愚者之不及則亦已矣道固自若也大智如舜聞其好問而好察邇言用其中於民矣未聞何過也故惟小智一或過之非穿則鑿一鑿與穿百邪蜂起道何如哉雜矣亂矣晦塞矣厄矣道本乎天而曰厄矣天將謂之何天下可言哉後學君子達而明之上也未至於達不厭而勉焉次也勉而力不足寜畫可也無若小智焉不為斯道厄道之幸也天之慶也天下之望愚之日望也問素靈之言六經起於中焦手太隂肺陽明大腸次足陽明胃太隂脾次乎少隂心太陽小腸次足太陽膀胱少隂腎次手厥隂心包少陽三焦次足少陽膽厥隂肝復從肝别貫膈上注肺傷寒論之言六經起於太陽次陽明次少陽太隂少隂厥隂兩不相同何也曰六經之在人身猶六合之在天地本無終始之可言素靈之起於手太隂肺一隂而一陽手而足足而手如此而終於厥隂肝又復注肺者葢以血氣之在經道中流行而循環分拆不開無起止可言借肺以言始平人之常也傷寒論之起於太陽遍三陽而後歴三隂者葢以風寒之中傷人人是通身四面上下皆當之其邪亦是如此而皆進然其進也有漸故次第人身外體之軀殻為三重第一薄外皮膚一重太陽所主之部位也第二肌肉一重陽明之部位也第三軀殻裏府藏外匝空一重少陽之部位也如此一重一重逐漸而進三陽主表之謂也及其進裏裏面内藏亦第為三層逐層亦是如此而漸上三隂主裏是也葢經是各居其所的其各該所轄部屬方位之處所皆拱極而聽命的以邪之進也不由經道而在部位方所上超直而徑進故但提綱挈領舉六該十二以為言病情事實文字之權宜也二説之所以不同者各就事理以言其規則耳非謂必如此以為始終之定體也後人不首以身體察只管在紙筆上抝氣辟如水底摸月形影不知空自紛紛鑿鑿千五百年来舉世若説夢豈不大為可笑大為可笑問太陽有綱有紀有目餘皆不然何也曰經為綱變為目六經皆然也太陽一經緊闗有始病榮衛之道二所以風寒單合而為病三三病之變證一百五十八故分三病為三紀以為各皆領其各該所有之衆目以統屬於太陽邪過太陽而交餘經則榮衛皆不在論矣以榮衛自後皆不在論故皆即病於經但仍皆舉綱張目而省紀不須問經之為經一也太陽何獨分三治曰太陽一經猶邊疆也風也寒也風寒俱有也三病猶三寇方其犯邊之初南北東西隨其所犯禦之當各明辨其方法辟如陸之車馬水之舟船有所宜有所不宜是故桂枝麻黄用之在各當其可夫是之謂道也餘經猶服裏盜賊在内為寇則同隨在執之是已不在屑屑必以外来為别也問太陽篇中之言傳陽明少陽篇中又有言轉夫傳則傳矣而又曰轉轉非回轉之謂乎曰非也二字皆當音去聲而讀囀傳是驛傳之傳轉是輪轉之轉傳轉無文六書之轉注字仲景之所以更互而迭用者葢以明其合為一音義欲人思而得之之意也葢風寒遍歴人身之六經正猶人行囀路而過處所耳後人不思只單讀傳為平聲如字而置轉於不理會此義不明妄鑿傷寒傷六經之謬説遂使雜亂紛然蜂起而聚訟卒致此書於閣置孽由此作也論語曰學而不思則岡注曰不求諸心故昏而無得嗚呼一人之昏禍延天下流毒至今為學而至此可不令人長歎哉問傳轉皆讀囀此書之音義如此然則七傳間蔵傳之傳與此音義異同何如曰不同七傳間藏傳是五藏自病病自内出葢五藏有相生相剋之性能故以夫婦之相剋而有七傳母子之相生而有間藏傳正得父子相代而相傳之天然故曰傳流傳之謂也風寒本天之二氣於人病為外邪故其漸次經歴人身之六經有如囀路行過方所之委曲傳轉之謂如此其義自别何可以同言問素靈之起太隂而經以十二言固是言平人之常傷寒論之起太陽而經以六言則是言病時之變也惟其常故無議以其變故多口與曰傷寒論之書本素問熱論之㫖也熱論畧傷寒論詳以畧而言辟如八卦起艮之連山起坤之歸藏也以詳而言辟如六十四卦起乾之易也孟子曰前聖後聖其揆一也有能繼之者則皇極經世可得擬而有也世無堯夫故口多耳以多口言之辟如猩猩與鸚鵡囂囂諜諜安知其心不以為能出乎其類而自諒哉噫可慨也已問榮衛曰榮衛者三病始分之二道也二道明三方對則三病無餘治此仲景之所以聖也二道迷三方惑則雖三百九十七一百一十三猶以為未之足其鑿鑿之所以囂囂與未及六七日而風寒有不救者榮衛不明之罪也問傳轉曰傳轉者六經盈縮之璣衡也六經明則傳轉之機審傳轉昏則拘拘數日以論經此風寒之所以有治不治之分也已過十三日而有不愈者傳轉不明之罪也問兩感曰以虚者受病言之風寒之病表虛而病也表虚則裏實故曰熱雖甚不死然則两感於寒而病必不免於死者盖以表裏俱虚言也惟其俱虚故為不治仲景亦傳之不論大羌活湯要亦不過存此活人之心云耳則可烏在能奈何兩感之萬一於可必哉然亦智者過之之一事近世以其謂能治兩感而不察遂用之為通治風寒之套藥是又焉得不謂之愚者不及知之一叕邪問醫有内外内者何曰人是也外者何曰天是也知人而不知天知内不知外也知天而不知人知外而不知内也知天知人則知道矣舍天人而言内外者非道也謬也問風寒必自太陽而中傷而諸家乃有各經自中之説其説何如曰自中不在此中論此書之論論外入也以論外入故始太陽太陽者皮膚也皮膚之固䕶人身猶城郭之衛䕶治所經絡藏府者辟如城中之百物耳寇盜雖强豈能不由城郭騰空犯内而傷人害物哉無是理也今以太陽掲中傷而言傳陽明更轉以互音義少陽言陽去入隂通章之大旨而玩味之則風寒浸進之實義昭然甚明又何必亂鑿叛經之剰説然則各經無自中邪曰非謂無也人病不外則内以内出言何可謂無中經中絡中府中藏是也此書無此此義不明則自誤矣一有自誤則必誤人是故古之君子為學必専務實用其力於為已今人則不然欲求無誤難矣哉問條目中太陽中風陽明中風少陽中風三隂亦如此而歴言非各經自中之謂乎曰非也葢謂中風矣初起證見太陽則謂之太陽中風明日風又明日證轉見陽明而少陽則又謂之陽明中少陽中風三隂亦如此傷寒亦如此葢此書通篇大義是自首貫串至尾一氣説下來脈絡分明無有間斷與諸家零零星星一節一意不相聯屬者不同學者務要瞻前顧後徹首徹尾反来復去千遍熟讀沉潛深思則義理自見自然有得洪範曰思曰叡叡作聖思是聖學功夫為學不可不思問説者皆在中傷感冒上認病辨輕重諸説孰優曰中傷是素靈互用之二字兩感是熱論推病之轉語冒是呉俗之常談認病當如嘗酒醇醨美惡只可在水米麴蘖中理虚實不當向醟釀篘漉上清滋味問先夏至為病溫後夏至為病暑曰暑必小暑令行而氣至小暑在夏至後一氣故謂夏至前猶是温言春氣未全除也夏至後始是暑節令已行也然自意為醫以來温變為瘟暑為寒寒遍四時瘟滿天下夏之至不至無復論矣欲生民之命各不失其正其可得乎問天有六氣風寒暑濕燥火風寒暑濕經皆掲病出條例以立論而不掲燥火燥火無病可論乎曰素問言春傷於風夏傷於暑秋傷於濕冬傷於寒者葢以四氣之在四時各有専令故皆専病也燥火無専令故不専病而寄病於百病之中猶土無正王而寄王於四時辰戌丑未之末不揭者無病無燥火也條目中理㑹自見問虚者受病衛中風也而曰榮虚何也曰風之中也本榮實而衛虚也風既中矣則衛實而榮虚矣虚以對實為言衛家本虚得助則實榮家本實無助反虚故醫家之言虚實凡虚皆正氣虚凡實皆邪氣實非别家泛言虚實之可比也經曰邪氣盛則實精氣奪則虚又曰入者為實出者為虚此之謂也問經之用方皆言主之後人則云専治兩意同否曰不同主之者示人以樞紐之意也専治則必人以膠柱矣問桂枝辛甘大熱經之用其取發㪚為陽之義與曰中風發熱汗出衛不固而表疎發㪚何取哉然一則曰發汗二則曰發汗何也曰經不云乎桂枝本為解肌又不云乎汗不出者不可與也既曰本為解肌又曰汗不出者不可與則豈發汗之謂哉桂枝有固衛之良能解肌乃中風之與義妙不可言也然則發汗者果為誰也曰熱粥也妙在此也韓信以死地與士卒得效死之士卒而收背水之功仲景以汗法與熱粥得逼汗之熱粥而成桂枝之效醫道與將道通也非天下之至神其孰能與於此謂桂枝難用者曽知此乎噫仲景逺矣可以與之語夫此者誰哉賈生有言可為長太息者此也問桂枝本為解肌而一則曰發汗宜桂枝湯二則曰發汗宜桂枝湯何也曰風之為病外邪也故於其初也法曰當發汗然汗既自出也衛行脈外故曰本為解肌發汗以例言發語之辭也解肌以義言核實之謂也故曰解肌乃中風之奥義妙不可言也學者能了悟桂枝發汗解肌之義例則於入此書之道已過第一闗隘矣不患不升堂入室也謂桂枝難用與凡類集桂枝湯方於已之傷寒門謂為有汗傷寒之治者徒知桂枝發汗之例何嘗知其解肌之義哉問几几曰几自説文以来皆言鳥之短羽者不能逺飛動則引頸几几然故仲景取以形容病人之頸項俱病者俯仰不能自如之貌肖峰吳氏六書總要書文如此注鳥飛逺影葢冇據也然此以訓釋仲景故但從舊説而於文之是非注之得失則皆不論問風土之異東南偏暖西北偏寒故説者謂東南之人不病風寒偏病暑濕西北之人不病暑濕偏病風寒其説然否曰難以此拘也靈樞謂夫天之生風者非以私百姓也其行公平正真犯者得之避者得無殆非求人而人自犯之然則四氣之所以為人病在人之自犯不自犯何如耳不在四氣之偏不偏乃爾也以犯而言則東南之人何嘗不病其東南之風寒西北之人豈可不病其西北之暑濕何也事有偶然機有不測理不可以一途取也今也必欲以偏言則淮南子曰北漠出毡裘干越生葛絺各生所急以備燥濕各因所處以御寒暑並得其宜物便其所故兵家有言朔陲積隂之野食肉飲酪其人理宻故耐寒百粤多陽之地其人理疎故耐暑是其天性然也如此則是地雖限人以偏天則全人以性天地以生物為心而謂以其氣之所不能齊者適所以病人豈天地之自然哉亦過論矣且夫得氣之先莫如禽鳥以燕鴈同有無之鄉言之彼此雖偏相差不甚相逺可知也乃若積氷不雪不青不毛之地此固判然天地之殊方異域偏之甚無過於此矣然而大禹聖人定千八百國解衣入祼無所不之賢如諸葛五月渡瀘深入不毛牧羝大窖中餐氊齧雪十九年而生還諸如此者雖履偏之甚猶且不病非有主不犯之明騐乎是故君子立言必以天下之常人所同有者明道以垂大中至正之教不作聰明騁竒僻誕浮泛以鑿無馮之濫説經曰知犯何逆隨證治之知犯何逆以法治之葢謂知是風則以風治之知犯寒則以治寒之法治之明知是三陽主犯則治以三陽知已在三隂則治以三隂何嘗専東専西執南執北駕偏言以惑亂天下後世哉故世稱聖言其正也問太陽與少陽併病以眩也故刺肝俞以冐也故刺肺俞夫膽與肝合故刺肝俞所以瀉少陽也而肺非膀胱之合膀胱之合腎也不刺腎俞而刺肺俞何也曰東方肝木其蔵則實其俞可刺而况在少陽之眩乎腎居北方其藏屬水其官作强有虚無實有補無瀉不可刺也然腎生氣肺主氣膀胱必氣化而出且肺為相傅之官故不可刺之腎而曲暢旁通其治於肺焉至徳要道也精微之妙學者不可不知問胃實曰胃廩水穀而幾死生膀胱主分清而闗通塞實由熱燥而後結結由清分而後成分淸在䦨門論道曰胃實醫家多婉辭葢道有經有權也可與語經而不可與語權惡足與語道哉故曰權者聖人之大用問背惡寒説者引經謂背為陽夫水氷地凍皸膚墮指而面獨不畏寒者以諸陽皆聚於面故也今背惡寒而謂為陽何病而至隂陽之乖戾有如此乎曰病在少隂少隂綴脊而屬背也以太陽之脈夾脊循背則背似可以陽言以府為陽而居前藏為隂而麗背則背又不可以陽言矣天地以北為背北天地之隂方也故君主之位必南面重向陽也六書北肉為背北肉則違陽矣然則謂背為陽為其違之訛邪故曰經傳謂背為陽者其猶厯家謂日月為右旋之説與謂日月為右旋之説者有所取用而左其説也此背之所以為陽而惡寒也問風寒之病大勢未除藥補太早恐邪留不去似非治法所宜以五六日之間邪屬半表半裏往来寒熱正熾方用人參三兩其義何居曰表裏者人身之隂陽也往来者邪氣之出入也故曰入而併於隂則寒出而併於陽則熱人參何補邪固氣之物也是故主之以柴胡以其能除寒又除熱也人參固其氣不使其走進又走出也謂人參補藥者觀場之矮子徒聞人參之補名未見人參之補義也問隂陽易勞復孰輕重曰事雖兩端理則一致皆死道也易是不怕死復是不顧死無輕重可言經雖有治葢欲令人於死中求活期一二於千百之意耳豈謂十全可必哉孟子曰知命者不立乎巖牆之下君子無輕生以自取可也問今人病風寒每多食復經何無食復曰有食禁矣又何復哉不出復者立法惟嚴不可玩也問平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一呼再至一吸再至呼吸是何處見行是如何行至是如何至曰一呼一吸是以診家言至是以尺寸言一至再至是以出入言越人法也先越人時十二經之至皆用也越人用他皆不用矣行是以經隧言三寸六寸是順循環而演推歩也應九九而成八百一十丈者一晝夜五十度周身通該之具數也理貴得中過猶不及此虚實盛衰夀夭死生所以不能逃乎三指一按之下也問經隧與尺寸曰脉者血之府血之榮於人身猶水之行地中鑿地得泉不可謂水專在是血脉亦然經隧猶原泉而江河尺寸猶河之有洪泉之有瀑故在經隧則流而不息藏精而神不露所以行而有常在尺寸則動而不静著靈而用以顯故至而可診然行者何嘗不至特俱𨼆耳至者亦豈不行但不兩見耳一之則不明二之則不是葢一而二二而一並行不悖神化莫測此之謂道也問來去二字且如凡物之來也必轉身回頭才好去及其去也亦必轉身回頭才好又來脉之一來一去可是如此否曰不來不去無以言至來去者所以明至也至是箇活字來去極要看得活脉道辟如江河血辟如水氣辟如風來去至止辟如波浪水淺風小則波水深風大則浪江河只是波浪大海必定起濤人大脉大人小脉小同此理也腎脉重十五菽亦濤也人所同也十二經皆有動脉難經開卷第一語然則十二經皆至不獨尺寸也三難曰闗之前陽之動也闗之後隂之動也如此則是以動字互至字讀則通來去至止皆容易明白大抵看脉家書要當求作者之精微於言語文字之外才可不然損至亦是至厥厥動揺亦是動於此等不以意逆而體貼詳細只管尋章摘句而咬文嚼字若之何其可以了了於胷中乎問呼吸者脉之頭也頭訓頭緒何也曰脉無頭尾可言頭緒俗謂頭腦是也蓋脉之所以為脉由人之一呼一吸使之而然而呼吸之所以為呼吸者要皆無非隂陽二氣屈伸舒歛以神其用而為之也然氣無常用㮣而言之則盈虚盛衰呼吸亦因之而更變極而言之在則有呼吸而人以生去則呼吸亡而人以死故曰呼吸者脉之頭也此語極精顧人味之何如耳脉經無吸字以無吸字只就呼者脉之頭也而觀之似覺不費解些然精詳少一吸字則非仲景語便看得出來了叔和於此處不檢㸃可見叔和不過只好做得箇叔和而仲景畢竟到底還是箇仲景一毫也不錯問仲景曰聖賢之生不偶然也本草作而醫道興有農氏以生民之疾病為已憂者天啟之也是故有本草則必有素靈有素靈則必有難經有難經則必有傷寒論何也天以斯道濟斯民必生若聖若賢者先後開繼符合若一以全其成也説者謂軒岐為託是蓋意其有所不屑而於斯道小視云耳孫思邈曰不知大易不足以言醫程子曰五經如藥方春秋如治病用藥醫可小云乎哉治道也竊嘗思之素靈之書有自文字之始其來乆逺若謂八十一篇之中有無弊雜誠不可知而曰渾不出於帝伯君臣之問答則開物成務之微言非聖非賢必不能有此其初也仲景生於漢季發身孝廉則其所以為仲景可知矣以宗族二百餘口不十年而死者三之二傷寒居其七以著論嗚呼斯時也傷寒何如是其多邪建安去上世千餘年矣有法無方道未備也醫於此時者謂不㝠行索塗邪此仲景之書所以證如此者名曰中風曰桂枝湯主之證如彼者名曰傷寒曰麻黄湯主之傳病如此治如此方變證如彼治如彼方託論傷寒以名書實經綸斯道錯綜條貫之本末畢舉開示後學以為斯道之日星喫緊繼素難而作也非天啟邪方其去長沙而上乎京師非由其不忍當日生民不得其正命之心而發邪則其本諸身者無非天徳之良故其措諸事業而所以繼述墳典者一皆皇道之正此其所以聖當時祖百代賈生所謂不居朝廷者至是而愈足徵焉素難以下一人而已朱子曰天不生仲尼萬古如長夜唐子西嘗於郵亭梁間見此語繇此語而觀之則凡行道之人無有不知孔子之所以為孔者可知也愚每讀此書蓋嘗竊歎天不生仲景萬病如黒漆耳醫門孔子之稱不有以哉故曰儒必孔子正為儒必宗孔子醫必仲景正學醫必宗仲景儒而不宗孔子儒名而墨行者有之醫而不宗仲景醫名而賈事者紛紛然也嗟乎今之時去仲景之時益逺矣鈐搥活人類證纂要賈衒以泛濫於天下人各以意為醫而仲景之道不盡湮沒者徒此虚文吁醫可以意言哉大學之道以誠意貫終始朱子曰正意不可無邪意不可有今之所謂意者果如何其意邪愿矣鄉人之所愿也君子之所愿哉昔者楊墨之説横流乃所願則學孔子者孟子一人卓然之意如是也愚雖不敏竊嘗願學孟子之所學矣以疾厄奪因願學仲景是故條辨者願來學學仲景之愚意也問傳謂以宗族二百餘口不十年而死者三之二傷寒居其七乃著論然則假使當日張氏之宗族不如此則仲景之論亦著否曰圗出而卦畫書出而疇叙麟出而春秋作者道在聖人聖人所以有神物之感也不然南人不夢駝北人不夢象神無所交也蓋天生聖人而寄之以道所以聖人一感一動無非天理之自然故其文之著猶天之垂象自夫人之見之雖有多得少得之不同而其立敎垂範之所以然者則有以通乎百世而無弊此聖人之所以為聖人也是書之著不猶是乎想當張氏宗族之不幸時天下之不幸有如張氏之宗族者殆不知其幾何也本草之經述矣論不著乎道未備也傳家以張氏之宗族為仲景之感愚謂仲景之感必有非傳筆之所能盡知者而不如此其拘也何哉宗族之不幸則宗族之不能知仲景可知也宗族之不能知則天下之不能知亦可知也悲夫有仲景如斯而宗族天下之不能知則天下與宗族之不得其正命宜若一也而謂感此而寂彼豈知仲景之所以為仲景者哉然則論也者道本乎天天下萬世之攸係也不可以不著也知此則仲景之所以為仲景者可求而得也嗚呼安得有求仲景之所以為仲景者吾與之共論此問嗇嗇淅淅惡風惡寒如何辨别曰嗇慳吝也惡寒者辟如慳吝嗇細懼事之人恁的常常怯怯然畏惡也淅淅米也孟子接淅而行是也惡風者辟如裸體之人被人卒然以水灑淅於身驀地驚恐恨恨然畏惡也然特迎風動扇則如此間静坐臥則不惡此二者所以有大同小異之分也一而言之乃當在太陽時事過太陽則無此矣問合併曰六國合從秦併六國六國不併秦不合理勢之必然也知此則知合併之義矣問讀傷寒論曰當如程子朱子敎人讀論語法然今人之醫置此書於不讀也乆矣乆矣置此書於不讀而謂醫門有人可乎問醫道曰道者日用事物當然之理也理在事物是故君子不能外事物以言道醫之事物治病用藥是也窮藥病之理覈藥病之實病與藥對藥到病解醫家日用常行之所當然此之謂道也精此則神明此則妙外此而談神論妙者要皆不過渺茫臆度而無捉摸辟之無根之木無源之水何足與言道之所以為道哉夫是則所謂理之所自出者安在可得聞乎曰人之理在脉脉之理在難經不讀難經焉知脉道病之理在素靈不讀素靈焉知病道藥之理在本草不讀本草焉知藥道然則傷寒論云何曰以上言之各一其道也以此書言之總其道而㑹其全也故傳曰古今治傷寒未有能出其外者以書之名言也豈惟傷寒哉又曰扁鵲倉公無以加之者以盡道言謂倉扁雖神其道未易求而此書之道可求也由此觀之欲求醫道舍此何之問醫務曰醫務莫要於務實實謂何不虚是也實有諸已實見得病真實用得藥對切切實實平平正正做將去一毫不虚假實不期神而實自神實不求妙而實自妙乃若指天説地稱神道妙者是猶畵道然耳何也畵家多不好畵眼前物件爭好畵鬼畵龍畵鬼畵龍者欺人所不見易神易妙而易售也以眼前言之近小簡易莫如瓠􅕧即使奪化之工為之止不過模舊式描得出兩箇扁扁圈子相累耳置一渾淪圓瓠􅕧質其旁而責之畫雖金陵壁手莫不縮項努目張口吐舌歛手避席不能奈何彷彿於毫釐矣故曰依様畵瓠􅕧蓋出翰林之笑語也夫以必古方湊今虚㝷病而言之非依様畵瓠􅕧何以不得病情影嚮而㝷補言之非畵龍畵鬼何要皆謂之不切實非邪然則切實當何如曰醫醫人也傳曰道不逺人又曰道不離日用間今也只在俯仰天地間寒温冷熱中尋常眼面前穿衣喫飯上著實備細跟尋然後質之先聖之格言不復迷惑於滛邪之虚妄如此而若謂不得實竊敢言斷斷乎無此理斷斷乎無此理問醫病曰醫病莫大於病鑿鑿謂何曰天生萬物莫不各皆賦之以事有此物事則有此道故曰道本乎天天者理也自事物之得於理之所固有者而言之莫不各皆無餘無欠無虧無剰而各成其自然而然是故決不可不循此自然而然者以行之於日用事物之間而後可以言道加之毫釐損其絲忽差失其所當然移易其所以然要皆道之鑿也故曰一本萬殊之謂道至善之謂道大中至正之謂道醫之有道自本草素靈難經傷寒論淵源而來數千年矣世逺人亡經殘敎弛正學失傳愚者不及知則亦已矣乃智者知之過則有厭常而喜新增多以為髙改古以翻今好奇而立異作聰明騁私曲支離破碎譸張為幻者出而道於是乎鑿鑿然矣嗚呼鈐非邪之首鑿之魁邪活人不佁鑿邪類證巫鑿也搥網漫鑿也例逆鑿也賦鑿也注解僕妾之鑿耳何足以與鑿例至若多鑿紛紛鑿以悞鑿鑿鑿相尋者難以枚數淮南子曰今釋正而追曲背是而從衆是與俗儷走而内行無繩習鑿之謂也醫而至於習鑿生民之命縣之鑿手言之可不痛心然心此則愛愛則仁仁則非道不行此道之所以道也不則忍忍由狥己己則何所不至不流於鑿不已也此鑿之所以鑿與蓋事無兩適出乎此必入乎彼出乎彼必入乎此此近時之醫所以又有鑿燥為糙者出也夫燥埽音也鑿之為糙不陋其乎醫之風頽矣後學君子苟志於道當先正此頽風夫然後兹則庻乎其可也問任醫曰任醫如任相相受天子九錫之榮而司天下萬民之命當正大體不當親細務是故進退百官調和鼎鼐爕理隂陽其要在於公天下之賢才察識其所能而器用之於天下以天下利天下焉爾天下無虞則修禮樂以和樂之設有警焉則整干戈以戡定之斟酌前代之成法而損益以因革之不作聰明以生事於承平不為貪鄱以幸禍於危亂論語曰危而不持顛而不扶則將焉用彼相不知此不足與論任醫之道問治病曰治病如治寇寇為天下害不治則禍亂不息鼠竊狗偷一擊或可若夫雲集而烏合蜂屯而蟻聚其勢至於據險守僻稱名僭號者豈等閒師旅所可驅除哉要必雄軍大將堅甲利兵擣穴破巢梟渠磔傑收功端在於擒王王擒而天下之事定矣卒徒雖有逸者旋可息伏若拘拘惟卒是圗不殄元惡元惡既在禍亂終當復起離之上九曰王用出征有嘉折首獲匪其醜无咎知夫此而後可與辨夫治病之理問用藥曰用藥如用兵兵非可玩之器文修武備盛世長策無事而動不惟徒取費耗殆將啟釁招尤事不容己兵興師出我既為師彼則為敵大敵在前必察其情虚實真偽得其情而可以無疑矣毋驕兵以輕敵毋慢兵以失機順天時因地利率人和承物宜旗鼓嚴明士卒用命有定謀有成筭整行陣節奇正然後戰勝攻取可必不則憧憧禦敵其不敗也鮮矣易曰師出以律否臧凶不知此不足與言用藥之義問立方曰立方如立陣得陣在得將當兩軍對壘之時紛亂擾攘之際苟非立陣則無以壯聲勢而奪敵愾然陣不得將則陣非其陣矣蓋减竈背水神機妙算運籌帷幄之中决勝千里之外自屬名將家風非徒讀父書者所可徼倖於其間也本草大黄稱將軍用得其宜則皷行列陣可以收倒戈之功用違其機則雖汗馬血兵不過為噬臍之多事耳傳曰將者三軍之司命知乎此而後可與議立方之法問春温夏暑秋涼冬寒者四時之令氣也而素問言四氣之所以為人病則曰春傷於風夏傷於暑秋傷於濕冬傷於寒夫冬夏之傷於寒暑無容議矣乃春則不以温言而言傷於風秋則不以涼言而言傷於濕何也曰冬傷於寒春必病温温在疾矣雖不言傷而傷在不言之中可知也且温主生生則亦不可以傷言又可知也然四時皆有風何謂春獨傷曰四時皆有風唯春獨動動則萬物皆蟲生所以人亦傷也夏生飱泄何也曰風屬木木邪盛則土受害人身之土脾胃是也脾主化輸胃廩水穀飱泄者水穀利也古人謂水飯曰飱民間水飯用於夏長夏土令行木邪發而飱泄作者物盛必衰土敗木賊也秋何不以涼言曰盛夏酷暑爍石流金人如坐甑中得秋涼而解且涼主收彼方解而收不傷人可知矣故惟涼不傷人人故無涼病濕者何曰黄梅雨節五月則然土潤溽暑大雨時行長夏之令也於此不以濕言乃於秋氛至涼風生暑毒退水痕收天氣清地氣爽之時而曰傷於濕者人病不外則内以人身中之自内出者言也内出者何曰萬物至秋成物成人味厚味厚則痰多痰廣韻胷上水病濕莫濕於水水寒相摶則欬所以冬必欬𠻳者以嵗言之冬至子之半水泉動也若以日言夜分亦子之半亦水泉動也故人之病欬𠻳者以嵗計則冬半發以日計則夜分發應水泉之動而動也不然若以外入之濕言病發則當為腫為滿為脹為痛為痿為痺不當欬𠻳也嗚呼道明必自物格始傳曰物格而後知至知至而後意誠故又曰誠則明矣然不誠則無物有何道可言哉問人皆曰醫者意也意可以言醫乎曰意可以入醫亦足以亂醫不可以言醫何謂也曰醫有道道本乎天意由諸己巳則未免雜於妄天則誠而已故意正而誠乃所以造道邪而妄適足以害道不察害道之意而直指意以古醫是亦亂醫云爾烏可以言醫乎且意能害道不獨醫為然果齋李正叔曰自夫子設敎洙泗以博文約禮授學者顔子曾子子思孟子相與共守之未嘗失墜其後正學失傳士各以意為學其務於該洽者既以聞見積累自矜而流於汎濫駁雜之歸其溺於徑約者又謂不立文字可以識心見性而陷於曠蕩空虚之域儒之以意害道蓋聞其弊有如此矣醫自藥始於本草理原於素靈脉著於難經中正之道成乃剖腹則異於華秘方又奇於倉神農之家事蕪帝伯之大道塞人亦各皆以意為醫其務於阿世媚俗而以賈為事者則藉口於調胃補虚以悦人其好為索𨼆行怪而以詭衒售者則又放言謂通僊如神以自誕矜方玩法析治分科以相嫌隙先正謂醫與儒通道而其所以壊則又相符如此儒尚且爾醫何足怪哉嗚呼是皆道之厄也儒之厄周程張子起而闢之於前朱子統而正之於後而後聖人之道如日中天今則郁郁乎盛矣醫之厄仲景起方法一道大備論而正之方甫定仲景死其言未及韋而湮不奈曲學䘮心懵經愎意鑿道營私論經則訛其傳而昧其轉是非莫辨致傷寒有七十二之妄言乆道則以子代父而占世賢不肖殽使救毃之不暇者得以撒驕而自縱厄則極矣竊聞之物極則反信斯言也奚謂無輓邪天將厭其極則必有再闢者出出則此書者非再闢之璣衡邪故條辨之蓋亦庻幾有補於將來闕畧之萬一云爾若夫刪繁剔悞是則幸望後賢問者俞俞爰傳梓傷寒論條辨卷十
