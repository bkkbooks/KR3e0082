body:
  text: 傷寒論條辨卷九明方有執撰本草鈔神農本經藥三百六十五種效法周天三百六十五度之數應三才而合四時此本草之所以權輿也厥義尚矣梁陶隱居進明醫别録倍之為七百三十種而義猶在焉逮夫唐本圖經蜀唐慎微證類以至宋嘉佑政和重定重修義皆不論旁搜逺訪務在增多凡見聞所及有關用驗者莫不兼收並録實總一千七百四十六種而藥無遺品本草稱大備疾病之需衛生之具天下至今為永賴焉然一百一十三方用者九十一種耳舊本皆一一注性味於各方藥下煩冗無義今具鈔而附説以為初學倉卒易於檢對之便餘則略云桂枝桂味甘辛大熱有小毒主溫中利肝肺氣霍亂轉筋頭痛出汗止煩堅骨節通血脈理疏不足宣導百藥無所畏神農本經有牡桂菌桂辛溫無毒無桂枝桂别録以下有桂上文鈔者是皆無桂枝别説云仲景傷寒論發汗用桂枝桂枝者枝條非身幹也取其輕薄而能發散愚按諸家本草桂雖云辛甘大熱本經則言辛溫皆無發散之説經於發汗曰宜麻黃湯曰宜桂枝湯云云者以例言也出汗不出汗有權在經深思宜之一字則有所宜者必有所不宜者在宜於此者必有不宜於彼者在此經之言外意讀者要當潛心察識然後可以用經之權而能神經之妙矣苟徒泥於發汗發汗云云此成無已所以鑿發散之謬注也後此人人遂皆自然其説而以為説殊不思人之用桂大率皆皮而無用枝者經於桂枝凡用皆云去皮去皮者非謂去其枝上之皮也以桂之用皆皮惟經用枝故有去皮云耳經既去皮而用枝則是去人之所用於不用而用人之所不用以為用用不與人同而意正與人相反可知矣豈取發散云乎哉不在此也然則所取何曰用不與人同而意正與人相反則是枝必桂中竒才妙用人雖皆未及知而經則獨知之深者以其從陽而敏於走衛也得之者惟主理踈不足宣導百藥無所畏是也麻黃味苦溫無毒主傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱通腠理疏解肌泄邪惡氣消赤黑斑毒不可多服令人虛陶隱居云用之折除節節止汗故也先煮一兩沸去上沫沫令人煩藥性論根節能止汗日華子通九竅開毛孔皮膚葛根味甘平無毒主消渴身大熱解諸毒療傷寒中風頭痛解肌發表出汗開腠理陶隱居云生者搗取汁飲之解溫病發熱藥性論云能治天行上氣嘔逆近世方書謂野葛有毒傷胎遂將妊娠婦人方中葛根改為家葛殊不思本草作於神農氏當此之時人尚無家葛烏家哉有野葛者自是一種大毒殺人不啻傷胎而已魏武啖至一尺者是也非葛也若因此物道聽塗説豈不迂哉柴胡味苦平無毒主寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五藏間遊氣藥性論云主時疾內外熱不解蕭炳云主痰滿胸脅中痞柴本經作茈廣韻如此芍藥味苦酸微寒有小毒主邪氣腹痛寒熱癥瘕通順血脈緩中散惡血去水氣利膀胱大小腸時行寒熱中惡腹痛本經一耳别録分赤白為二用赤者利小便下氣白者止痛散血古人采自山野山野多赤後世好竒尚白取辨於種蒔雖得白多而肥大乃出自人為而物已失其天性矣故難責效風寒所用義是赤者經無明文古意本來如此若芍藥甘草湯方明書白者此用白也藥性論云能蝕膿衍義云血虛寒人禁此一物甘草國老味甘平無毒主五藏六府邪氣長肌肉溫中解百藥毒反大戟芫花甘遂海藻陶隱居云國老即帝師之稱雖非君為君所宗故能安和草石而解諸毒也藥性論云忌豬肉栝樓根味苦寒無毒主消渴身熱煩滿大熱除腸胃中痼熱八疸身面黃脣乾口燥反烏頭日華子云治熱狂時疾實名黃瓜主胸痺圖經云療時疾發黃心狂煩熱悶不識人近時方書及稱呼皆無栝樓根惟有天花粉謂天花粉即栝樓根殊不知栝樓根者載在本經而天花粉者自本經别録以至唐蜀諸家本草皆所未有乃政和以後所收七十五種之一耳功用雖相若而物則殊别正爾謂彼即此亦失論矣黃芩味苦平大寒無毒主諸熱黃疸腸澼泄利療痰熱胃中熱藥性論云能治熱毒骨蒸寒熱往來腸胃不利日華子云主天行熱病黃連味苦寒無毒主明目腸澼腹痛下利五藏泠熱調胃厚腸日華子云止驚悸煩燥天行熱疾藥性論云忌豬肉惡泠水半夏味辛平生微寒熟溫有毒主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆消心腹胸膈痰熱滿結咳嗽上氣時氣嘔逆邇來下俚因經有渴者去半夏之文釋者以燥津液為説遂訛燥為操謂半夏操藥凡用以貝母代之誇竒矜貴以自髙衒道邪悖邪誠可笑也藥性論云開胃健脾忌羊血飴糖反烏頭生地黃味甘寒無毒除寒熱本經止於乾地黃下云生者尤良無生名麥門冬味甘平微寒無毒主心腹結氣心下支滿虛勞客熱口乾燥渴定肺氣安五藏日華子冶時疾熱狂人參味甘微溫無毒主補五藏安精神定魂魄止驚悸療胸脅逆滿霍亂吐逆調中止消渴反藜蘆术味苦甘溫無毒主風寒濕痺止汗除熱消食風眩頭痛消痰水除心下急滿及霍亂吐下不止陶隱居云术乃有兩種白术葉大有毛而作丫根甜而少膏可作丸散用赤术葉細無丫根小苦而多膏可作煎用藥性論云忌桃李雀肉菘菜青魚日華子云治山嵐瘴氣衍義云古方及本經止言术未見分蒼白二種也只緣陶隱居言术有兩種自此人多貴白者今人但貴其難得惟用白耳往往將蒼术置而不用如古方平胃散之類蒼术為最要藥功效尤速殊不詳本草元無白术之名近世多用亦宜兩審謹按嘉佑本草序謂本草雖世傳作於神農氏蓋仲景華他諸賢之所編述也然則經文术上其曰白者無乃後之好事者之所加歟惟白之加則今之术皆出種蒔務白以求售醫之為道本來面目尚存幾何哉大戟味苦寒有小毒主十二水腹滿急痛積聚利大小腸反甘草日華子云泄天行黃病瘴瘧澤漆根也澤㵼味甘鹹寒無毒除五藏痞滿逐膀胱三焦停水扁鵲云多服病人眼藥性論云宣通水道知母味苦寒無毒主消渴療傷寒久瘧煩熱陶隱居云甚療熱結旋復花味鹹溫冷利有小毒主結氣脅下滿去五藏間寒熱消胸上痰結唾如膠漆心脅痰水膀胱留飲葶藶味辛苦寒無毒主癥瘕積聚通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫藥性論云有小毒能利小便抽肺氣上喘息急止嗽衍義云用子味有甜苦兩等其形則一也經既言味辛苦即甜者不復更入藥也大槩治體皆以行水走泄為用故曰久服令人虛甘遂味苦寒有毒主大腹癥瘕腹滿面目浮腫留飲利水穀道下五水散膀胱留熱反甘草五味子味酸溫無毒主益氣咳逆上氣蘇恭云皮肉甘酸核中辛苦都有鹹味此則五味具也茵陳蒿味苦平微寒無毒主風濕寒熱邪氣熱結黃疸通身發黃小便不利日華子云治天行時疾熱狂蕘花味苦辛寒有毒主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道療痰飲衍義云仲景傷寒論以蕘花治利者以其行水也水去則利止其意如此然今人用時當以意斟酌不可使過與不及也仍須有是證者方可用之細辛味辛溫無毒主咳逆頭痛腦動百節拘攣風濕痺痛破痰利水道反藜蘆陶隱居云最能除痰明目藥性論云忌生菜日華子云忌狸肉衍義云今惟華州者佳柔韌極細真深紫色味極辛嚼之習習如椒治頭面風不可闕也葉如葵葉赤黑非此即杜蘅杜蘅葉形如馬蹄俗云馬蹄香是也近時用者皆此物人亦莫知其非别説云單用不可過半錢匕多即氣悶塞不通者死雖死無傷近年關中或用此毒人者聞平涼獄中嘗治此故不可不記非本有毒但以不識多寡之用因以有此連翹味苦平無毒主寒熱衍義云治心經客熱最勝翹經作軺注云連翹根也今之用者皆子本草無明文用者宜審桔梗味辛苦微溫有小毒主胸脅痛如刀刺除寒熱風痺療喉咽痛藥性論主氣促嗽逆衍義云治肺熱氣奔促嗽逆肺癰排膿當歸味甘辛溫無毒主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絶子諸惡瘡瘍日華子云治一切風一切血藥性論云補女子諸不足别説云氣血昏亂者取之立定此蓋能使氣血各有所歸恐聖人立當歸之名必因此出矣通草味辛甘平無毒除脾胃寒熱通利九竅出音聲陳士良云莖名木通主理風熱淋疾小便數急疼小腹虛滿升麻味甘苦平無毒主解百毒辟瘟疫瘴氣中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡圖經云解傷寒頭痛本經無别録有大黃將軍味苦寒無毒主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五藏平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結日華子云通宣一切氣調血脈利關節泄壅滯水氣四肢泠熱不調溫瘴熱疾利大小便并傳一切瘡癤癰毒别説云謹按大黃收採時皆以火燒石􅏼乾欲速貨賣更無生者用之不須更多炮炙少蒸煮之類也將軍者言戡定禍亂建立太平止戈為武之謂也萎㽔味甘平無毒主中風暴熱不能動搖陶隱居云按本經有女萎無萎㽔别録無女萎有萎㽔日華子云除煩悶止渴潤心肺治天行熱狂圖經云主賊風手足枯痺四肢拘攣按陶云則女萎萎㽔之為物雖不殊而文字之差誤則明甚天門冬味苦甘大寒無毒主諸暴風濕偏痺保定肺氣去寒熱博物志云禁食鯉魚藥性論云誤食鯉魚中毒浮萍解之衍義云治肺氣之切為多其味苦但專泄而不専收寒多人禁服貝母味辛苦微寒無毒主傷寒煩熱療腹中結實心下滿洗洗惡風寒反烏頭藥性論云主胸脅逆氣療時疾黃疸與連翹同日華子云消痰潤心肺别説云能散心胸鬱結之氣殊有功蜀漆味辛微溫有毒主瘧及咳逆寒熱腹中癥堅痞結積聚療胸中邪結氣吐出之常山苗也藥性論云能主療鬼瘧多時不差去寒熱瘧治溫瘧寒熱不可多進令人吐逆下肥氣積聚商陸根味辛酸平有毒主水脹疝瘕除癰腫殺鬼精物療胸中邪氣水腫痿痺腹滿洪直疏五藏散水氣如人形者有神圖經云俗名章栁根花赤者根赤花白者根白蘇恭云白者入藥用赤者見鬼神甚有毒但貼腫外用若服之傷人乃至利血不已而死也日華子云得大蒜良通大小腸㵼蠱毒墮胎協腫毒傳惡瘡本經無根字海藻味苦鹹寒無毒主癭瘤氣項下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚暴㿉留氣熱結利小便厚朴味苦溫無毒主中風傷寒頭痛寒熱驚悸氣血痺溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄利淋露除驚去留熱心煩滿厚腸胃藥性論云忌豆食之者動氣味苦辛大熱能主療積年冷氣腹內雷鳴虛吼宿食不消除痰飲去結水破宿血消化水穀止痛大溫胃氣嘔吐酸水主心腹滿病人虛而尿白日華子云健脾主反胃霍亂轉筋泠熱氣㵼膀胱泄五藏一切氣衍義云不以薑製則棘人喉舌平胃散中用最調中至今此藥盛行既能溫脾胃氣又能走冷氣為世所須也枳實味苦酸寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止利長肌肉利五藏除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄藥性論云解傷寒結胸入陷胸湯用主上氣喘咳腎內傷冷隂痿而有氣加而用之衍義云枳實枳殼一物也小則其性酷而速大則其性詳而緩故張仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導散風壅之氣可常服者故用枳殼其意如此竹葉䈽竹葉味苦平大寒無毒主咳逆上氣除煩熱風痙喉痺嘔吐淡竹葉味辛平大寒主胸中痰熱咳逆上氣苦竹葉及瀝療口瘡目痛明目利九竅陶隱居云竹類甚多此前一條云是䈽竹吹用淡苦爾藥性論云淡竹燒瀝冶卒中風失音不語日華子云苦竹作瀝冶中風失音功用與淡竹同食療云淡竹瀝大寒主勞復茹主噎膈鼻衄大棗味甘平無毒主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足和百藥補中益氣除煩悶療心下懸腸澼生者味甘辛多食令人多寒熱羸瘦不可食陶隱居云南棗大惡孟詵云第一青州次蒲州者好諸處不堪入藥生者食之過多令人腹脹日華子云牙齒有病人切忌食之食療云多食動風發冷風并咳嗽衍義云先青州次晉州此二等可煞暴入藥益脾胃為佳餘止可充食用杏核仁味甘苦溫冷利有毒主咳逆上氣雷鳴喉痺下氣時行頭痛解肌消心下急解錫毒陳藏器云利喉咽潤五藏去痰嗽生熟俱得半生半熟殺人日華子云多食傷神損筋骨有數種皆熱小兒尤不可食多致瘡癰及上膈熱桃核仁味苦甘平無毒主瘀血血閉癥瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛衍義云桃有數種惟以山中自生者為正梔子味苦寒無毒主五內邪氣胃中熱氣胸心大小腸大熱心中煩悶酒炮皶鼻藥性論云殺蟅蟲毒去熱毒風利五淋解五種黃病治時疾除熱衍義云仲景治發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯治之虛故不用大黃有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液府藏無潤養內生虛熱非此物不可去吳茱茰味辛溫有小毒主溫中下氣止痛咳逆寒熱除濕血痺逐風邪開腠理去痰冷腹內絞痛諸冷實不消中惡心腹痛藥性論云治霍亂轉筋胃中冷氣吐㵼腹痛不可勝忍者可愈孟詵云主心痛下氣除嘔逆藏冷開目者不堪食衍義云須深湯中浸去苦烈汁凡六七過始可用此物下氣最速腸虛人服之愈甚梓白皮味苦寒無毒主熱去三蟲别録云主吐逆胃反黃蘗本經蘗木味苦寒無毒主五藏腸胃中結熱黃疸腸痔止泄利療驚氣在皮間肌膚熱赤起目熱赤痛口瘡衍義云今用皮蜀椒味辛溫有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痺痛除六府寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下利泄精開腠理通血脈堅齒髮調關節耐寒暑多食令人乏氣口閉者殺人衍義云須微炒使出汗又須去附紅黃殼去殼法先微炒乘熱入竹筒中以梗舂之播取紅用秦皮味苦寒無毒主風寒濕痺洗洗寒氣除熱目中青翳白膜藥性論云主明日去肝中久熱圖經云浸水便碧色書紙看之青色者真梅實味酸平無毒主下氣除熱煩滿止下利好唾口乾陶隱居云此亦是今烏梅也用當去核微熬治傷寒煩熱陳藏器云去痰主瘴瘧止渴調中除冷熱利止吐逆日華子云多啖傷骨蝕脾胃令人發熱又云除勞治骨蒸去煩悶澀腸止利衍義云食梅則津液泄水生木也津液泄故傷齒腎屬水外為齒故也芫花味辛苦溫有小毒主咳逆上氣喉鳴喘咽腫消胸中痰水喜唾水腫久服令人虛藥性論云有大毒能治心腹脹滿去水氣利五藏寒痰涕唾如膠者及一切毒風四肢攣急不能行步能㵼水腫脹滿附子味辛甘大熱有大毒主風寒咳逆邪氣溫中金瘡破癥堅積聚血瘕寒濕踒躄拘攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下利赤白堅肌骨強隂墮胎為百藥長陶隱居云凡用三建皆熱灰微炮令拆勿過焦惟薑附湯生用俗方每用附子皆須甘草人參生薑相配者正制其毒故也衍義云烏頭烏喙天雄附子側子凡五等皆一物也止依大小長短似像而名之後世補虛寒則須用附子仍取其端平而圓大及半兩以上者其力全不僣風家即多用天雄亦取其大者以其尖角多熱性不肯就下故取卒散也此用烏頭附子之大略餘三等則量其材而用之白頭翁味苦溫無毒主溫瘧狂昜寒熱癥瘕積聚癭氣逐血止痛蘇恭云甚療毒利茯苓味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛口焦舌乾利小便止消渴大腹淋瀝膈中痰水水腫淋結開胸腑調藏氣伐腎邪藥性論云忌米醋豬苓味甘苦平無毒主痎瘧解毒蠱疰不祥利水道藥性論云解傷寒溫疫大熱發汗主腫脹腹滿急痛司馬彪云治渴衍義云行水之功多久服必損腎氣昏人目巴豆味辛生溫熟寒有大毒主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩練五藏六腑開通閉塞利水穀道去惡肉爛胎不利丈夫隂殺班貓毒藥性論云忌蘆笋醬豉泠水中巴豆毒黃連汁大豆汁解之陶隱居云最能㵼人陳藏器云主癥癖痃氣痞滿腹內積聚冷氣血塊宿食不消痰飲吐水赤小豆味甘酸平無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒澼下脹滿陶隱居云性逐津液久服令人枯燥陳士良云微寒療水氣解小麥熱毒圖經云甚療腳氣麻子味甘平無毒主補中益氣中風汗出逐水利小便破積血復血脈藥性論云治大腸風熱結澀及熱淋日華子云逐一切風氣長肌肉益毛髮去皮膚頑痺下水氣及下乳止消渴催生治橫逆産陳士良云主肺氣潤五藏利大小便疏風氣不宜多食損血脈滑精氣痿陽氣婦人多食發帶疾豉味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虛勞喘吸及兩腳疼冷藥性論云治時疾熱病發汗粳米味甘苦平無毒主益氣止煩止泄陶隱居云此即人常所食米但有白赤小大異族四五種同一類也孟詵云常食乾飯令人熱中脣口乾不可和蒼耳食之令人卒心痛即急燒倉米灰和蜜漿服之不爾即死不可與馬肉同食之發痼疾衍義云白晚米為第一早熟米不及也平和五藏補益胃氣其功莫逮然稍生復不益脾過熟則佳酒味苦甘辛大熱有毒主行藥勢殺百邪惡毒氣陶隱居云大寒凝海惟酒不氷量其性熱獨冠羣物藥家多有以行其勢人飲之使體弊神惛是其有毒故也蘇恭云酒有數種惟米酒入藥陳藏器云通血脈潤皮膚散石氣消憂發怒宣言暢意又云酒後不得卧黍稷食豬肉令人患大風凡酒忌諸甜物酒漿照人無影不可飲酒不可合乳飲之令人氣結白酒食牛肉令人腹內生蟲孟詵云久飲傷神損夀苦酒味酸溫無毒主消癰腫散水氣殺邪毒醋也陶隱居云亦謂之醯以有苦味俗呼苦酒不可多食損人肌藏陳藏器云破血運除癥塊堅積消食破結氣日華子云殺一切魚肉菜毒多食不益男子損人顔色論語云或乞醯焉是也膠飴味甘微溫主補虛乏止渴去血本草飴糖圖經軟糖粳米粟米大麻子白术黃精枳椇子等並堪作惟以糯米作者入藥孟詵云健脾胃氣日華子云消痰止嗽并潤五藏衍義云多食動脾風不已上五種本經皆無或疑五種者皆人食用之常煩采取開物之初不以流品論尚未收録與未知然否乾薑味辛溫主胸滿咳逆上氣溫中止血出汗逐風濕痺腸澼下利寒冷腹痛中惡霍亂脹滿皮膚間結氣止唾血生者尤良主傷寒頭痛鼻塞止嘔吐久服去臭氣通神明乾者大熱生者微溫皆無毒唐本乾者久服令人目暗藥性論乾薑主霍亂不止治嗽溫中秦芁為使陳藏器云生薑須熱即去皮要冷即留皮蔥白平可作湯主傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痺不通安胎歸目除肝邪氣安中利五藏殺百藥毒日華子云治天行時疾頭痛熱狂通大小腸霍亂轉筋及賁豚氣腳氣心腹痛食療云少食則得可作湯不得多食虛人患氣者多食發氣上衝人五藏悶絶為通利關節出汗故也切不得與蜜相和食之促人氣殺人薤味辛苦溫無毒除寒熱去水氣溫中散結利病人陶隱居云凡用蔥薤皆去青留白白冷而青熱也孟詵云不可與牛肉同食令人成瘕食療云骨鯁在咽不去者煮食之即下衍義云葉如金燈葉差狹而更光故古人言薤露者以其光滑難佇之義千金用治肺氣喘急亦取其滑泄也大抵此物葉如韭根如蔥江南閩浙之間絶少淮西河南比多有之瓜蒂味苦寒有毒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病胸腹中皆吐出之去鼻中息肉療黃疸陶隱居云甜瓜蒂也用早青者日華子云無毒治腦塞熱齆眼昏吐痰食療云瓜有兩鼻者殺人沉水者殺人食多腹脹可食鹽化成水病癥癖人不可食之石膏味辛甘寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息除時氣頭痛身熱三焦大熱解肌發汗止消渴煩逆腹脹暴氣喘息咽熱藥性論云能治傷寒頭痛如裂壯熱皮如火燥出毒汗主通胃中結煩悶心下急煩燥和蔥煎茶去頭痛日華子云治天行熱狂圖經云止頭目昏眩痛赤石脂味甘酸辛大溫無毒主養心氣明目益精療腹痛泄澼下利赤白大抵此物能治大腸寒滑本經無别録有禹餘糧味甘寒平無毒主咳逆寒熱煩滿下利赤白血閉癥瘕大熱療小腹痛結煩疼藥性論云主治崩中芒硝味辛苦大寒主五藏積聚久熱胃閉除邪氣破留血腹中痰實結摶通經脈利大小便及月水破五淋推陳致新生於朴硝衍義云以暖水淋朴硝取汁再經熬鍊減半傾入木盆中經宿遂結芒有廉稜者故其性和緩今按本經止言硝石朴硝而無芒硝芒硝有自别録以後經中何得用芒硝芒疑朴誤滑石味甘寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃積聚寒熱通九竅六腑津液去留結止渴令人利中衍義云治暴得吐逆不下食代赭味苦甘寒無毒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣除五藏血脈中熱血痺血瘀大人小兒驚氣入腹鉛丹味辛微寒主吐逆胃反驚癎癲疾除熱生於鉛陶隱居云即今熬鉛所作黃丹也藥性論云主治驚悸狂走嘔逆消渴日華子云涼無毒鎮心安神療反胃止吐血人溺療寒熱頭疼溫氣童男者尤良日華子云療血悶熱狂撲損瘀血運絶及困乏衍義云氣血虛無熱者不宜多服性寒故也婦人裩襠主隂易病當隂上割取燒末服方寸匕童女裩益佳若女患陽易即男子裩也隂易病者人患時行病起後合隂陽便相著甚於本病其候小便赤澀寒熱甚者是服此便通利按此與經文有同有異臨證者宜兩審已上二種本經皆無别録有白蜜味甘平無毒主心腹邪氣諸驚癎痓安五藏諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目色白如膏者良本經石蜜衍義云石乃白字龍骨味甘平無毒主心腹鬼疰精物老魅咳逆泄利膿血夜卧自驚恚怒伏氣在心下不得喘息止汗縮小便溺血養精神定魂魄安五藏藥性論云忌魚止夢泄精夜夢鬼交圖經云此物大抵世所稀有衍義云諸家之説紛然不一既不能指定終是臆度西京潁陽縣民家忽崖壞得龍骨一副皮體頭角悉具不知其蛻也其斃也若謂其蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化焉嘉靖癸丑余客邳之宿遷縣時淮泗大水河無岸際霜後水落河中新吐一洲上有龍骨一副頭角身尾全具居民驚異競渡取之人有以角半隻相貽者其色白形即枯骨舐之黏舌入藥用甚效竟莫知其所由姑録之以俟博識阿膠味甘平微溫無毒主心腹內崩勞極灑灑如瘧狀腰腹痛四肢酸疼女子下血安胎丈夫小腹痛虛勞羸瘦隂氣不足腳酸不能久立養肝氣出東阿陶隱居云出東阿故曰阿膠入湯微炙丸散須極燥陳藏器云阿井水煎成人間用者多非真也凡膠俱能療風止泄補虛驢皮膠主風為最圖經云今鄆州皆能作之以阿縣城北井水作煮為真造之阿井水煎烏驢皮如常煎膠法其井官禁真膠極難得都下貨者甚多恐非真尋方書所説所以勝諸膠者大抵以驢皮得阿井水乃佳耳今屬東昌府有小土城無縣治井如故仍官禁以古迹因名其城曰阿城膠則造時官取水至府煮作皮出自庫真膠民間難得如昔蔡氏書傳曰吳興沈氏言古説濟水伏流地中今歷下几發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煮膠謂之阿膠用擾濁水則清人服之下膈疏痰蓋其水性趨下清而重故也豬膽味苦大寒主傷寒熱渴劉禹錫云通大便膚諸家本草無載此者文蛤味鹹平無毒主咳逆胸痺腰痛脅急雞子主除熱火瘡癎痙卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下泄醯漬之一宿療黃疸破大煩熱陳藏器云雞子益氣多食令人有聲藥性論云液能治目赤痛黃治久瘧日華子云雞子鎮心安五藏止驚安胎治懷妊天行熱疾狂走及開聲喉忌蒜虻蟲味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水積聚除賊血在胸腹五藏者及喉痺結塞圖經云木虻最大而緑色幾若蜩蟬蜚虻狀如蜜蜂黃色醫方所用虻蟲即此也又有一種小虻名鹿虻大如蠅咂牛馬亦猛三種大抵同體俱能治血而方家相承只用蜚虻他不復用淮南子虻散積血本經木虻蜚虻水蛭味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎陳藏器云收乾蛭當展其身令長腹中有子者去之此物難死雖加火炙亦如魚子煙熏經年得水猶活以為楚王之病也蜀本云採得用䈽竹筒盛待乾又米泔浸一宿後暴乾以冬豬脂煎令焦黃然後用之勿誤日華子云畏石灰衍義云畏鹽牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除留熱在關節榮衛去來不定煩滿止汗止渴除老血澀大小腸止大小便療泄精喉痺咳嗽心脅下痞熱藥性論云止盜汗治溫瘧土瓜根本經王瓜味苦寒主消渴內痺瘀血月閉寒熱别録一名土瓜療諸邪氣熱結衍義云其根即土瓜根也日華子云土瓜根通血脈治天行熱疾酒黃病壯熱心煩悶漿水味甘酸微溫無毒主調中引氣宣和強力通關開胃止渴霍亂泄利消宿食解煩去睡調理府藏粟米新熟白花者佳煎令醋止嘔噦本經無别録鈔甘瀾水潦水二種本草皆無斗升合律吕之管十二皆徑三分有竒空圍九分而黃鍾長九寸以之審量而量多少則其容子穀秬黍千二百為籥十籥為合十合為升十升為斗十斗為斛銖分兩以黃鍾之籥平衡而權輕重則其所容千二百黍其重十二銖分其半六銖為分兩籥二十四銖計四分為兩十六兩為斤三十斤為鈞四釣為石銖則今之四分一釐六毫有竒分則今之二錢半也方寸匕匕匙也古用竹木今用銅其制正方一寸取抄散不落可重一分為一服寸則以一黍為一分黃鍾長九十分分之十也以之審度而度長短則亦以黃鍾之寸生丈尺此黃鍾所以為萬事根本㕮咀言搗令大小適中其粒顆可以咀嚼之而有味也嘉祐本草謂凡酒湯膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而又調和也傷寒論條辨卷九
