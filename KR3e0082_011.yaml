body:
  text: 傷寒論條辨卷十一明方有執撰痙書并序余以魯鈍於醫初未學也慨自連困兩畨喪內病皆起於中傷風寒遍求多醫治殊弗效致變俗謂虛怯竟墮不滿三十而短世前後若一兒女遭驚風歷殤者五厄苦慘痛悽悽無聊客遊淮楚值彼旱疫正熾適罹其災死信宿而重生重生者疫蓋素問熱病傷寒類也淮楚重治傷寒不輕用藥以故不藥而自死不藥而自生骨立而起起而髮膚悉更是豈偶然天也追思往事藥病之在道初以求道於人卒不得見聞人之有道既而聽命於天乃幸荷天之慶人固不能䇿功於道以直全正命於人天則乃爾曲全於我然則天之所以不欲我死必欲再造我以重生者留我之意莫非試我以警將欲畀我以致用於斯乎我苟不能仰體以俯而知之則不得與善事乎天者同日而語矣於是念念集斯道之大成聖古今而祖方法者在仲景乃購求其遺書僅得其金匱之略傷寒之卒病論皆世所閣置塵穢之殘煙啓而讀之凛凛然驚心駭目病歷多艱論皆顯印顧念幸生既得於脫死之後後若舍此而外慕逺求則亦不可以為能從事於求祥言矣庸是篤志専此鋭力憤敏涉苦萬端鬢霜而後豁悟默契潛通其言外之緒趣悔恨曽前俗謂之虛怯寃屬論中壞病之謬訛慚不可及矣乃汲汲揚於滌穢條辨其顚倒錯亂疏其祲蝕重整成卷梓布有年以痙向未齊同實則二書之一事何謂邪病起太陽證惟強耳強而汗汗而濕濕而寒寒而痙寒痙者世俗之口頭語中庸之邇言甚易知也且痙因於多汗多汗因於血虛血虛惟兒家為最以未充也新産婦人次之以在蓐也大人間有以方剛也老者得無以既衰也今之驚風概是如此以此參求亦甚易明也昧者不察又不識強痙二字之名義更不省痙亡於痓亂一見有強懵懂鶻突便哆抽筋及至痙作捉摸不著又妄誕著駭倉卒揣摩不來遂濫謬驚風誣詭名而奪痙位汩沒天真寃命禍世害道釀厄因循至今千餘年矣我既感天之警覺幸見天則克全子命以嗣諸後得諸已矣若或隱忍坐視諸人箝口畏懦而不讜言則亦自負適所以為違天自棄咎不反歸我乎懼此更集是篇梓附條辨以報天命以申同倫以一體遐邇焉嗚呼是篇也書云乎哉我於書但好讀古人者耳我無書也曷敢直以書言借也文云乎哉我無文也曷敢驟以文言非也然則謂何曰無謂也蓋欲希望由是將來寃斯可雪禍斯可熄道斯可明厄斯可解則庶乎盡已可言而回天有待抑以張諸後此遙為鑿道造祅昏時惑世含血噴天以自汚之龜鑑云耳萬歷戊戌孟秋既望有執自序素問曰諸痙項強皆屬於濕痙音頸強上聲下皆做此後諸猶凡也痙廣韻風強病俗謂打寒禁是也項頸也強筋脈牽強木徑而不和柔反拗而不順從受病之經其經之筋皆然濕則下文是也金匱曰太陽病發汗太多因致痙金匱痙皆痓叔和注痓當作痙今從之以便初學惡太陽病傷寒論曰大陽之為病脈浮頭項強痛而寒是也發汗本傷寒之治法而中風之冶亦在法中其例一也太多者汗法以微似為度苟至於如水流漓而濕則過度而為太多也此舉傷寒而言雖不及中風與濕而中風與上文濕義具見言表可知矣致與下文變意同千金曰太陽中風重感於寒濕則變痙也中音衆寒濕者中風本自汗出出不已而至於如水流漓則與發之過多而濕濕而生寒其義一也上條舉發汗包自汗而言此舉中風該傷寒而言通前三條併而觀之文雖出於三家而風寒變痙之所以然者具見義則誠如互發學者最宜精玩匱痙自素問以來其見於傷寒論者乃叔和所述金之略也千金雖有此語未見其精悉自此以下無痙文字可稽近來鄉俗未聞會有一人能言痙者雖醫亦然不但痙也強亦未見有能分曉者斯道之不明豈其遭痓訛誤以致如斯乎誠可歎惜愚以兩娶五出一女四男皆殤於驚風遍觀兒醫之家驚風之論辭甚鄙野大都末流之俚諺古無此等荒唐之説來歷不明其詳不可考疑憾數年不能自釋既而偶病傷寒死信宿而重生感天有所警也改故業而致身仲景之門受讀金匱傷寒論憤力敏求私淑其旨趣寤寐其神妙以病時多艱印證二書條目心融意會恍如鑑對夢醒若有默迪在前難以告語人者見叔和痓當作痙之注憶病初項強几几之不能自勝念兒家口不能言之自苦豈旁窺側測之所能喻及大悟驚風之謬悉皆痙語之訛因集諸痙刷正驚非别為次序如今竊案以候照對云金匱又曰太陽病發熱脈沉而細者名曰痙為難治傷寒論無為難治三字太陽者以太陽經所主之部屬皮膚言也皮膚為人一身之表表之為言外也風寒本天之二氣於人身為外物故其中傷於人必自外而內人之中傷之必皮膚先受起以病方在皮膚皮膚屬太陽故曰太陽病蓋舉大網而言始以見周身之皮膚具病所包詳備辭簡而意周微哉旨也後人不察如諸家紛紛爭以經絡之一線而嚚訟豈不大謬發熱風寒之邪客於太陽與正交爭蒸而為熱也然病在太陽其脈必浮沉細者重感寒濕變也章六經主病其各該所主之經絡部屬靈素自有章明文道之原也凡病無有不屬六經者言病必稱六經古意原來如此仲景為方法之祖祖是道也末流不究騁以小智妄鑿非端求己私無過務為矜誇衒售媒蘖名利而已非為道也識者鄙之適所以見其弄巧賣乖叛經悖道唯徒自取垢招尤則亦竟成何益來學賢能切宜省戒太陽發熱具見上矣驚風論云治驚要識驚風痰熱四箇字又自飾云小兒血氣虛弱虛則生熱熱盛生痰痰盛生驚驚盛生風風盛發搐夫既曰虛矣虛則無物無物如何生出熱來熱是何物如何又生得痰出來痰雖有形驚是著駭心之知覺神之感應耳無蹤迹可尋也痰如何駭得人生出驚來驚於自已且無蹤迹有何生出風來風雖寓形於動搐是如何動六書無搐義不可稽夫熱既無一毫實可言只是生於虛起從頭一直虛到底畢竟仍是沒來由虛空不可稽之搐結證天下有此事理乎然則人雖虛弱驚駭不致卒生妄熱肢體雖動不屬無稽之搐但卒感風寒太陽必當發熱變則筋脈牽強必痙可知以此言之驚之謬痙之訛大端明矣想當愎驚謬論之初謬家多應未讀仲景之書未睹叔和之注見病若然一則不知痙亡於痓二則不識強之名義只是必定箇驚駭以為應當膠固誣在兒家身上更不思病情正理致妄謬端厄道釀禍至死不寤流毒至今痛惜兒家口不能言含寃莫雪子甚哀之天既覺子以警子既覺之而不言其如與謬同歸何竊為此懼故不避僭以致弔如斯誠不得已也然虛之一字大抵弊在醫門其為不明久矣明而以正言者必也君子乎仲景以下惜乎豫未見其人也嗚呼不亦可慨也夫夫痙脈按之緊如弦直上下行緊則為寒如弦直上下行申釋上文脈經云痙家其脈伏堅直上下伏猶前沉細大意與上同蓋脈經乃叔和所述金匱乃仲景之書世謂叔和為仲景之徒以此觀之亦不為虛稱也金匱曰太陽病發熱汗出而不惡寒者名曰柔痙惡去聲下同故此以自中風而變者言風為陽而屬木木性曲直曰柔謂和耎也此與下文剛是反對驚風之慢此痙之柔也下皆全匱太陽病其證備身體強几几然脈反沉遲此為痙栝蔞桂枝湯主之几音殊具其承上指太陽也證備言頭項強痛汗出惡風寒見也身體強太陽陽明合也几几者頸項俱痛俯仰不能自如也此互上條而出治驚風之抽掣搐搦不識此強而濫謬也栝蔞桂枝湯方栝蔞根三兩桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水九升煮取三升去滓分溫三服取微似汗汗不出食頃啜熱稀粥發之制度禁忌皆倣桂枝湯法此桂枝湯加栝蔞根之六物也湯義見傷寒論蓋擅固表之能神解肌之奧栝蔞根消渴而生津導濕以以徹熱肌表解而濕熱徹強不待疏而疏自至矣太陽病其證備或惡熱項背強手足拘攣者痙也桂枝湯主之此以太陽初交陽明言病在太陽則惡風寒交陽明則反惡熱太陽之熱翕翕陽明之熱蒸蒸拘攣拘束而蜷攣也庸俗不識強之所以為痙者狃於俚諺而文理字義之不明也桂枝葛根湯方桂枝三兩去皮葛根三兩芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水九升先煮葛根減二升內諸藥煮取三升服如上法內音納此亦桂枝加葛根之六物也葛根者陽明經之的藥也以太陽初交陽明故用桂枝以加葛根經絡明而藥物對理意至而功效奏矣太陽病發熱無汗而反惡寒者名曰剛痙此以自傷寒而變者言寒為隂而屬水水寒則氷故曰則堅徑也與上柔對舉而互發以見隂陽二義彼此兩相反而寓戒謙致勿誤之意學者不可不知然無汗不濕不濕何痙曰太陽強己微而內隱矣痙則強之發而外著耳驚風之急此剛之訛也太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之上上聲脈小便少氣上衝胸寒飲湧逆也口為脾之竅而胃夾口環脣噤脾虛胃寒而寒栗也欲作待作未作之意此亦互上條而出治夾音協葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘右七味㕮咀以水一斗先煮葛根麻黃減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌麻黃散太陽之表葛根解陽明之肌桂枝主榮衛之和則強自釋而痙自定矣病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也傷寒論病下無者字目下有脈字卒讀倉卒之卒反音板身熱陽明主肌肉也足寒陽不下也頸屬陽明項屬太陽急者強之甚時謂不常也三陽聚於頭面熱隂不上也赤表未解也太陽之脈夾脊循背反張者不柔和不順從牽強益甚也此蓋以痙之具證言亦風寒俱中傷之致變與凡久而至於劇者為然耳知反張灼然在背驚風逺謬角弓則是忘其背而不有其身知逐物而不知有道夫如是安得不鑿空而濫謬乎痙為病胸滿口噤卧不著席腳攣急必齘齒可與大承氣湯齘音械詞胸滿即氣上衝胸之互文卧不著席亦反張之互也腳攣急脾隂主四支而胃陽為之合隂陽不相順接而厥逆也必定然之詞齘者齒上下相抵之謂蓋胃寒變熱胃家實熱甚而不和也此謂齘齒驚風乃諺咬牙天生牙咬物何物能咬牙哉鄙俚不經無足道也且兒醫之家於豆既以咬牙為寒顫乃又援以為驚使之然豈不自相豫盾乎大承氣湯方大黃四兩酒洗厚朴半斤去粗皮炙枳實五枚炙芒硝三合本經無芒硝芒疑朴誤右四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分溫再服得下利止後服陽明主胃胃廩水穀為五藏六府之海百骸藉養於斯而人之吉凶死生係焉故病凡入陽明而胃不和則無論輕重皆當先以和胃為要務承氣者和胃藥也胃凡不和以此和之皆得愈故古今通行和胃皆以之世固有懼其大黃毒而不敢行者殊不知本草大黃無毒而藥道之論良毒亦不在此蓋謂對病為良苟不對病雖良亦毒也然藥不自對對之者醫主藥而不主對醫云乎哉近時俗習爭言藥而不言對夫藥無非物也用之於病之謂藥對不言矣其如病何其如習尚何謂道不在厄吾不敢允也噫可慨也巳問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙去血復汗寒多故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡隂血虛陽氣獨盛故當汗出隂陽乃復大便堅嘔不能食小柴胡湯主之三病雖殊其為血虛則一所以併為設一問答而同出方見傷寒論病解能食七八日更發熱者此為胃實大承氣湯主之此結上文三病而言以致慎餘之意以方見前如想設問答之意其亦有所為而然與且痙言之今時之人絶無言此病者而言産後驚風者則紛紛然何哉只緣痙在亂亡人皆不識痙名又不識強字之義所以妄認筋脈牽強為抽筋而謾讕抽掣搐搦之謬夫以驚誣諸兒家兒家幼癡不能言誠難審理乃又以誣婦人而曰産後驚風婦人者以産育為任者也既産矣兒女在抱矣方幸慶慰天下皆稱賀喜喜不自勝矣何驚邪婦人雖愚懦不似兒家無知識也病雖惑亂不似兒家不能言也痙必作輟當其輟時有虛己詳細以審問之心誠求之無有不得其情者審得被駭則驚不為誣不駭則痙明而斯案定矣夫何難哉惜乎人固逞己傲物不屑如此耳雖然苟或如此而不詳細則又不可夫風病下之則痙復發汗必拘急風必自汗表固虛矣下則又虛其裡所以痙也仍復發汗以更虛其表是謂重亡津液拘急者津液重亡而強益甚也瘡家雖身疼痛不可發汗汗出則痙血熱則生瘡身疼痛者血澀不利乖而不和也汗者血之液發而迫使之出則血愈乖而愈不和傷之矣故亦致痙也傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痙身強難以屈伸熏之則發黃不得小便灸則發咳唾形象中風與傷寒論第九篇病如桂枝證異文同旨而互發故曰常微汗出己上三條皆通前申致丁寧戒謹之意案成藏諸金滕以待越明年生今男三歲亦病驚風時值外出家人促歸困頓己二日啓縢照案急以一匕灌之不待終劇應手立蘇而回生案斯對矣效斯驗矣嗣後慎斯法由斯道而行行皆若是周旋四十餘年於斯矣坦坦如也今老矣男有孫矣顧念天之所以與我不敢棄天條辨傷寒論時欲附此語痙濕暍篇中以彼此詳略不同未之及也茲以不敢忘宿念痛斯民斯道困於厄而不敢忍故訂案具書以申請禍當道君子詳允施行庶幾將來幸輔撥痓以弭其亂正驚而反其風土底績平成風土平成而痓削痓削而痙復痙復而道明道明而厄解則於醫門雖未可以得仁言而於求仁之方實則不外是矣志仁後彥其朂之哉痙書或問問兒醫之家驚風之論其説何如曰鑿設耳鑿謂何曰此論乃鑿虛而起從頭至尾句句皆是生出來的話説理之所無不可稽也請申之其言曰治驚要識驚風痰熱四箇字大意如此故其又自飾曰小兒血氣虛弱虛則生熱熱盛生痰痰盛生驚驚盛生風風盛發搐殊不知血氣之在人身虛莫虛於有生之初初生雖虛未聞即此便有生熱之説繼之以乳哺而不熱者乳血氣物也故資於乳哺而血氣生生而齒生生之徵也試可飲食而不熱繼之以飲食之養資於養而血氣充齒更髮長天癸至充之徵也三十而壯充而實也四十而強實而盛也物盛必反故五十則反衰七十而老此固人血氣虛實盛衰之自然不待安排至當不易之正理外此而言虛道實亂斯生矣夫虛則純而無邪無邪則異釁無自而端故自然而然如此謂虛則生熱有此理乎以熱盛生痰言之痰之為物與血氣俱靜則為養動則為病三者一也不偏有無與生俱生無時無有褚澄有言血枯死氣絶死痰盡死謂痰可治而能使之無不知死也謂生於熱熱無形痰有質有質生於無形亦無此理痰盛生驚驚盛生風風為何物而謂生於驚驚為何物而謂生於痰邪人當定而安靜則不驚必有事焉驟聞惡聲卒見怪狀則惕然猛驚茫然自失蓋見聞者感也驚應也所以感而應者心之知覺神之虛靈無蹤迹可尋也驚於自己且無蹤迹可尋而謂生於痰人能生得出風來理安在哉詳觀三者皆謂由盛而生熱則摸不著事故乃反駕説生於虛自相矛盾亂言若此不知生不知死而謂知醫可乎風盛發搐搐不出於六書六書無文義不可考而又蔓延抽掣與搦抽即掣也掣亦抽也物在器中拔而出之抽掣之謂也故世有抽籤掣籤之説國有抽分掣鹽之法人之肢體頂天立地病何如而何抽何掣乎搦是讜而按杜之之謂故械有讜衆軍有搦戰人至治所見讜衆則畏而不敢犯致師至敵陳見搦戰則持而不能騁其義一也戒嚴防間之謂耳不在動作上言何病而人之身搦何邪以此言之此論之無稽如此不謂之鑿將謂之何然則熱者何曰外入之病必起於太陽太陽之脈起於目內眥上額交巔入腦還出别下項夾脊抵腰中故病在太陽則其經之筋脈皆牽強而疼痛邪正交爭則發熱熱而自汗或發汗汗出過多則濕濕則寒寒則痙也所謂強痛者證則內隱事屬病者自省耳診家不審則未易覺察兒家無言察覺尤難鹵莽忽略則誤在此矣驚風之異不端於此乎逮夫頭搖手徑乃痙而外著也識見不真則抽掣之祅不造於此乎卒口噤腳攣急痙著而甚也目邪心亂則搐搦之怪不罔兩於此乎背反張痙甚而危殆也指鹿為馬則角弓之水底月不倒影於斯乎孰知強者痙之機痙者強之劇痙在廣韻注風強病強在六書疆之省文居良切則平聲弓有力也故從弓從疆聲也又疆界也渠兩切則上聲木徑而不和柔反拗而不順從也又弓之反拗而張也強痙音義如此太陽病之證亦如此仲景用之誠如此本始於素問淵源固如此千金略之而未詳道猶垂於一線綿如此金匱言背而不言角弓病不在弓而弓義具背愰然盎於不言中所言皆指見在之實無論男婦大小之言道本一視同仁可推此則仲景之所以仲景也嗚呼仲景殁痙亡於痓而此義不明此義不明而斯道晦斯道晦而驚風之亂起亂起而兒家之禍興禍興而角弓之衒售角弓一不是人身二不病此病三又不在目前抽掣搐搦事理皆不可求論之鑿不妄何啻妄哉不盲乎醫婦人者盲以羣盲鑿以習鑿而産後驚風之孳突不順非而效尤瞑行而索途何此屬易知易明而亦不審不察非後人之所以後人歟然則大人亦有此病否曰中傷風寒為病一也有無視汗多寡不均耳不可以無言在大人則病者亦不省診家皆不審不審則袖手揑譎不省則枉命銜寃舉世昧矇至今不醒余以幸荷上天試病之感身親經歷死而重生力致體究遂覺悟素匱言外之緒醖千金發而未白之躍如竊案候對兆報己子用經成效歷履有年顧惟異端之害不闢則墳典之道不行墳典之道不行則積昏之暗不曉以是不敢懷迷敬復修此梓告多方上以盡祈副蒼蒼之特意旁以期維挽滔滔之沉昏庶幾同心同好同歸正覺則同在同聚安知不至同際一休徵乎雖以鄙野質朴不文然扣鐘求聲蓋出於端本澄源之傾心也重明三古則在仰望賢智仁孝於將來痙書跋書以載道載而不醇則反害書乎哉醫家之書自本草素靈難經以至傷寒論方法具而體用備書少而義精道之原也末流紛紛汗牛充棟多遂橫少遂塞以橫之牽矯蹈附獵名媒利適所以成蠅蠧祲氛而言之醇乎哉蓋不過徒為鑿鑿擾擾道愈昏而世愈惑雖多亦奚以為醫道與儒道通夫何讀儒家書三年則必有魁天下而名世之儒出讀醫書雖經世計未便見有醫之能良者出於其間為何如人焉儒難邪醫難邪世固有小視夫醫而以易易言者蓋亦未之思而云然爾愚於儒且憚不能今乃醫何也天既倓然以醫之道勉我我雖不敏不敢不勉也苟欲勉則凡在為道皆不可不勉而後庶乎可以能勉言是故痙有道帝伯仲景道之矣後人不道也而又反以驚風之妄謬害之禍世厄道不為不久矣此其醫之所以難也歟誠有所不能忍見者故敢申明其道而復書之以與知我者同從事於勉焉痙書之謂也萬歷己亥正月人日九山山人有執自跋傷寒論條辨卷十一
