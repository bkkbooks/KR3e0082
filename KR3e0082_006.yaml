body:
  text: 傷寒論條辨卷六明方有執撰辨溫病風溫雜病脈證並治第九凡二十條方三此皆舊本錯雜亂出今分類為篇一太陽病發熱而渴不惡寒者為溫病發熱溫亦陽故熱亦即發也渴熱傷血也不惡寒無隂寒之讎也溫春令之氣也氣之於時或則未應至而至或則應至未至而不齊故冬夏雖有溫要必以春為正是故必也證候顯見有如此者始可以言是觸犯於溫而病也此揭溫病之名實而不出其治者論溫以辨明傷寒故不之及也説者以為有論無治而不自滿吁烏足與論經之大旨哉若發汗已身灼熱者名曰風溫風溫為病脈隂陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癎時瘈瘲若火薰之一逆尚引日再逆促命期鼾音旱溲音搜癎音間瘈音熾瘲音踨隂灼熱謂熱轉加甚也風溫謂觸犯於溫病有風也陽俱浮太陽本浮而風溫皆陽故上下皆見浮也自汗出亦衛受傷也身重多眠睡鼻息必鼾語言難出者風擁則氣昏熱甚則氣鬱也小便不利者太陽主膀胱而風溫皆陽下則反攻隂徒亡其津液而膀胱之氣傷也直視者太陽之筋支者為目上綱故不轉睛而上竄也失溲言小便甚失其常度也火灸尉之類也微言攻之微則變亦微發黃者火熱則土燥故其色外奪也劇言攻之劇則變亦劇如驚癎時瘈瘲者火甚熱極而生風也熏亦火劫也一逆言乍誤也尚引日言猶可以俄延再逆言復誤也促命期言夭枉人之天年其致警之意深矣二形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈形作傷寒猶曰似傷寒指上條而申言之也不弦緊謂非傷寒也弱即風性柔緩之謂譫語者火甚則土燥也弱者發熱蓋引素問諸弱發熱以明上文之必渴也解之言脈既屬浮則當以法解之訣人用治之大意也三脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此又承上條而申致戒警之意實謂脈浮熱甚為邪氣勝則實咽燥者腎為膀胱之合其脈之直者入肺中循喉嚨挾舌本也唾血者火性炎上血因之而妄逆也已上皆言溫四病如桂枝證頭不痛項不強寸脈微浮胸中痞鞕氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散瓜蒂散方瓜蒂一分熬黃赤小豆一分右二味各别搗篩為散已合治之取一錢匕以香豉一合熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散如桂枝證言大約似中風也頭不痛項不強言太陽經中無外入之風邪以明非中風也寸候身半已上微浮邪自內出也胸中痞鞕痰涎塞膈也氣上衝咽喉者痰湧上逆俗謂喉中聲如曵鋸是也寒以痰言痰內證也內者為虛故曰寒也是病也想當先仲景時命名者蓋不過按素問陽之氣以天地之疾風名之而亦呼為中風豈意後世足以奪本經之中風相亂而相誤哉經革其名而以病如桂枝證揭之誠萬世辨明中風似是而非之至教也易吐實風寒之梔子豉而以瓜蒂散者瓜蒂苦寒能吐頑痰而快膈小豆酸平善湧風涎而逐水香豉能起信而潮汐故佐二物而主治稀糜則又承載三物者之舟航此所以為吐虛風虛寒之對藥也然而又曰虛家不可與何也是又一説也此風此寒雖人身之虛象而痰涎顧非胸中之實物邪然則虛家者不痰可言乎噫本氣自病之東垣不作難乎可與同論此也休哉五病人有寒復發汗胃中冷必吐蛔有寒承上文而言復反也言誤也誤汗則徒亡津液胃中空虛故曰冷也胃虛則蛔失其所養而悖亂故吐出可必此乃申致上文不可發汗以嚴戒慎之意當作一條舊本出在兩篇數拘有定今一之則目不合舊數故但移就相次存二以仍舊計凡如此者讀者自會可也六病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷似涉於厥隂傷寒也乍忽也言非厥隂傷寒乃虛寒之邪自內而作故曰邪結在胸中邪亦以痰言所以胸中滿而煩也飢不能食者痰涎湧上逆而塞膈氣窒而食不通也病在胸中乃承上起下之句吐宜瓜蒂散而與前條同者虛風虛寒雖殊而痰之所以為邪則一也然前條虛風生痰即俚俗所謂中風而此條虛寒痰證即諸家方書所謂四證類傷寒而痰居其一者是也經皆揭之而不名者想當時皆不過以中風傷寒為通解經以虛風之風非風寒之風也故不曰風痰而曰胸有寒以虛寒之寒與風寒之寒不同也故不曰寒痰而曰邪在胸中但詳其痰之狀而革其名正其義以出其治其所以為曉寤天下後世也亦已至矣何天下後世卒深沉昏惑而反多口於經甚者則直詆桂枝湯為偶中於漢之末世誣之為不可用羣然沒其所謂中風之病名而懵其病於不知顚倒其傷寒之經旨於分崩離析使故習之弊至今尚然噫陋俗之難化愚夫之難曉一至是邪宜乎後之人年不古若而日陷於促也冤哉七病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲衣者寒在皮膚熱在骨髓也此揭五合表裏之為病而分曉之所以勉人當求病於的之意皮膚五合之表也骨髓五合之裏也熱在皮膚寒在骨髓者表實裏虛也寒在皮膚熱在骨髓者表虛裏實也然此以藏府不預而言耳合藏府而統言之則皆表而無裏之可稱也學者不可不究表熱裏寒者脈雖沉而遲手足微厥下利清穀此裏寒也所以隂證亦有發熱者此表解也表寒裏熱者脈必滑身厥舌乾也所以少隂惡寒而踡此表寒也時時自煩不欲厚衣此裏熱也此承上文而詳釋之之意所以隂證亦有發熱者之上疑有脫落八病發熱頭痛脈反沉若不瘥身體疼痛當救其裏宜四逆湯此馮脈不馮證之大旨方見太陽下九病在陽應以汗解之反以冷水潠之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服文蛤散方文蛤五兩右一味為散以沸湯和一錢匕服湯用五合白散方桔梗三分貝母三分巴豆一分去皮熬黑研如泥右件二味為末內巴豆更於臼中杵之以白飲和服強人一錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱被不得出當汗而不汗則煩假令汗出己腹中痛與芍藥三兩如上法潠心艮切蒙在陽謂表未罷熱未除也潠噴之也灌溉之也被也言邪蒙冒於潠灌之水鬱閉而不散熱悗煩惱益甚也粟起言膚上粒起如粟水寒鬱留於表而然也意欲得水而不渴者邪熱雖甚反為水寒所制也文蛤即海蛤之有文理者鹹寒走腎而利水以之獨專任者蓋取督腎而行水也不差者水雖內漬猶有外被者故用五苓散內以消之外以散之而兩解也寒以飲言飲本寒也又得水寒兩寒摶結而實於胸中故謂無熱證也小陷胸湯固小結胸之主治然白散者桔梗貝母能消飲而開膈巴豆辛溫能散寒而逐水所以寒結或重而小結胸不能解者則此又可服也小陷胸湯方見太陽中十病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之藏無他病裏氣和也時以暫言謂或時則然或時不然也衛氣不和表不固也先其時言於未發熱之先也陽方見太上十一病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯此與上條同上以暫言此言常者謂無時不然也上言藏藏為隂而主裏此言榮榮亦隂而主裏衛亦外皆變文之互詞蓋上條以暫言故其詞略此以常言故其詞詳兩相互發義不殊也然皆發汗而此不言先其時者以常故無先後之可言也十二病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也數為客熱已下乃反覆詳明上文之義客熱以邪氣言虛冷以正氣言十三微數之脈愼不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也微數虛熱也故戒慎不可灸逐亦追也實謂熱也血散脈中言追逐之餘必至迫血血為榮而行脈中故謂散於脈中也火氣雖微已下甚言追逐之害大蓋骨賴血以濡既失其所濡必枯而焦筋賴血以榮既亡以為榮必衰而傷殘伐其本源故也以此示人而近來人之以火灸隂虛發熱者猶比比焉竊見其無有不焦骨傷筋而斃者吁是豈正命哉可哀也已十四病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之宜大承氣湯發汗宜桂枝湯煩熱太陽也故脈浮虛而宜汗散如瘧狀謂熱之往來猶瘧之作輟有時而不爽也晡日加申陽明之王時也故脈實而宜下解十五未持脈時病人手義自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此此訣人推測病情之大法十六病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也病人謂凡有病之人證犯有如此者則皆當如此而治之之謂非獨以風寒之病為言而已也此訣人辨凡百胃實之大旨十七病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯小便不利所以大便有乍難乍易也時有微熱陽明潮作也喘冒不能臥胃不和也故曰有燥屎方見陽明篇下同十八大下後六七日不大便煩不解腹滿痛者此有燥屎也宜大承氣湯煩不解則熱未退可知腹滿痛則胃實可診故曰有燥屎已上三條皆訣人當下之大法十九本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆復與覆同古字通用比復亦反也猶言誤也與下文反汗之反同意蓋兩而互相發明以訣人汗下之大法二十凡病若發汗若吐若下若亡津液隂陽自和者必自愈隂陽以脈言而二便在其中兩者和則血氣無相勝負可知故自愈可必此訣人持診之大要辨霍亂病脈證並治第十凡九條方三一問曰病有霍亂者何答曰嘔吐而利名曰霍亂霍吐也亂雜亂也靈樞曰清氣在隂濁氣在陽清濁相干亂於腸胃則為霍亂是也二問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止更復發熱也發熱頭痛身疼惡寒外感也吐利內傷也上以病名求病證此以病證實病名反覆詳明之意三傷寒其脈微澀者本是霍亂今是傷寒却四五日至隂經上轉入隂必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必鞕十三日愈所以然者經盡故也轉失皆見陽明篇也本根原也言根因原起自霍亂本嘔意同下利後便當鞕鞕則能食者愈今反不能食到後經中頗能食過一經能食過之一日當愈不愈者不屬陽明也此申上文末節而言其詳四霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之理中丸方人參三兩白术三兩甘草三兩乾薑三兩右四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服此申上文而出其治熱多欲飲水者陽邪勝也寒多不用水者隂邪勝也五苓散者水行則熱泄是亦兩解之謂也理治也料理之謂中裏也裏隂之謂參术之甘溫裏也甘草甘平和中也乾薑辛熟散寒也五苓散方見太陽上加減法若臍上築者腎氣動也去术加桂四兩腎氣動欲作奔豚也去术腎惡燥也加桂以其能伐腎邪而泄奔豚然非枝也吐多者去术加生薑三兩吐氣逆也术能壅氣故去之薑能散氣所以為嘔吐之聖藥也多者還用术悸者加茯苓二兩下多濕勝也復用术术能燥濕濕燥則下斷也悸以飲水過度言水停之故也加茯苓水行則悸愈也渴欲得水者加术足前成四兩半渴脾虛也加术緩脾也腹中痛者加人參足前成四兩半腹中痛裏虛也加人參補中也寒者加乾薑足前成四兩半寒以不用水之甚者言乾薑辛熱而能散寒非稱權則不可也腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被氣滯則腹滿术甘而壅故去之附子辛散故加之飲熱粥亦助藥力也自溫亦取微欲似汗之意勿發揭衣被防重感也案此用术去术术上皆無白字何哉蓋由文次句中上無空隙故雖有狂妄竟不能於此加毫末而經之真原昭然猶存則他术之有白出於偽妄不待言而明矣然於偽妄之疏愚亦可以見也君子察微觀人於其所忽信哉吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止裏和也身痛表退而新虛也消息猶言斟酌也桂枝湯固衛以和表者也小和言少少與服不令過度之意也五吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之吐利四肢拘急手足厥冷裏隂虛也汗出發熱惡寒表陽衰也四逆湯表裏合救之劑也方見太陽下下同六既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之此與上條大同小異而義同故治亦同七吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之通脈四逆加豬膽汁湯方於四逆湯方內加豬膽汁半合餘依四逆湯法已止也下即利也斷絶也此總上文言吐利兩皆止絶而又以其餘證之不解者更治以出也不解之證者陽極虛隂極甚脾氣亦衰微也然極則劇矣通脈四逆加豬膽汁者與少隂白通同一反佐以疏劇則正治反格拒之意也八惡寒脈微而復利利止亡血也四逆加人參湯主之四逆加人參湯方於四逆湯方內加人參一兩餘依四逆湯法亡血津液竭也人參能生津也九吐利發汗脈小煩者以新虛不勝穀氣故也此與下篇末條詳略不一而義則同亦互意也辨隂陽易差後勞復脈證並治第十一凡七條方四一傷寒隂陽易之為病其人身體重少氣少腹裏急或引隂中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之燒裩散方右取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利隂頭微腫則愈婦人病取男子裩當燒灰少腹之少去聲新傷寒包中風而言也易猶交易變易之易言大病差血氣未復強合隂陽則二氣交感互相換易而為病也身體重少氣真元虧竭而困倦也少腹裏急或引隂中拘攣者所易之氣內攻也熱上衝胸頭不欲舉眼中生花者虛陽生熱而上蒸也膝脛拘急者脈亂而筋傷也裩當近隱處隂陽二氣之所聚也男女易用物各歸本也二大病差後勞復者枳實梔子豉湯主之若有宿食者加大黃如博碁子五六枚枳實梔子豉湯方枳實三枚炙梔子十四枚擘豉一升綿裹右三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗大病概言也下倣此勞強力房勞復重復作病蓋大邪初退血氣新虛作強勞傷虛而生熱猶之病復發非實發初病也枳實寬中破結梔子散熱除煩香豉能解虛勞之熱清漿則又梔子之監制故協三物之苦寒同主勞傷之復熱而與發初病之實熱不同倫也宿食陳宿之積食也食能生熱故須去之大黃者去陳以致新也三傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉者以下解之此示病後不謹調理小復之大法脈浮有所重感也脈沉飲食失節也四大病差後從腰已下有水氣者牡蠣澤㵼散主之牡蠣澤㵼散方牡礪熬澤㵼栝蔞根蜀漆洗去腳葶藶熬商陸根海藻洗去鹹已上各等分右七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服水氣肌肉腫滿而虛浮蓋差後新虛土未強而水無制也從腰已下而不及上者水性就下勢之初起故雖泛濫未至於橫溢也牡礪澤㵼海藻鹹以走腎腎強則水行葶藶商陸根苦以利濕濕去則腫沒蜀漆辛而能散故為諸品之佐也栝蔞根苦能徹熱本乃蜀漆之使也五大病差後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸唾口液也寒以飲言不了了謂無已時也方見前六傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之竹葉石膏湯方竹葉二把石膏一斤半夏半升洗人參三兩甘草二兩炙粳米半升麥門冬一升去心右七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服羸音雷飲羸病而瘦也少氣謂短氣不足以息也氣逆欲吐作惡阻也蓋寒傷形故寒解則肌肉消削而羸瘦熱傷氣故熱退則氣衰耗而不足病後虛羸脾胃未強飲食難化則痰易生痰湧氣逆故欲吐也竹葉清熱麥冬除煩人參益氣甘草生肉半夏豁痰而止吐粳米病後之補劑石膏有徹上徹下之功故能佐諸品而成補益也七病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈脈已解邪悉去而無遺餘也日暮陽明之王時也強與穀謂壓其進食也損言當節減之也蓋飲食節則脾胃和脾胃和則百體安此調理病餘之要法也右經十一篇法三百九十七方一百一十三蓋仲景氏之遺書而叔和所詮次之者也傳謂世稱仲景醫聖良以仲景者集醫哲之大成而是書者正醫教之大訓也初學之士舍是則無以為入道之門而敦進德之基矣故夫篤志斯道者亦曰必由是而學焉則亦庶乎其不差而於人已不致誤馴是以往誠能至於仁熟義精道久化成不但人無枉命而已亦無慚德則帝伯之堂可升有農之神可繼豈不偉哉三百九十七者今移六條在第十五篇傷寒論條辨卷六
