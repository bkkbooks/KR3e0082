body:
  text: 傷寒論條辨卷三眀方有執撰辨太陽病脉證幷治下篇第三凡三十八條方十八中風者單只衛中於風而病也傷寒者單只榮傷於寒而病也若風寒俱有而中傷則榮衛皆受而俱病故以榮衛俱中傷風寒而病者為下篇盖寒雖專令乎冬而風則無時不有所以或則單中單傷或則俱有而中傷也單中單傷而為病者已云難治矣然則俱中傷而病者其治不尤難乎何也寒須發汗風則解肌欲並行而不誖其為兩難也何如哉故能發兩難發之汗者名曰青龍能解兩難解之熱者名曰白虎能救無兩難而誤服大青龍之逆者則曰眞武焉夫所謂青龍白虎眞武者言其靈應不難於其所難妙效驗於不可測度有如此其神神湯之謂也神其神禮記曰惟聖者能之其斯之謂乎學者能眀諸此始可與言醫也已一太陽中風脉浮緊發熱惡寒身疼痛不汗出而煩燥者大青龍湯主之若脉微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以眞武湯救之末後六字舊本大青龍湯主之黄氏正之如此盖既曰不可服服之為逆則安得又復有大青龍湯主之之文傳冩之誤甚眀黄氏正之甚是當從之後人又因其更改致疑併六字皆删之刪之則上篇第二十五條無憑證據故存硃以偹通考然此與下條互相發眀而同一治故合二説併見於下二傷寒脉浮緩身不疼但重乍有輕時無少隂證者大青龍湯發之大青龍湯方麻黄六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚擘石膏如雞子大綿裹碎右七味以水九升先煑麻黄減二升去上沫内諸藥煮取三升去滓温服一升取微似汗汗出多者温粉撲之一服汗者停後服汗多亡陽遂虚惡風煩躁不得眠也上條太陽中風者言有上篇第三條之證也病屬太陽則脉浮然浮以候風緊以候寒發熱者中風熱即發也惡寒身疼痛不汗出皆寒也風為煩寒則風盖謂風寒俱有而中傷風多寒少之證猶指言此之中有寒之謂也此條傷寒者言有中篇首條之證也緩者風之診身不疼亦風也但重寒也乍有輕時亦為有風而然也無少隂證者言若是但欲寐則渉於少隂之疑似矣今是但重故曰無少隂證亦謂風寒兩中傷榮衛俱受病寒多風少之證猶指言此寒之中有風之謂也盖風寒二者大率多相因而少相離有寒時不皆無風有風時不皆不寒所以單中單傷者固嘗自是相兼而中傷者亦嘗多有此大青龍之所以作也二條者互文而互相發眀以為此篇之小縂太陽分病之紀上篇一中篇二此其三焉三者太陽一經喫緊大三辨也已下凡例此云云以為稱首者皆風寒俱有而中傷之證其例則又皆統乎此也夫風寒二治大法不外乎桂枝麻黄之二湯然桂枝湯中忌麻黄而麻黄湯中反用桂枝此中有極深奥義非言語文字可以形容暴白者要在人之心領神㑹可大青龍者桂枝麻黄二湯合劑之變制也故為併中風寒之主治校之桂枝麻黄各半湯與桂枝二麻黄一湯則少芍藥而多石膏去芍藥者不欲其收也以其無芍藥而觀之即麻黄湯方加石膏薑棗也薑棗本桂枝湯中所有其制則重在石膏按本草石膏辛甘大寒辛以散風甘以散寒寒以除熱故為併中風寒發熱之用然青龍以桂枝麻黄得石膏之辛甘而有青龍之名其白虎亦以知母粳米得石膏之辛寒而有白虎之名一物二用得君而成其功名於異世神變於時者也夫所謂青龍白虎者青乃木色龍乃木神木主春春熱而煩躁雷雨解而致和焉人之汗以天地之雨名之龍與雲雨至發煩躁之汗而榮衛以和龍之所以為湯神湯之謂也白乃金色虎乃金神金主秋秋熱而燥渴金風解而薦凉焉人之氣以天地之疾風名之虎嘯谷風生解燥渴之熱而表裏以凉虎之所以為湯神湯之謂也然均是龍也而一則曰主之一則曰發之何也主之者以煩躁之急疾屬動而言發之者以但重之沉黙屬静而言之也上條末節脉微弱汗出惡風盖指上篇陽浮而隂弱中風之證而言中風誤服大青龍則為逆其第二十五條是也與此叅看其義自合夫以中風之用桂枝湯傷寒用麻黄湯風寒俱中傷而用大青龍湯向使認病親切於克始用湯的對於及時則三法行之之下風寒尚有餘治乎然則三百九十七一百一十三者醫藥詿誤之所致十八九疾痛傳變之所致無二三由此觀之司命君子可能不惕惕於心乎是故仲景氏之所以若然者豈得已哉惟其不得已故諄諄然曰知犯何逆隨證治之知犯何逆以法治之斯言也豈非深憂天下後世而自致某不能盡其所欲言之意耶嗚呼以仲景氏方法之多如許而猶自致其不能盡其所欲言之意如此則後之以截江殺車活人類證纂要自謂能盡傷寒之治而膠柱以待天下後世者吾不知其是誠何心也三太陽病脉浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黄湯主之太陽病脉浮𦂳無汗發熱身疼痛皆與首條同而無惡寒煩躁則是較輕於首條亦風寒俱有而中傷之證也微除言雖未全罷亦已減輕也發煩風壅而氣昏也目瞑寒鬱而血滯也劇作衄之兆也衄鼻出血也鼻為肺之竅肺為陽中之隂而主氣陽邪上盛所以氣載血上妄行而逆出於鼻也陽氣以風而言也風為陽而由氣道所以得隨衄散解故曰陽氣重故也用麻黄湯者以寒屬隂性沉滯而難解所以須發之也下方見中篇同四太陽病脉浮緊發熱身無汗自衄者愈此承上條復以其更較輕者言以見證亦有不治自愈之變所以曉人勿妄治以致誤之意太陽病脉浮𦂳發熱身無汗與上條同而無疼痛既無疼痛則比之上條又更較輕於首條可知矣所以不待攻治得衄則亦自愈得衄自愈者汗本血之液北人謂衄為紅汗達此義也五傷寒脉浮緊不發汗因致衄者麻黄湯主之以傷寒為首稱而承之以脉浮緊者寒多風少之謂也上二條皆風多寒少前條以服藥已微除汗發不對而致衄上條以較輕得自衄此以寒多不發汗而致衄三條之所以辨差分也盖寒多則於法當發汗當發而失於不發熱欎血亂所以衄也衄則陽邪之風散麻黄湯者發其尚未散之寒也六脉浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也令平聲之此縂上三條而著其不可汗之脉所以嚴致戒慎意也盖尺以候隂遲為不足血隂也榮主血汗者血之液尺遲不可發汗者嫌奪血也七太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脉微緩者為欲愈也脉微而惡寒者此隂陽俱虚不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黄各半湯方桂枝麻黄各半湯方桂枝一兩十六銖去皮芍藥一兩生薑一兩切甘草一兩炙麻黄一兩去節大棗四枚擘杏仁二十四箇去皮尖右七味以水五升先煮麻黄一二沸去上沫内諸藥煮取一升八合去滓温服六合八九日約言久也如瘧狀謂有往来寒熱而無作輟之常也發熱惡寒熱多寒少者風寒俱有而寒少風多也不嘔不渇清便欲自可邪之往来出者未徹表入亦未及裏也一日二三度發乃邪居淺近則徃来未及而頻數故脉亦微緩而謂為欲愈也脉微而惡寒已下重以不得解者言而出其治也隂言後陽言前俱虚故禁攻也更再也不可汗已過表也不可吐下未見有裏也熱色陽浮外薄也然陽雖外薄以隂寒持之而不能散所以小汗亦不能得出氣鬱而癢也桂枝麻黄各半湯者總風寒而兩解之之謂也此與第十四篇第二十章互看八太陽病發熱惡寒熱多寒少脉微弱者此無陽也不可更汗宜桂枝二越婢一湯桂枝二越婢一湯方桂枝十八銖去皮芍藥十八銖甘草十八銖炙生薑一兩三錢切大棗四枚擘麻黄十八銖去節石膏二十四銖碎綿裹右七味㕮咀以水五升煮麻黄一二沸去上沫内諸藥煮取二升去滓温服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一發熱惡寒熱多寒少與上條同上條以脉微而惡寒為隂陽俱虚此以脉微弱為無陽兩皆不可更汗亦同然風為陽病屬太陽而曰無陽誠不可曉闕疑可也或曰無陽者謂有疾在隂而無在陽也審藥識病即越婢觀之可知矣越踰也過也婢女子之卑者也女子隂也卑少也言其人本来虚弱有宿疾在少隂少隂之脉本微弱而有不可發汗之義所以但責其難發汗之過在於少隂法則謂之無陽方則謂之越婢且是湯也名雖越婢之輔桂枝實則桂枝麻黄之合劑乃大青龍以芍藥易杏仁之變制耳去杏仁者惡其從陽而主氣也用芍藥者以其走隂而酸收也以此易彼而曰桂枝二則主之以不發汗可知而越婢一者乃麻黄石膏之二物則是寓微發於不發之中亦可識也寓微發者寒少也主之以不發者風多而宿疾在少隂也又況首條末節不可服大青龍以發汗亦由脉微弱首條末節者以太陽中風言也此與上二條者皆以風多寒少言也合而觀之則無陽之陽義不微矣乎説者如此未知是否九服桂枝湯大汗出脉洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黄一湯桂枝二麻黄一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黄十六銖去節生薑一兩六銖切杏仁十六箇去皮尖甘草一兩二銖炙大棗五枚擘右七味以水五升先煮麻黄一二沸去上沫内諸藥煮取二升去滓温服一升日再服服桂枝湯證轉大汗出脉轉洪大者風多寒少風邪欲散而寒持之兩皆不得解而熱反甚也與桂枝湯如前法者重賾之也形如瘧日再發者邪居淺而外向終為微寒所持故曰汗出必解言須發之也桂枝二麻黄一湯者重解風而輕於散寒也十服桂枝湯大汗出後大煩渴不解脉洪大者白虎加人参湯主之此與上條同而多大煩渴盖比上條汗更出過多亡津液而表裏燥熱更甚所以用白虎兩解表裏之熱加人参潤其燥而消其渴也方見下十一服桂枝湯或下之仍頭項强痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白术湯主之桂枝去桂加茯苓白术湯方於桂枝湯方内去桂枝加茯苓白术各三兩餘依桂枝湯法煎服小便利則愈服桂枝湯病不解而證變者不獨中風而且有寒也又或下之益誤也仍頭項强痛翕翕發熱無汗者風寒之表皆在而未除也心下滿微痛者誤下而證入裏也小便不利下後亡津液而水飲停也去桂枝用芍藥甘草者收重傷之隂而益裏傷之虚也薑棗健脾胃而和中下後用之更宜故二物仍其舊也茯苓淡渗以利竅术能益土以勝水本其有停飲之故所以加之以為拯前治之誤也脉經术上無白字十二傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯有熱則不大便為裏實眀矣故雖頭痛亦宜承氣湯下之小便清則裏無熱可知故曰仍在表宜發汗然小便清而頭痛陽邪上盛也故衄可必而宜桂枝湯解之承氣湯有四方此不眀言要當隨證辨用耳桂枝湯方見上篇十三傷寒脉浮滑此表有熱裏有寒白虎湯主之白虎湯方知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合右四味以水一斗煮米熟湯成去滓温服一升日三服傷寒見中篇首條其脉不浮浮者風也言不獨傷於寒而亦有風則然也滑為裏熱以滑且浮知熱不獨在裏也故指言此表有熱盖表裏俱熱之謂也裏有寒者裏字非對表而稱以熱之裏言盖傷寒之熱本寒因也故謂熱裏有寒指熱之所以然者言也夫寒與風俱中傷表與裏既皆熱欲兩皆而解之誠哉極其難也譬如夏秋兩届之間燥熱酷甚非金風之薦涼則暑毒不解也是故白虎者西方之金神司秋之隂獸虎嘯谷風冷凉生酷暑消神於解秋莫如白虎知母石膏辛甘而寒辛者金之味寒者金之性辛甘且寒得白虎之體焉甘草粳米甘平而温甘取其緩温取其和緩而且和得伏虎之用焉飲四物之成湯来白虎之嘷嘯陽氣者以天地之疾風名也湯行而虎嘯者同氣相求也虎嘯而風生者同聲相應也風生而熱解者物理必至也抑嘗以此合大小青龍眞武而論之四物者四方之通神也而以命方盖謂化裁四時神妙萬世名義兩符實自然而然者也方而若此可謂至矣然不眀言其神而神卒不容掩者君子盛德此其道之所以大也與此與厥隂篇第二十五條互看十四傷寒脉浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人参湯主之白虎加人参湯方於白虎湯方内加人参三兩餘依白虎湯法傷寒脉浮與上條同發熱無汗風寒之表在也故謂不解不可與白虎者白虎義取解秋嘯谷風而凉收燥熱非為發表也渴欲飲水者裏熱燥甚希救也無表證謂惡寒頭身疼痛皆除非謂熱也以證大意與上條同故主治亦與之同以多渴也故加人参之潤以滋之也十五傷寒無大熱口燥渴心煩背微惡寒者白虎加人参湯主之無大熱風微也口燥渴心煩裏熱甚也背者太陽經脉之所適人身至隂之地不勝寒而有餘惡所以微也已上三條大意互相發眀所以治亦相彷彿而不甚殊十六傷寒脉浮醫以火迫刧之亡陽必驚狂起卧不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬龍骨四兩大棗十二枚擘蜀漆三兩洗去脚右為末以水一斗二升先煑蜀漆減二升内諸藥煮取三升去滓温服一升亡陽者陽以氣言火能助氣甚則反耗氣也驚狂起臥不安者神者陽之靈陽亡則神散亂所以動皆不安陽主動也桂枝甘草和傷寒之脉浮蜀漆辛平散火邪之錯逆龍骨牡蠣固澀以收陽神之散亂大棗生薑醒脾以緩起臥之不安去芍藥者嫌其主隂則反得以勝陽也十七火逆下之因燒鍼煩燥者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝一兩去皮甘草二兩炙牡蠣二兩熬龍骨二兩右四味為末以水五升煮取二升半去滓温服八合日三服火逆承上條而言也然雖逆而又逆而證則未變重故方物反差少而大意不殊十八脉浮宜以汗解用火炙之邪無從出因火而盛病從腰以下必重而痺名火逆也痺濕病也因火逆治火邪夹陽邪而上逆眞陽不下通隂不用事化不行而水不得泄故濕著下體而重痺也十九傷寒脉浮自汗出小便數心煩微惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足温者更作芍藥甘草湯與之其脚即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之甘草乾薑湯方甘草四兩炙乾薑二兩炮右㕮咀以水三升煮取一升五合去滓分温再服芍藥甘草湯方白芍藥四兩甘草四兩炙右二味㕮咀以水三升煮取一升半去滓分温再服之調胃承氣湯方大黄四兩去皮清潤浸芒硝半斤甘草二兩炙右三味㕮咀以水三升煑取一升去滓内芒硝更上微火煮令沸少少温服四逆湯方甘草二兩炙乾薑一兩半附子一枚右三味㕮咀以水三升煑取一升二合去滓分温再服强人可大附子一枚乾薑三兩數音朔反音板寒脚攣急者足經始終於足寒則拘攣也已上言風俱有之表裏證故謂與桂枝湯為反蓋桂枝是中風之主治反不順也厥謂四肢冷也咽中乾煩燥吐逆者誤汗損傷陽虚隂獨盛也甘草益氣乾薑助陽復其陽者充其氣之謂也厥愈足温陽氣復也芍藥用白酸能歛隂而主血也甘草用炙甘能補中而益脾也脚即伸隂血行也蓋以一誤治而表裏俱傷故必求隂陽如此次第而俱復胃不和而讝語者亡津液而胃實也承氣而曰調胃者以胃屬陽而主裏故用甘草和隂陽而緩中也重發汗而復加燒鍼則二者皆有以大損於陽矣故用偏於助陽之四逆以救其陽也問曰證象陽旦按法治之而増劇厥逆咽中乾兩脛拘急而讝語師曰言夜半手足當温兩脚當伸後如師言何以知此荅曰寸口脈浮而大浮則為風大則為虚風則生微熱虚則兩脛攣病證象桂枝因加附子參其間増桂令汗出附子温經亡陽故也厥逆咽中乾煩燥陽眀内結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈脛音幸風此申釋上文意象似也陽以風言旦曉也言似中分曉以不啻中風故設難詳申其義且眀治不可茍序不可紊以致戒慎之意末後不復言若重發汗已下一節者以其或然或不然故也二十傷寒腹滿讝語寸口脈浮而緊此肝乗脾也名曰縦刺期門寸口氣口也五藏别論帝曰氣口何以獨為五藏主岐伯對曰胃者水穀之海六府之大源也五味入口藏於胃以養五藏氣而變見於氣口也故寸口主脾胃浮緊為弦是肝脈也乗脾者肝木自盛脾胃之土受制也縦見辨脈法上篇期門見太陽上篇刺之者㵼木以救土也二十一傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此汗乘肺也名曰横刺期門傷寒發熱嗇嗇惡寒風寒尚在太陽而未除也大渴欲飲水者肝木本自盛而邪熱熾欲得潤也腹必滿者水漫而泛濫也自汗出則津液得外滲矣小便利則水得下行矣夫水木之母也母必為子木得水則益甚而横故俠水為邪反侮所不勝而上乗於肺肺金若虚受其邪而不能派散之則水不得泄而腫作矣乃金藏實不納其邪而轉運散之渙為自汗而外滲瀦為小便而下行此肝乗肺者所以不足為害而反欲自解也横亦見辨脈法上縦同條然縦横不同而同刺期門者縦以木賊土横以木侮金皆由木自盛而以㵼木為主治一也二二脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳濡與輭同古字通用不復亦反也緊反入裏言寒邪轉内伏也濡言不鞕痛而柔輭也痞言氣隔不通而否塞也易曰天地不交而萬物不生也内隂而外陽也内柔而外剛也本義曰蓋乾往居外而坤来居内也雖然傾否有先否後喜之象故君子不可不勉學者不可不知所務二三心下痞按之濡其脈闗上浮者大黄黄連㵼心湯主之大黄黄連㵼心湯方大黄二兩黄連一兩右二味以麻沸湯二升漬之須臾絞去滓分温再服此申上條言脈以出其治脈見闗上者以痞在心下也以氣痞而濡所以浮也然痞之濡由熱聚也故用黄連清之於上聚雖氣也痞則固矣故用大黄傾之於下麻沸湯者其取圖經所謂去瘀之義與二四心下痞而復惡寒汗出者附子㵼心湯主之附子㵼心湯方大黄二兩黄連一兩黄芩一兩附子一枚炮去皮别煮取汁右四味切三味以麻沸湯二升漬之須臾絞去滓内附子汁分温再服痞本隂邪内伏而虚熱上凝復惡寒汗出則表虚而陽不為衛䕶可知矣㵼心湯固所以為清熱傾否之用加附子蓋所以為歛其汗而固其陽也黄芩為附子而更加表裏兩解具見矣二五病脇下素有痞連在臍傍痛引少腹入隂筋者此名臟結死素舊常也臍傍隂分也藏隂也以隂邪結於隂經之藏攻之不可及所以於法為當死也二六臟結無陽證不往来寒熱其人反靜舌上胎滑者不可攻也無陽證言當藏結之時表已罷除無太陽也不往来寒熱言痞雖屬脇下由素常有而發非少陽傳經之邪也反靜言無陽眀之讝妄也舌心之苗也胎滑生長滑膩如胎膜也胎滑本由丹田有熱胷中有寒而成然丹田隂也胷中陽也熱反在隂而寒反在陽所以為不可攻也二七問曰病有結胷有臟結其狀何如荅曰按之痛寸脈浮闗脈沉名曰結胷也何謂臟結荅曰如結胷狀飲食如故時時下利寸脈浮闗脈小細沉𦂳名曰臓結舌上白胎滑者難治此設問荅以明結胸臟結之同異時時下利者隂邪結於隂臟而寒甚也以寒甚故脈多小細與𦂳此其所以不同蓋結胷以陽邪結於陽臟結以隂邪結於隂故也末復申言臟結有難治之故者丁寧戒謹之意也二八傷寒表不解心下有水氣乾嘔發熱而欬或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之小青龍湯方麻黄三兩去節芍藥三兩五味子半升乾薑二兩甘草三兩炙半夏半升洗桂枝三兩去皮細辛三兩右八味以水一斗先煮麻黄減二升去上沫内諸藥煮取三升去滓温服一升水氣謂飲也欬與喘皆肺逆也蓋肺屬金金性寒水者金之子故水寒相搏則傷肺也或為多證者水流行不一無所不之也夫風寒之表不解桂枝麻黄甘草所以解之水寒之相搏乾薑半夏細辛所以散之然水寒欲散而肺欲收芍藥五味子者酸以收肺氣之逆也然則是湯也乃直易於散水寒也其猶龍之不難於翻江倒海之謂與夫龍一也於其翻江倒海也而小言之以其興雲致雨也乃大言之能大能小化物而不泥於物龍固如是夫白虎真武雖無大小之可言其於主乎人身而為四體之元神則不偏殊故在風寒之厲病皆有感而遂通之妙應若謂與在天之主四時者期如此則去道逺矣故曰道不逺人而不為索隠行怪者聖賢無身外之道也老氏以降龍伏虎為造道之始其亦知夫反求諸身之謂乎讀者顧可忽哉加減法或為諸證之治若微利者去麻黄加蕘花如鷄子大熬令赤色麻黄發汗利則不宜而或為諸證皆去者以汗則重亡津液也利水横行也加蕘花導水也若渴者去半夏加栝蔞根三兩渴津液不足也去半夏以其燥津液也加栝蔞根以其徹熱而生津也若噎者去麻黄加附子一枚炮噎與䭇咽同水寒窒氣也附子者利氣散水寒也若小便不利少腹滿去麻黄加茯苓四兩水停下焦而不行則小便不利而少腹滿茯苓淡滲故能通竅而利水道也若喘者去麻黄加杏仁半升去皮尖喘水氣射肺而聲息不利也加杏仁潤肺以下其氣也二九傷寒心下有水氣欬而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之發熱不渴寒勝也故以服湯已而渴為寒去欲解大意與上條相倣故治亦同三十太陽病二三日不能卧但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胷未止者四日復下之此作恊熱利也二三日邪熱正熾之時也不能卧但欲起者邪屬裏而熱壅甚所以知其心下必結也寒分與温病等篇第四條之寒分同所以脈微弱也利止作結胷熱反上逆也四日承上文二三日而言也末句此下凝有脱誤三十一傷寒發熱汗出不解心中痞鞕嘔吐而下利者大柴胡湯主之傷寒不汗出得汗出則解不解者以有風而誤於偏攻熱而入裏所以變痞鞕嘔吐而下利也大柴胡湯者合表裏而兩皆解之也方見上篇三二發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓四逆湯方茯苓六兩人參一兩甘草二兩炙乾薑一兩附子一枚生用去皮破八片右五味以水五升煮取三升去滓温服七合日三服誤汗則亡陽而表踈誤下則亡隂而裏傷煩躁者風寒俱有而熱甚也茯苓人參入心以益虚心安則液歛也四逆湯者回陽以復隂陽倡則隂隨也三三傷寒病若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之不解以大勢言不獨謂表也表裏俱熱言風寒俱有也時時惡風言表未除也以舌乾燥煩而表裏之熱俱甚故用白虎以大渴欲飲水故加人參方見前三四傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純隂結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少隂病所以然者隂不得有汗今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解表以頭汗出微惡寒手足冷言裏以心下滿口不欲食大便鞕言陽微結謂由陽氣衰微故結不可全責病於隂也脈沉亦在裏言不但細為在裏以見表裏證俱在也汗出為陽微至此為半在裏半在外也一節是申釋上文脈雖沉𦂳至故知非少隂也一節言此但以頭汗可辨為有陽不然餘皆似少隂曉人當致精細大意類第二條第二條以中傷之初故脈如彼而用大青龍以發汗此以五六日證屬半表半裏而脈如此故従小柴胡以和解之也末言和之若猶不愈則當消息胃實而用治故曰得屎而解三五傷寒胷中有熱胃中有邪氣腹中滿欲嘔吐者黄連湯主之黄連湯方黄連三兩甘草三兩炙乾薑三兩人參二兩桂枝三兩去皮半夏半升洗大棗十二枚擘右七味以水一斗煮取六升去滓温服一升日三服夜二服胷上焦也熱以風言陽也言陽熱摶於上焦也胃中焦也邪氣以寒言隂也言隂寒鬱於中焦也腹中痛隂凝而窒滯也欲嘔吐熱壅而上逆也夫熱摶上焦黄連清之非桂枝不解也寒鬱中焦人參理之非乾薑不散也甘草大棗益胃而和中半夏辛温寛中而止嘔吐也三六傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸抵當丸方水蛭二十箇熬蝱蟲二十五箇熬去翅桃仁二十箇去皮尖大黄三兩右四味杵分為四丸以水一升煑一丸取七合服晬時當下血若不下更服應平聲晬音醉比此與上篇第二十一以下三條同以風寒俱有而上篇為難解故用上篇之方而變湯為丸然名雖丸也猶煑湯焉夫湯蕩也丸緩也變湯為丸而猶不離乎湯其取欲緩不緩不蕩而蕩之意與且曰不可餘藥言即使如上篇之用湯猶未為對必如是而後可亦竒制也其猶兵家之八陣與八陣武侯兵也變則反正為竒以竒為正謂醫與將同道者尚在同一權變哉晬時周時也三七得病六七日脈遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛面目及身黄頸項强小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食榖者噦六七日經盡之時也脈遲浮弱風寒入裏而表未除所以猶惡風寒也手足温半入於裏而未可下也不能食誤下而裏傷也脇下滿痛邪摶少陽也面目及身黄土受木賊而色外薄也頸項强太陽陽明之證猶在也小便難亡津液也後以大便言下重者柴胡寒裏隂已虚而氣滯也本渴而飲水嘔者水逆也柴胡不中與者以嘔為水逆非少陽或為之證也食榖者噦言過飽則亦當噦噫申眀上文嘔非柴胡所宜之意末後疑有脱落三八傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當鞕而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為内實也調胃承氣湯主之熱風也言俗謂傷寒過經不解者以庸下不省併中有風誤於治之所致也若自下利至末乃推眀其所以為誤而出其救誤之治反和以不厥言非直謂平和方見前傷寒論條辨卷三
